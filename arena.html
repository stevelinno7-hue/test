    <script>
        // 手機側邊欄開關
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    
    if (sidebar.classList.contains('-translate-x-full')) {
        // 開啟
        sidebar.classList.remove('-translate-x-full');
        overlay.classList.remove('hidden');
    } else {
        // 關閉
        sidebar.classList.add('-translate-x-full');
        overlay.classList.add('hidden');
    }
}
    // 1. 開啟編輯視窗
    function openProfileModal() {
        const user = Auth.getCurrentUser();
        if (!user) {
            alert("請先登入！");
            return;
        }

        // 設定下拉選單為目前的年級
        const select = document.getElementById('editGradeSelect');
        if (user.grade) {
            select.value = user.grade;
        }
        
        // 顯示視窗
        document.getElementById('profileModal').classList.remove('hidden');
    }

    // 2. 關閉編輯視窗
    function closeProfileModal() {
        document.getElementById('profileModal').classList.add('hidden');
    }
        // ==========================================
        // 🚀 遊戲化與排行榜邏輯區
        // ==========================================
        
        // 🔗 填入你的 Google Apps Script 網址
         const GAS_URL = "https://script.google.com/macros/s/AKfycbzQlG5LVquExr4qDerEGX_OaeOPYqp9Nk2Xk7WuJRq55XOPzIQx977KjCCteiWuhGfY2Q/exec";

async function initProfile() {
    // 1. 嘗試多次抓取，避免 Auth 物件太晚載入
    let user = null;
    if (window.Auth && typeof Auth.getCurrentUser === 'function') {
        user = Auth.getCurrentUser();
    }

    // 2. 如果 Auth 暫時抓不到，嘗試直接從 localStorage 撈（最後手段）
    if (!user) {
        const localData = localStorage.getItem('currentUser');
        if (localData) {
            try {
                user = JSON.parse(localData);
                console.log("榮譽榜：成功從 localStorage 直接補抓資料");
            } catch (e) {
                console.error("解析本地資料失敗", e);
            }
        }
    }

    console.log("最終確認的使用者物件:", user);

    const sideName = document.getElementById('sideUserName');
    const sideRole = document.getElementById('sideUserRole');
    const playerName = document.getElementById('playerName');
    const playerRole = document.getElementById('playerRole');

    // 3. 判斷是否為訪客或未登入
    if (!user || user.username === 'guest') {
        const guestName = "訪客";
        sideName.textContent = guestName;
        playerName.textContent = guestName;
        sideRole.textContent = "尚未登入";
        playerRole.textContent = "尚未登入";
        return; 
    }

    // 4. 正式顯示資料（優先顯示本地資料，確保秒出）
    const displayName = user.name || user.username || "使用者";
    const displayGrade = user.grade || "學生";

    sideName.textContent = displayName;
    playerName.textContent = displayName;
    sideRole.textContent = displayGrade;
    playerRole.textContent = displayGrade;

    // 5. 請求雲端 XP 資料
    try {
        const response = await fetch(`${GAS_URL}?action=get_profile&username=${user.username}`);
        const cloudUser = await response.json();

        if(!cloudUser.error) {
            // 更新等級
            document.getElementById('playerLevel').textContent = `Lv. ${cloudUser.level || 1}`;
            
            // 更新經驗值
            const currentXP = cloudUser.xp || 0;
            const nextLevelXP = (cloudUser.level || 1) * 100; 
            const xpNeeded = Math.max(0, nextLevelXP - currentXP);
            
            document.getElementById('xpText').textContent = `${currentXP} / ${nextLevelXP}`;
            document.getElementById('xpNeeded').textContent = xpNeeded;
            
            const percent = Math.min((currentXP / nextLevelXP) * 100, 100);
            setTimeout(() => { 
                const xpFill = document.getElementById('xpFill');
                if(xpFill) xpFill.style.width = `${percent}%`; 
            }, 300);
        }
    } catch (error) {
        console.error("雲端資料讀取失敗:", error);
    }
}
        // 2. 載入雲端排行榜
        async function loadLeaderboard() {
            const listContainer = document.getElementById('leaderboardList');
            const loadingMsg = document.getElementById('loadingMsg');

            try {
                const response = await fetch(`${GAS_URL}?action=get_leaderboard`);
                const topPlayers = await response.json();
                
                loadingMsg.style.display = 'none'; 
                
                if (!topPlayers || topPlayers.length === 0) {
                    listContainer.innerHTML = "<li class='text-center py-10 text-slate-400 font-medium bg-slate-50 rounded-2xl'>目前尚無排名紀錄，快去搶頭香！</li>";
                    return;
                }

                topPlayers.forEach((player, index) => {
                    const li = document.createElement('li');
                    // 使用 Tailwind 的樣式來美化清單項目
                    li.className = 'flex items-center justify-between p-4 bg-slate-50 hover:bg-white hover:shadow-md border border-transparent hover:border-slate-200 rounded-2xl transition-all duration-300';
                    
                    // 處理前三名的專屬圖示與顏色
                    let rankDisplay = `<span class="text-slate-400 font-bold">${index + 1}</span>`;
                    if (index === 0) rankDisplay = '<i class="fas fa-crown text-2xl text-yellow-400 drop-shadow-md"></i>';
                    else if (index === 1) rankDisplay = '<i class="fas fa-medal text-2xl text-slate-300 drop-shadow-md"></i>';
                    else if (index === 2) rankDisplay = '<i class="fas fa-award text-2xl text-amber-600 drop-shadow-md"></i>';

                    li.innerHTML = `
                        <div class="flex items-center gap-4">
                            <div class="w-10 text-center">${rankDisplay}</div>
                            <div>
                                <div class="font-extrabold text-slate-800 text-lg">${player.name || player.username}</div>
                                <div class="text-xs font-bold text-indigo-500 bg-indigo-50 px-2 py-0.5 rounded-md inline-block mt-1">Lv. ${player.level || 1}</div>
                            </div>
                        </div>
                        <div class="font-black text-xl text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-red-500">
                            ${player.xp} XP
                        </div>
                    `;
                    listContainer.appendChild(li);
                });

            } catch (error) {
                loadingMsg.innerHTML = "<span class='text-red-500 font-bold'><i class='fas fa-exclamation-triangle'></i> 無法連接到伺服器</span>";
                console.error(error);
            }
        }

        // 網頁載入後啟動
        document.addEventListener('DOMContentLoaded', () => {
            initProfile();
            loadLeaderboard();
        });
    </script>
