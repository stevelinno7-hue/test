<script>
        // 手機側邊欄開關
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        // 1. 開啟編輯視窗
        function openProfileModal() {
            const user = Auth.getCurrentUser();
            if (!user || user.username === 'guest') {
                alert("訪客無法修改年級，請先登入！");
                return;
            }
            const select = document.getElementById('editGradeSelect');
            if (user.grade) select.value = user.grade;
            document.getElementById('profileModal').classList.remove('hidden');
        }

        function closeProfileModal() {
            document.getElementById('profileModal').classList.add('hidden');
        }

        // 🌟 2. 儲存年級修改至雲端
        async function saveProfile() {
            const user = Auth.getCurrentUser();
            const newGrade = document.getElementById('editGradeSelect').value;
            
            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: "update_grade",
                        account: user.username,
                        newGrade: newGrade
                    })
                });
                const result = await response.json();
                if (result.status === "success") {
                    // 更新本地儲存
                    user.grade = newGrade;
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    alert("年級修改成功！");
                    location.reload(); // 重新載入畫面
                } else {
                    alert("修改失敗：" + result.message);
                }
            } catch (e) {
                alert("連線異常，請稍後再試");
            }
        }

        const GAS_URL = "https://script.google.com/macros/s/AKfycbzQlG5LVquExr4qDerEGX_OaeOPYqp9Nk2Xk7WuJRq55XOPzIQx977KjCCteiWuhGfY2Q/exec";

        // 🌟 3. 初始化個人資料與 XP
        async function initProfile() {
            let user = Auth.getCurrentUser();
            if (!user || user.username === 'guest') {
                document.getElementById('playerName').textContent = "訪客";
                document.getElementById('sideUserName').textContent = "訪客";
                return;
            }

            // 先顯示本地基礎資料
            document.getElementById('sideUserName').textContent = user.name || user.username;
            document.getElementById('playerName').textContent = user.name || user.username;
            document.getElementById('sideUserRole').textContent = user.grade || "學生";
            document.getElementById('playerRole').textContent = user.grade || "學生";

            try {
                // 這裡改用 get_leaderboard 並從中篩選出自己的資料 (因為你的 GAS 目前沒有 get_profile)
                const response = await fetch(`${GAS_URL}?action=get_leaderboard`);
                const topPlayers = await response.json();
                
                const me = topPlayers.find(p => p.username === user.username);

                if (me) {
                    const currentXP = me.xp || 0;
                    const level = me.level || 1;
                    
                    // 更新 UI
                    document.getElementById('playerLevel').textContent = `Lv. ${level}`;
                    
                    // 你的 GAS 邏輯是每 100 XP 一級，所以進度是 currentXP % 100
                    const xpInThisLevel = currentXP % 100;
                    const xpNeeded = 100 - xpInThisLevel;
                    
                    document.getElementById('xpText').textContent = `${xpInThisLevel} / 100`;
                    document.getElementById('xpNeeded').textContent = xpNeeded;
                    
                    setTimeout(() => {
                        const xpFill = document.getElementById('xpFill');
                        if (xpFill) xpFill.style.width = `${xpInThisLevel}%`;
                    }, 500);
                }
            } catch (error) {
                console.error("XP 資料載入失敗", error);
            }
        }

        // 🌟 4. 載入排行榜
        async function loadLeaderboard() {
            const listContainer = document.getElementById('leaderboardList');
            const loadingMsg = document.getElementById('loadingMsg');

            try {
                const response = await fetch(`${GAS_URL}?action=get_leaderboard`);
                const topPlayers = await response.json();
                
                loadingMsg.style.display = 'none'; 
                listContainer.innerHTML = ""; // 清空舊內容

                if (!topPlayers || topPlayers.length === 0 || topPlayers.error) {
                    listContainer.innerHTML = "<li class='text-center py-10 text-slate-400 font-medium bg-slate-50 rounded-2xl'>目前尚無排名紀錄</li>";
                    return;
                }

                topPlayers.forEach((player, index) => {
                    const li = document.createElement('li');
                    li.className = 'flex items-center justify-between p-4 bg-slate-50 hover:bg-white hover:shadow-md border border-transparent hover:border-slate-200 rounded-2xl transition-all duration-300';
                    
                    let rankDisplay = `<span class="text-slate-400 font-bold">${index + 1}</span>`;
                    if (index === 0) rankDisplay = '<i class="fas fa-crown text-2xl text-yellow-400"></i>';
                    else if (index === 1) rankDisplay = '<i class="fas fa-medal text-2xl text-slate-300"></i>';
                    else if (index === 2) rankDisplay = '<i class="fas fa-award text-2xl text-amber-600"></i>';

                    li.innerHTML = `
                        <div class="flex items-center gap-4">
                            <div class="w-10 text-center">${rankDisplay}</div>
                            <div>
                                <div class="font-extrabold text-slate-800 text-lg">${player.name || player.username}</div>
                                <div class="text-xs font-bold text-indigo-500 bg-indigo-50 px-2 py-0.5 rounded-md inline-block mt-1">Lv. ${player.level || 1}</div>
                            </div>
                        </div>
                        <div class="font-black text-xl text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-red-500">
                            ${player.xp} XP
                        </div>
                    `;
                    listContainer.appendChild(li);
                });

            } catch (error) {
                loadingMsg.innerHTML = "<span class='text-red-500 font-bold'>伺服器連線失敗</span>";
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initProfile();
            loadLeaderboard();
        });
    </script>
