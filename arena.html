    <script>
        // 手機側邊欄開關
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    
    if (sidebar.classList.contains('-translate-x-full')) {
        // 開啟
        sidebar.classList.remove('-translate-x-full');
        overlay.classList.remove('hidden');
    } else {
        // 關閉
        sidebar.classList.add('-translate-x-full');
        overlay.classList.add('hidden');
    }
}
    // 1. 開啟編輯視窗
    function openProfileModal() {
        const user = Auth.getCurrentUser();
        if (!user) {
            alert("請先登入！");
            return;
        }

        // 設定下拉選單為目前的年級
        const select = document.getElementById('editGradeSelect');
        if (user.grade) {
            select.value = user.grade;
        }
        
        // 顯示視窗
        document.getElementById('profileModal').classList.remove('hidden');
    }

    // 2. 關閉編輯視窗
    function closeProfileModal() {
        document.getElementById('profileModal').classList.add('hidden');
    }
        // ==========================================
        // 🚀 遊戲化與排行榜邏輯區
        // ==========================================
        
        // 🔗 填入你的 Google Apps Script 網址
        const GAS_URL = "你的_GOOGLE_APPS_SCRIPT_網址_填在這裡";

        // 1. 初始化個人狀態
        async function initProfile() {
            // 從你原本的 Auth 系統取得登入資料 (防呆機制)
            const user = (window.Auth && Auth.getCurrentUser()) || { username: 'guest', name: '訪客', grade: '未登入' };
            
            // 更新側邊欄
            document.getElementById('sideUserName').textContent = user.name;
            document.getElementById('sideUserRole').textContent = user.grade || '一般會員';

            if (user.username === 'guest') {
                document.getElementById('playerName').textContent = "訪客 (請先登入)";
                return;
            }

            try {
                // 向 Google 試算表請求最新 XP
                const response = await fetch(`${GAS_URL}?action=get_profile&username=${user.username}`);
                const cloudUser = await response.json();

                if(cloudUser.error) {
                    document.getElementById('playerName').textContent = user.name;
                    return;
                }

                // 寫入畫面
                document.getElementById('playerName').textContent = cloudUser.name;
                document.getElementById('playerLevel').textContent = `Lv. ${cloudUser.level}`;
                document.getElementById('playerRole').textContent = user.grade || '認真的學生';
                
                const currentXP = cloudUser.xp;
                const nextLevelXP = cloudUser.level * 100; 
                const xpNeeded = nextLevelXP - currentXP;
                
                document.getElementById('xpText').textContent = `${currentXP} / ${nextLevelXP}`;
                document.getElementById('xpNeeded').textContent = xpNeeded > 0 ? xpNeeded : 0;
                
                // 動態拉長進度條
                const percent = Math.min((currentXP / nextLevelXP) * 100, 100);
                setTimeout(() => { document.getElementById('xpFill').style.width = `${percent}%`; }, 300);

            } catch (error) {
                console.error("讀取個人資料失敗:", error);
                document.getElementById('playerName').textContent = user.name;
            }
        }

        // 2. 載入雲端排行榜
        async function loadLeaderboard() {
            const listContainer = document.getElementById('leaderboardList');
            const loadingMsg = document.getElementById('loadingMsg');

            try {
                const response = await fetch(`${GAS_URL}?action=get_leaderboard`);
                const topPlayers = await response.json();
                
                loadingMsg.style.display = 'none'; 
                
                if (!topPlayers || topPlayers.length === 0) {
                    listContainer.innerHTML = "<li class='text-center py-10 text-slate-400 font-medium bg-slate-50 rounded-2xl'>目前尚無排名紀錄，快去搶頭香！</li>";
                    return;
                }

                topPlayers.forEach((player, index) => {
                    const li = document.createElement('li');
                    // 使用 Tailwind 的樣式來美化清單項目
                    li.className = 'flex items-center justify-between p-4 bg-slate-50 hover:bg-white hover:shadow-md border border-transparent hover:border-slate-200 rounded-2xl transition-all duration-300';
                    
                    // 處理前三名的專屬圖示與顏色
                    let rankDisplay = `<span class="text-slate-400 font-bold">${index + 1}</span>`;
                    if (index === 0) rankDisplay = '<i class="fas fa-crown text-2xl text-yellow-400 drop-shadow-md"></i>';
                    else if (index === 1) rankDisplay = '<i class="fas fa-medal text-2xl text-slate-300 drop-shadow-md"></i>';
                    else if (index === 2) rankDisplay = '<i class="fas fa-award text-2xl text-amber-600 drop-shadow-md"></i>';

                    li.innerHTML = `
                        <div class="flex items-center gap-4">
                            <div class="w-10 text-center">${rankDisplay}</div>
                            <div>
                                <div class="font-extrabold text-slate-800 text-lg">${player.name || player.username}</div>
                                <div class="text-xs font-bold text-indigo-500 bg-indigo-50 px-2 py-0.5 rounded-md inline-block mt-1">Lv. ${player.level || 1}</div>
                            </div>
                        </div>
                        <div class="font-black text-xl text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-red-500">
                            ${player.xp} XP
                        </div>
                    `;
                    listContainer.appendChild(li);
                });

            } catch (error) {
                loadingMsg.innerHTML = "<span class='text-red-500 font-bold'><i class='fas fa-exclamation-triangle'></i> 無法連接到伺服器</span>";
                console.error(error);
            }
        }

        // 網頁載入後啟動
        document.addEventListener('DOMContentLoaded', () => {
            initProfile();
            loadLeaderboard();
        });
    </script>
