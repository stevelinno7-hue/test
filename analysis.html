                <div class="lg:col-span-8 bg-white rounded-2xl shadow-sm border border-gray-200 p-6 flex flex-col min-h-[350px]">

            <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 fade-in">

                            <h4 class="font-bold text-gray-700">作答節奏分析</h4>

                        <div class="flex items-center gap-3 mb-2">

                            答對 <span id="countCorrect" class="ml-1 opacity-60 text-xs"></span>
                        </button>
                        <button onclick="changeFilter('wrong', this)" class="filter-btn flex-1 md:flex-none py-2 px-6 rounded-lg text-sm font-bold transition-all duration-200 text-slate-500 hover:text-slate-700">

                <i class="fas fa-clipboard-list"></i>

                前往測驗中心
            </a>

        <div id="profileModal" class="hidden fixed inset-0 bg-black/50 z-[60] flex items-center justify-center backdrop-blur-sm fade-in">

                        <select id="editGradeSelect" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-xl focus:outline-none focus:border-blue-500 focus:bg-white appearance-none transition text-gray-700 font-bold">
                            <option value="國七">國七</option>
                            <option value="國八">國八</option>
                            <option value="國九">國九</option>
                            <hr>
                            <option value="高一">高一</option>
                            <option value="高二">高二</option>
                            <option value="高三">高三</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                            <i class="fas fa-chevron-down"></i>
                        </div>
                    </div>
                    <p class="text-xs text-gray-400 mt-3">※ 修改後，系統將會優先推薦該年級的題目。</p>
                </div>

                <div class="bg-gray-50 px-6 py-4 flex justify-end gap-3 border-t border-gray-100">
                    <button onclick="closeProfileModal()" class="px-4 py-2 text-gray-500 hover:text-gray-700 font-bold text-sm">取消</button>
                    <button onclick="saveProfile()" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 shadow-md hover:shadow-lg transition">
                        確認修改
                    </button>
                </div>
            </div>
        </div>
    </main>

<script>

// ==========================================
// 1. 全域設定與工具
// ==========================================
const GAS_URL = "https://script.google.com/macros/s/AKfycbzQlG5LVquExr4qDerEGX_OaeOPYqp9Nk2Xk7WuJRq55XOPzIQx977KjCCteiWuhGfY2Q/exec"; 
    // --- 核心主題引擎 ---
const ThemeEngine = {
    // 1. 執行變色
    apply: function(xp) {
        console.log("當前頁面主題判定中... XP:", xp);
        const body = document.body;
        body.classList.remove('theme-rookie', 'theme-bronze', 'theme-diamond', 'theme-master', 'theme-legend', 'theme-mythic');

        if (xp >= 50000) { body.classList.add('theme-mythic'); this.createStars(); }
        else if (xp >= 20000) body.classList.add('theme-legend');
        else if (xp >= 10000) body.classList.add('theme-master');
        else if (xp >= 5000) body.classList.add('theme-diamond');
        else if (xp >= 300) body.classList.add('theme-bronze');
        else if (xp >= 100) body.classList.add('theme-rookie');
    },

    // 2. 產生流星 (只有神話等級會觸發)
    createStars: function() {
        const container = document.getElementById('star-container');
        if (!container || container.hasChildNodes()) return;
        for (let i = 0; i < 6; i++) {
            let star = document.createElement('div');
            star.className = 'shooting-star'; // CSS 動畫已在上面定義
            star.style.top = Math.random() * 80 + 'vh';
            star.style.left = (Math.random() * 50 + 50) + 'vw';
            star.style.animationDelay = (Math.random() * 4) + 's';
            container.appendChild(star);
        }
    }
};

// --- 自動執行 ---
document.addEventListener('DOMContentLoaded', () => {
    // 讀取 currentUser，如果沒有就預設 0
    const user = JSON.parse(localStorage.getItem('currentUser') || '{"xp":0}');
    ThemeEngine.apply(user.xp);
});
document.addEventListener('DOMContentLoaded', () => {
    try {
        initUserInterface();
        loadExamResult();
    } catch (e) {
        console.error("系統初始化失敗:", e);
        alert("載入資料發生錯誤，請重新整理頁面。");
    }
});

function initUserInterface() {
    const user = Auth.getCurrentUser();
    if (user) {
        const nameEl = document.getElementById('sideUserName');
        const roleEl = document.getElementById('sideUserRole');
        if (nameEl) nameEl.textContent = user.name;
        if (roleEl) roleEl.textContent = user.grade || "學生";
        
        const select = document.getElementById('editGradeSelect');
        if (select && user.grade) select.value = user.grade;

        // ✨ 啟動檢查：如果已經改過年級，直接拔掉按鈕！
        if (localStorage.getItem(`hasUpdatedGrade_${user.username}`)) {
            const editBtn = document.querySelector('button[onclick="openProfileModal()"]');
            if (editBtn) editBtn.style.display = 'none';
        }
    }
}

// ==========================================
// 2. 核心邏輯：載入並渲染
// ==========================================
let allQuestionsData = []; 

function loadExamResult() {
    const resultStr = localStorage.getItem('examResult');
    const reportContent = document.getElementById('reportContent');
    const noDataMessage = document.getElementById('noDataMessage');

    if (!resultStr) {
        if (reportContent) reportContent.classList.add('hidden');
        if (noDataMessage) noDataMessage.classList.remove('hidden');
        updateMetaInfo("無測驗資料");
        return;
    }

    try {
        let rawResult = JSON.parse(resultStr);
        
        // ✨ 網頁一載入，立刻檢查這份考卷是不是已經存過了
        if (rawResult.isSaved) {
            hasSaved = true; 
            setTimeout(markButtonAsSaved, 0); 
        }

        const result = normalizeExamData(rawResult);
        allQuestionsData = result.questions || result.wrongList || [];

        updateScoreBoard(result);
        renderRadarChart(result.score, result.wrongList);
        applyCheatResult(result);
        
        updateFilterCounts();
        renderQuestionList(allQuestionsData); 

        // 自動同步判斷（如果沒存過才發送）
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('mode') === 'new' && !rawResult.isSaved) {
            saveToCloud();
            window.history.replaceState({}, document.title, window.location.pathname);
        }

    } catch (error) {
        console.error("載入解析失敗:", error);
    }
}

function updateFilterCounts() {
    const correctCount = allQuestionsData.filter(q => q.answer === q.yourAns).length;
    const wrongCount = allQuestionsData.filter(q => q.answer !== q.yourAns).length;
    
    if(document.getElementById('countAll')) document.getElementById('countAll').innerText = allQuestionsData.length;
    if(document.getElementById('countCorrect')) document.getElementById('countCorrect').innerText = correctCount;
    if(document.getElementById('countWrong')) document.getElementById('countWrong').innerText = wrongCount;
}

function changeFilter(type, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.remove('bg-white', 'text-blue-600', 'shadow-sm');
        b.classList.add('text-slate-500');
    });
    btn.classList.add('bg-white', 'text-blue-600', 'shadow-sm');
    btn.classList.remove('text-slate-500');

    let filteredData = [];
    if (type === 'all') filteredData = allQuestionsData;
    else if (type === 'correct') filteredData = allQuestionsData.filter(q => q.answer === q.yourAns);
    else if (type === 'wrong') filteredData = allQuestionsData.filter(q => q.answer !== q.yourAns);

    renderQuestionList(filteredData);
}

// ==========================================
// 3. 雲端同步邏輯 (防重複存檔優化)
// ==========================================
let isSyncing = false;
let hasSaved = false; 

function saveToCloud() {
    const btn = document.getElementById('btnSave');
    
    // 如果正在同步，或全域變數標記已存檔，直接擋掉
    if (isSyncing || hasSaved) return;

    const user = Auth.getCurrentUser();
    if (!user || user.username === 'guest') return;

    const resultStr = localStorage.getItem('examResult');
    if (!resultStr) return;
    const examResult = JSON.parse(resultStr);

    // 如果 localStorage 裡面已經有標記，也直接擋掉
    if (examResult.isSaved) {
        markButtonAsSaved();
        return;
    }

    isSyncing = true;
    
    if (btn) {
        btn.disabled = true; 
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 同步中...';
        btn.classList.add('opacity-75', 'cursor-not-allowed');
    }
const recordData = {
        action: "save_record",
        username: user.username,
        activity: examResult.title || "單元測驗",
        score: examResult.score,
        detail: JSON.stringify({
            grade: user.grade, 
            totalCount: examResult.totalCount,
            correctCount: examResult.correctCount,
            wrongList: examResult.wrongList || [],
            
            // 🌟 關鍵修復：就是補上這一行！讓完整題目跟著一起飛上雲端
            questions: examResult.questions || [], 
            
            cheat: examResult.cheat,
            tabSwitches: examResult.tabSwitches,
            syncTime: new Date().toISOString()
        })
    };
    fetch(GAS_URL, {
        method: "POST",
        mode: 'no-cors',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(recordData)
    })
    .then(() => {
        hasSaved = true; 
        isSyncing = false; 
        
        // ✨ 存檔成功後，在 localStorage 寫入標記
        examResult.isSaved = true;
        localStorage.setItem('examResult', JSON.stringify(examResult));

        markButtonAsSaved();
    })
    .catch(err => {
        console.error("同步失敗:", err);
        isSyncing = false; 
        hasSaved = false; 
        
        if (btn) {
            btn.disabled = false; 
            btn.innerHTML = '<i class="fas fa-exclamation-triangle"></i> 重試';
            btn.classList.remove('opacity-75', 'cursor-not-allowed');
            btn.classList.replace('bg-blue-600', 'bg-red-500');
        }
    });
}

// ✨ 按鈕鎖死專用函數
function markButtonAsSaved() {
    const btn = document.getElementById('btnSave');
    if (btn) {
        btn.className = "flex items-center gap-2 text-white bg-green-600 font-bold px-3 py-2 rounded-lg cursor-default shadow-none text-sm opacity-100";
        btn.innerHTML = '<i class="fas fa-check-circle"></i> 紀錄已送出';
        btn.onclick = null; 
        btn.disabled = true; 
    }
}

// ==========================================
// 4. 圖表渲染 (Radar Chart)
// ==========================================
function renderRadarChart(baseScore = 0, wrongList = []) {
    const canvas = document.getElementById('radarChart');
    if (!canvas) return;
    
    if (window.myRadarChart) {
        window.myRadarChart.destroy();
    }

    const ctx = canvas.getContext('2d');
    const labels = ["觀念理解", "邏輯推演", "運算能力", "圖表分析", "素養應用"];
    let chartData = labels.map(() => Math.min(100, Math.max(40, baseScore + 20)));

    wrongList.forEach(q => {
        const concept = q.concept || "";
        labels.forEach((label, index) => {
            if (concept.indexOf(label) > -1) {
                chartData[index] = Math.max(20, chartData[index] - 15);
            }
        });
    });

    window.myRadarChart = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: labels,
            datasets: [{
                label: '能力分佈',
                data: chartData,
                backgroundColor: 'rgba(37, 99, 235, 0.2)',
                borderColor: '#2563eb',
                pointBackgroundColor: '#2563eb',
                pointBorderColor: '#fff',
                pointHoverBackgroundColor: '#fff',
                pointHoverBorderColor: '#2563eb',
                borderWidth: 2
            }]
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false,
            scales: { 
                r: { 
                    min: 0, 
                    max: 100, 
                    ticks: { display: false, stepSize: 20 },
                    pointLabels: {
                        font: { size: 12, family: "'Noto Sans TC', sans-serif", weight: 'bold' },
                        color: '#4b5563'
                    },
                    grid: { color: '#e5e7eb' },
                    angleLines: { color: '#e5e7eb' }
                } 
            },
            plugins: { legend: { display: false } } 
        }
    });
}

// ==========================================
// 5. 錯題列表渲染
// ==========================================
function renderQuestionList(list) {
    const listContainer = document.getElementById('wrongList');
    if (!listContainer) return;
    listContainer.innerHTML = '';

    if (list.length === 0) {
        listContainer.innerHTML = `
            <div class="py-16 text-center text-slate-400 bg-white rounded-2xl border border-dashed border-slate-300">
                <i class="fas fa-inbox text-4xl mb-3 block opacity-20"></i>
                <p class="font-bold">此分類目前沒有題目</p>
            </div>`;
        return;
    }

    let fullHtml = '';
    list.forEach((q, idx) => {
        const isCorrect = (q.answer === q.yourAns); 
        let explainText = q.explanation ? (Array.isArray(q.explanation) ? q.explanation.join('<br>') : q.explanation) : "暫無詳細解析";
        
        let optionsHtml = '';
        if (q.options && Array.isArray(q.options)) {
            q.options.forEach((opt, optIdx) => {
                let styleClass = "bg-white border-gray-200 text-gray-600"; 
                let iconHtml = `<div class="w-8 h-8 rounded-full bg-gray-100 text-gray-500 flex items-center justify-center font-bold text-sm shrink-0 border border-gray-200">${String.fromCharCode(65+optIdx)}</div>`;
                let statusHtml = "";

                if (optIdx === q.answer) {
                    styleClass = "bg-green-50 border-green-300 text-green-800 ring-1 ring-green-200";
                    iconHtml = `<div class="w-8 h-8 rounded-full bg-green-500 text-white flex items-center justify-center font-bold text-sm shrink-0 shadow-sm"><i class="fas fa-check"></i></div>`;
                    statusHtml = `<div class="ml-auto text-green-600 text-xs font-bold bg-white px-2 py-1 rounded border border-green-100 shadow-sm">正確答案</div>`;
                } else if (optIdx === q.yourAns && !isCorrect) {
                    styleClass = "bg-red-50 border-red-300 text-red-800 ring-1 ring-red-200";
                    iconHtml = `<div class="w-8 h-8 rounded-full bg-red-500 text-white flex items-center justify-center font-bold text-sm shrink-0 shadow-sm"><i class="fas fa-times"></i></div>`;
                    statusHtml = `<div class="ml-auto text-red-500 text-xs font-bold bg-white px-2 py-1 rounded border border-red-100 shadow-sm">您的回答</div>`;
                }

                optionsHtml += `<div class="p-3 md:p-4 rounded-xl border flex items-center gap-3 transition mb-2 ${styleClass}">${iconHtml}<div class="flex-grow font-medium text-sm md:text-base">${opt}</div>${statusHtml}</div>`;
            });
        }

        const badgeClass = isCorrect ? "bg-green-100 text-green-700 border-green-200" : "bg-red-50 text-red-600 border-red-100";
        const badgeIcon = isCorrect ? "fa-check-circle" : "fa-times";
        const borderColor = isCorrect ? "border-green-200" : "border-gray-200";

        fullHtml += `
            <div class="bg-white rounded-2xl shadow-sm border ${borderColor} overflow-hidden transition hover:shadow-md">
                <div class="p-5 md:p-8 border-b border-gray-100">
                    <div class="flex flex-wrap items-center gap-2 mb-4">
                        <span class="${badgeClass} text-xs font-bold px-3 py-1 rounded-full border flex items-center">
                            <i class="fas ${badgeIcon} mr-1"></i> 第 ${idx+1} 題 (${isCorrect ? '答對' : '答錯'})
                        </span>
                        <span class="bg-blue-50 text-blue-600 text-xs font-bold px-3 py-1 rounded-full border border-blue-100">
                            ${q.concept || '綜合題型'}
                        </span>
                    </div>
                    <h3 class="text-lg font-bold text-gray-800 leading-relaxed mb-6">
                        ${q.question ? q.question.replace(/\n/g, '<br>') : ''}
                    </h3>
                    <div class="space-y-1">${optionsHtml}</div>
                </div>
                <div class="bg-slate-50 p-5 border-t border-slate-100">
                    <div class="flex items-start gap-4">
                        <div class="mt-1 w-8 h-8 bg-white text-yellow-500 rounded-full flex items-center justify-center shadow-sm border shrink-0">
                            <i class="fas fa-lightbulb"></i>
                        </div>
                        <div class="flex-grow">
                            <h4 class="font-bold text-slate-700 text-sm mb-2">解析重點</h4>
                            <div class="text-sm text-slate-600 leading-relaxed bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                ${explainText}
                            </div>
                        </div>
                    </div>
                </div>
            </div>`;
    });

    listContainer.innerHTML = fullHtml;
    if (window.MathJax) MathJax.typesetPromise([listContainer]);
}

// ==========================================
// 6. 輔助函式與 UI 操作
// ==========================================
function normalizeExamData(data) {
    if (!data.tabCheat) {
        const switches = data.tabSwitches || 0;
        let level = (switches > 5) ? 'HIGH' : (switches > 2 ? 'MEDIUM' : 'NORMAL');
        data.tabCheat = { level: level, totalSwitch: switches };
    }
    if (!data.cheat) {
        data.cheat = { cheatLevel: 'NORMAL', fastCount: 0 };
    }
    return data;
}

function updateScoreBoard(result) {
    document.getElementById('scoreDisplay').textContent = result.score || 0;
    document.getElementById('correctCount').textContent = result.correctCount || 0;
    document.getElementById('totalCount').textContent = result.totalCount || 0;
    const subject = result.subject || '單元測驗';
    const date = result.date || new Date().toLocaleDateString();
    updateMetaInfo(`${subject} | ${date}`);
}

function updateMetaInfo(text) {
    const el = document.getElementById('examMetaInfo');
    if (el) el.textContent = text;
}

function applyCheatResult(result) {
    const timeBox = document.getElementById('timeCheatBox');
    const timeText = document.getElementById('timeCheatText');
    const tabBox = document.getElementById('tabCheatBox');
    const tabText = document.getElementById('tabCheatText');

    const cheatData = result.cheat;
    const tabData = result.tabCheat;

    const styles = {
        'NORMAL': ['border-green-200', 'bg-green-50', 'text-green-700', '正常', 'fas fa-check-circle'],
        'MEDIUM': ['border-yellow-200', 'bg-yellow-50', 'text-yellow-700', '異常', 'fas fa-exclamation-circle'],
        'HIGH':   ['border-red-200', 'bg-red-50', 'text-red-700', '嚴重', 'fas fa-exclamation-triangle']
    };

    if (timeBox && timeText) {
        const s = styles[cheatData.cheatLevel] || styles['NORMAL'];
        timeBox.className = `p-5 rounded-xl border ${s[0]} ${s[1]} transition hover:shadow-md`;
        timeText.className = `text-sm font-bold ${s[2]} mt-1 pl-11`;
        timeText.innerHTML = `作答節奏${s[3]} (過快題數：${cheatData.fastCount || 0})`;
    }

    if (tabBox && tabText) {
        const s = styles[tabData.level] || styles['NORMAL'];
        tabBox.className = `p-5 rounded-xl border ${s[0]} ${s[1]} transition hover:shadow-md`;
        tabText.className = `text-sm font-bold ${s[2]} mt-1 pl-11`;
        tabText.innerHTML = `分頁切換${s[3]} (切換次數：${tabData.totalSwitch || 0})`;
    }
}

function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    if (sidebar.classList.contains('-translate-x-full')) {
        sidebar.classList.remove('-translate-x-full');
        overlay.classList.remove('hidden');
    } else {
        sidebar.classList.add('-translate-x-full');
        overlay.classList.add('hidden');
    }
}

// ==========================================
// 🛡️ 年級修改：永久單次鎖定
// ==========================================
function openProfileModal() {
    const user = Auth.getCurrentUser();
    if (!user) return alert("請先登入！");
    
    // ✨ 開啟前攔截：如果已經修改過，禁止開啟
    if (localStorage.getItem(`hasUpdatedGrade_${user.username}`)) {
        return alert("⚠️ 您已經修改過年級，系統限制只能存檔一次！");
    }

    const select = document.getElementById('editGradeSelect');
    if (user.grade) select.value = user.grade;
    document.getElementById('profileModal').classList.remove('hidden');
}

function closeProfileModal() {
    document.getElementById('profileModal').classList.add('hidden');
}

async function saveProfile() {
    const newGrade = document.getElementById('editGradeSelect').value;
    const user = Auth.getCurrentUser();
    if (!user) return alert("請先登入！");

    // ✨ 送出前攔截
    if (localStorage.getItem(`hasUpdatedGrade_${user.username}`)) {
        alert("⚠️ 系統限制只能存檔一次！");
        closeProfileModal();
        return;
    }

    const saveBtn = document.querySelector('#profileModal button[onclick="saveProfile()"]');
    const originalBtnText = saveBtn.innerText;

    saveBtn.disabled = true;
    saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 儲存中...';

    try {
        const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: "update_grade", 
                account: user.username,
                newGrade: newGrade
            })
        });

        const result = await response.json();

        // 兼容各種成功回傳
        if (result.result === "success" || result.status === "success") {
            if (Auth.updateUser) {
                Auth.updateUser('grade', newGrade);
            }
            
            const roleEl = document.getElementById('sideUserRole');
            if (roleEl) roleEl.innerText = newGrade;

            // ✨ 存檔成功，永久寫入防呆標記
            localStorage.setItem(`hasUpdatedGrade_${user.username}`, 'true');

            alert(`✅ 修改成功！目前年級已更新為：${newGrade}`);
            closeProfileModal();

            // 成功後，立刻把側邊欄的「編輯年級」按鈕拔掉
            const editBtn = document.querySelector('button[onclick="openProfileModal()"]');
            if (editBtn) editBtn.style.display = 'none';

        } else {
            alert("❌ 修改失敗：" + (result.message || "未知錯誤"));
        }
    } catch (error) {
        console.error("更新年級發生錯誤:", error);
        alert("網路連線異常，請稍後再試。");
    } finally {
        if (saveBtn) {
            saveBtn.disabled = false;
            saveBtn.innerText = originalBtnText;
        }
    }
}
</script>
