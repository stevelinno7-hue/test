// 手機側邊欄開關
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    
    if (sidebar.classList.contains('-translate-x-full')) {
        // 開啟
        sidebar.classList.remove('-translate-x-full');
        overlay.classList.remove('hidden');
    } else {
        // 關閉
        sidebar.classList.add('-translate-x-full');
        overlay.classList.add('hidden');
    }
}
// 1. 開啟編輯視窗
function openProfileModal() {
    const user = Auth.getCurrentUser();
    if (!user) {
        alert("請先登入！");
        return;
    }

    // 設定下拉選單為目前的年級
    const select = document.getElementById('editGradeSelect');
    if (user.grade) {
        select.value = user.grade;
    }
    
    // 顯示視窗
    document.getElementById('profileModal').classList.remove('hidden');
}

// 2. 關閉編輯視窗
function closeProfileModal() {
    document.getElementById('profileModal').classList.add('hidden');
}

// 3. 儲存修改
function saveProfile() {
    const newGrade = document.getElementById('editGradeSelect').value;
    
    // 呼叫 Auth 模組更新資料庫 (這會同時更新 LocalStorage 和 mockdata)
    if (Auth.updateUser) {
        Auth.updateUser('grade', newGrade);
        
        // 更新畫面上的文字
        const roleEl = document.getElementById('sideUserRole');
        if (roleEl) roleEl.innerText = newGrade;
        
        // 提示成功
        alert(`修改成功！目前年級已更新為：${newGrade}`);
        closeProfileModal();
        
        // 如果是在 dashboard，可能需要重新整理頁面以套用新題庫設定
        // location.reload(); 
    } else {
        console.error("Auth.updateUser 函式不存在，請檢查 auth.js");
        alert("系統錯誤：無法儲存資料");
    }
}
    // 登入驗證與個人資料初始化
    const currentUser = Auth.requireLogin();
    if (currentUser) {
        document.getElementById('sideUserName').textContent = currentUser.name;
        document.getElementById('sideUserRole').textContent = currentUser.grade || "學生";

const GAS_URL = "https://script.google.com/macros/s/AKfycbzQlG5LVquExr4qDerEGX_OaeOPYqp9Nk2Xk7WuJRq55XOPzIQx977KjCCteiWuhGfY2Q/exec";
    const dbKey = 'forum_posts';

    function toggleForm() {
        const form = document.getElementById('postForm');
        form.classList.toggle('hidden');
        if (!form.classList.contains('hidden')) document.getElementById('postTitle').focus();
    }

  
async function loadPosts() {
    const response = await fetch(`${GAS_URL}?action=get_forum_posts`);
    const allData = await response.json();
    
    // 1. 分離主貼文與回覆
    const mainPosts = allData.filter(p => !p.parentId);
    const replies = allData.filter(p => p.parentId);

    const container = document.getElementById('postList');
    container.innerHTML = ''; // 清空列表

    // 先把所有主貼文的「外殼」渲染出來
    mainPosts.reverse().forEach(post => {
        // 🌟 這裡呼叫 renderPost 並將結果加入 container
        container.innerHTML += renderPost(post);
    });

    // 🌟 等到所有主貼文都在網頁上了，再跑第二次迴圈填入回覆
    mainPosts.forEach(post => {
        const postReplies = replies.filter(r => r.parentId == post.id);
        const commentContainer = document.getElementById(`comments-${post.id}`);
        
        if (commentContainer) {
            postReplies.forEach(reply => {
                commentContainer.innerHTML += `
                    <div class="bg-slate-50 p-3 rounded-xl text-xs border border-slate-100 mb-2">
                        <span class="font-bold text-slate-700">${reply.author}：</span>
                        <span class="text-slate-600">${reply.content}</span>
                        <div class="text-[9px] text-slate-400 mt-1">${reply.date}</div>
                    </div>
                `;
            });
        }
    });
}

// 🌟 確保你的 renderPost 函式有回傳 HTML 字串，並且包含正確的 onclick
function renderPost(post) {
    return `
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 mb-4">
            <h3 class="text-lg font-bold text-slate-800">${post.title}</h3>
            <p class="text-slate-600 my-2">${post.content}</p>
            <div class="flex justify-between items-center text-xs text-slate-400 mb-3">
                <span>By ${post.author} | ${post.date}</span>
                <button onclick="showReplyInput('${post.id}')" class="text-blue-500 font-bold">回覆</button>
            </div>
            
            <div id="reply-area-${post.id}" style="display:none;" class="mb-3"></div>
            
            <div id="comments-${post.id}" class="space-y-2 border-l-2 border-slate-100 pl-4"></div>
        </div>
    `;
}
    // 顯示回覆輸入框的函式
function showReplyInput(postId) {
  // 找到該貼文下方的回覆容器
  const replyArea = document.getElementById(`reply-area-${postId}`);
  if (!replyArea) return;

  // 切換顯示/隱藏
  if (replyArea.style.display === 'none' || replyArea.style.display === '') {
    replyArea.style.display = 'block';
    replyArea.innerHTML = `
      <div style="margin-top: 10px; border-top: 1px dashed #ccc; padding-top: 10px;">
        <textarea id="reply-text-${postId}" placeholder="請輸入回覆內容..." style="width:100%; height:60px;"></textarea>
        <button onclick="submitReply('${postId}')" style="margin-top:5px; background-color:#28a745; color:white; border:none; padding:5px 10px; cursor:pointer; border-radius:4px;">提交回覆</button>
      </div>
    `;
  } else {
    replyArea.style.display = 'none';
  }
}

// 提交回覆到後端的函式
function submitReply(postId) {
  const content = document.getElementById(`reply-text-${postId}`).value;
  if (!content) return alert("內容不能為空");

  const user = JSON.parse(localStorage.getItem('user'));
  
  // 呼叫你的 GAS doPost
  fetch(googleWebAppUrl, {
    method: 'POST',
    body: JSON.stringify({
      action: 'add_forum_post',
      id: 'R' + Date.now(),
      date: new Date().toLocaleString(),
      username: user.username,
      name: user.name,
      content: content,
      parentId: postId // 🌟 這裡會對應到你 GAS 裡的 param.parentId
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.result === 'success') {
      alert("回覆成功！");
      loadPosts(); // 重新載入列表
    }
  });
}
    function renderPost(post) {
    const isAIReply = post.reply && (post.reply.author === "AI 助教" || post.reply.author === RealAITutor.name);
    
    // --- 處理 AI 回覆區塊 ---
    let replyHtml = '';
    if (post.reply) {
        const parsedContent = marked.parse(post.reply.content);
        const replyClass = isAIReply ? 'ai-reply-card' : 'bg-slate-50 border-slate-100';
        const replyIcon = isAIReply 
            ? `<div class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center text-sm shadow-md"><i class="fas fa-robot"></i></div>`
            : `<div class="w-8 h-8 rounded-full bg-slate-200 text-slate-600 flex items-center justify-center font-bold text-xs">師</div>`;
        
        replyHtml = `
            <div class="mt-4 p-5 rounded-2xl border ${replyClass} flex gap-4">
                <div class="flex-shrink-0">${replyIcon}</div>
                <div class="flex-grow min-w-0">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="font-bold text-sm text-slate-800">${post.reply.author}</span>
                        ${isAIReply ? '<span class="bg-blue-100 text-blue-700 text-[9px] px-1.5 py-0.5 rounded-md font-black">Verified AI</span>' : ''}
                    </div>
                    <div class="text-sm text-slate-700 markdown-body">${parsedContent}</div>
                </div>
            </div>`;
   } else {
    replyHtml = `
        <div class="mt-4 flex items-center justify-center gap-3 text-[11px] text-blue-400 bg-blue-50/50 px-4 py-4 rounded-xl border border-blue-100 border-dashed animate-pulse-soft">
            <i class="fas fa-spinner fa-spin"></i> 
            <span class="font-bold tracking-widest">AI 助教正在思考並查閱課本知識...</span>
        </div>`;
}

    // --- 處理真人留言區塊 (巢狀回覆) ---
    let commentsHtml = '';
    if (post.userComments && post.userComments.length > 0) {
        commentsHtml = post.userComments.map(comment => `
            <div class="flex gap-3 p-3 bg-slate-50/50 rounded-2xl border border-slate-100">
                <div class="w-6 h-6 rounded-full bg-slate-200 flex items-center justify-center text-[10px] font-bold text-slate-500">${comment.name[0]}</div>
                <div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-bold text-slate-700">${comment.name}</span>
                        <span class="text-[9px] text-slate-400">${comment.date}</span>
                    </div>
                    <p class="text-xs text-slate-600 mt-1">${comment.content}</p>
                </div>
            </div>
        `).join('');
    }

    // --- 組合最終 HTML ---
    const html = `
    <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 mb-6 fade-in">
        <div class="flex gap-4">
            <div class="w-10 h-10 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center font-bold">${post.author[0]}</div>
            <div>
                <h3 class="font-bold text-slate-800">${post.title}</h3>
                <p class="text-sm text-slate-500 mt-1">${post.content}</p>
            </div>
        </div>

        ${replyHtml}

        <div id="comments-${post.id}" class="mt-4 ml-12 space-y-3">
            ${commentsHtml}
        </div>

        <div class="mt-4 ml-12 flex items-center gap-4">
            <button onclick="showReplyInput(${post.id})" class="text-xs font-bold text-blue-500 hover:text-blue-700 transition-colors">
                <i class="fas fa-reply mr-1"></i> 我要回覆
            </button>
        </div>

        <div id="reply-box-${post.id}" class="hidden mt-3 ml-12">
            <div class="relative">
                <textarea id="input-${post.id}" 
                    class="w-full p-4 pr-16 text-sm border border-slate-200 rounded-2xl bg-slate-50 focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none" 
                    placeholder="寫下你的看法..."></textarea>
                <button onclick="submitReply(${post.id})" 
                    class="absolute right-2 bottom-2 bg-slate-800 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-black">
                    傳送
                </button>
            </div>
        </div>
    </div>`;

    document.getElementById('postList').insertAdjacentHTML('beforeend', html);
}
async function addPost() {
    const t = document.getElementById('postTitle').value;
    const c = document.getElementById('postContent').value;
    if (!t.trim() || !c.trim()) return;

    const user = Auth.getCurrentUser();
    const postId = Date.now(); // 產生唯一識別碼
    const postDate = new Date().toLocaleString();

    // 🚩 1. 本地清空輸入並隱藏表單
    document.getElementById('postTitle').value = '';
    document.getElementById('postContent').value = '';
    if (typeof toggleForm === 'function') toggleForm();
    
    try {
        // 🚀 第一步：先把學生的提問存到試算表
        await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: "add_forum_post",
                id: postId,
                username: user.username,
                name: user.name,
                title: t,
                content: c,
                date: postDate
            })
        });
        
        // 立即刷新列表，這時會出現「分析中」的區塊
        await loadPosts(); 

        // 🚀 第二步：呼叫 RealAITutor 拿 AI 答案
        const aiResponse = await RealAITutor.askGemini(t, c);

        // 🚀 第三步：把 AI 的答案存回試算表
        await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: "update_forum_reply",
                id: postId,
                replyAuthor: RealAITutor.name,
                replyContent: aiResponse 
            })
        });

        // 再次刷新，讓 AI 答案顯示出來
        await loadPosts();

    } catch (err) {
        console.error("發送失敗:", err);
        alert("連線不穩定，請稍後再試。");
    }
}
    //
    // ==========================================
    // ✨ 新增功能：偵測是否有來自「錯題本」的提問
    // ==========================================
    function checkForumDraft() {
        const draft = localStorage.getItem('forum_draft');
        
        if (draft) {
            try {
                const data = JSON.parse(draft);
                
                // 1. 強制開啟提問視窗
                const form = document.getElementById('postForm');
                if (form.classList.contains('hidden')) {
                    form.classList.remove('hidden');
                }

                // 2. 自動填入資料
                const titleInput = document.getElementById('postTitle');
                const contentInput = document.getElementById('postContent');
                
                titleInput.value = data.title || "";
                contentInput.value = data.content || "";
                
                // 3. 聚焦在內容框，方便學生繼續補充
                contentInput.focus();

                // 4. 清除草稿 (避免下次重新整理頁面時又跳出來)
                localStorage.removeItem('forum_draft');
                
            } catch (e) {
                console.error("讀取草稿失敗", e);
            }
        }
    }

    // ==========================================
    // 初始加載執行
    // ==========================================
    loadPosts();       // 原本的加載貼文
    checkForumDraft(); // ✨ 執行檢查草稿
</script>

   <script>
    // 🌟 全站公告邏輯：確保每個帳號在每則新公告發布時都只顯示一次
    let currentAnnVersion = null; 

    async function fetchAnnouncement() {
        // GAS URL 檢查
        const url = typeof GAS_URL !== 'undefined' ? GAS_URL : "https://script.google.com/macros/s/AKfycbzQlG5LVquExr4qDerEGX_OaeOPYqp9Nk2Xk7WuJRq55XOPzIQx977KjCCteiWuhGfY2Q/exec";
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                body: JSON.stringify({ action: "get_announcement" })
            });
            const resData = await response.json();
            
            // 判斷公告是否處於「啟用」狀態
            if (resData.result === "success" && resData.data && resData.data.isActive) {
                const ann = resData.data;
                currentAnnVersion = ann.version; 

                // 🌟 關鍵邏輯：取得當前登入者 ID（確保不同帳號登入有獨立的已讀紀錄）
                // 請確認你的 HTML 導覽列中有 id="teacherName" 的元素，或改用你的用戶變數
                const currentUser = document.getElementById('teacherName')?.innerText.trim() || "guest";
                const storageKey = `read_ann_${currentUser}`;
                
                // 從瀏覽器取出該使用者最後讀過的版本號
                const lastReadVersion = localStorage.getItem(storageKey);

                // 如果 版本號不一致（代表有新公告）或 從未讀過
                if (lastReadVersion !== currentAnnVersion) {
                    renderAnnouncement(ann);
                }
            }
        } catch (error) {
            console.error("無法抓取公告:", error);
        }
    }

    // 將資料塞入 HTML 並顯示
    function renderAnnouncement(ann) {
        document.getElementById('annDateDisplay').innerText = ann.date || "最新消息";
        document.getElementById('annTitleDisplay').innerText = ann.title;
        // 支援換行符號
        document.getElementById('annContentDisplay').innerHTML = ann.content.replace(/\n/g, '<br>');
        
        // 延遲顯示，增加視覺緩衝感
        setTimeout(showAnnouncement, 500);
    }

    function showAnnouncement() {
        const modal = document.getElementById('announcementModal');
        const content = document.getElementById('announcementContent');
        modal.classList.remove('hidden');
        // Tailwind 動畫觸發
        setTimeout(() => {
            modal.classList.remove('opacity-0');
            content.classList.remove('scale-95');
        }, 10);
    }

    function closeAnnouncement() {
        const modal = document.getElementById('announcementModal');
        const content = document.getElementById('announcementContent');
        
        modal.classList.add('opacity-0');
        content.classList.add('scale-95');
        
        setTimeout(() => { 
            modal.classList.add('hidden'); 
        }, 300);
        
        // 🌟 使用者點擊「我知道了」後，立即標記該帳號已讀取此版本
        if (currentAnnVersion) {
            const currentUser = document.getElementById('teacherName')?.innerText.trim() || "guest";
            localStorage.setItem(`read_ann_${currentUser}`, currentAnnVersion);
        }
    }

    window.addEventListener('DOMContentLoaded', fetchAnnouncement);
</script>
