<script>
    // ==========================================
// ✏️ 個人資料與介面功能
// ==========================================
const GAS_URL = "https://script.google.com/macros/s/AKfycbzQlG5LVquExr4qDerEGX_OaeOPYqp9Nk2Xk7WuJRq55XOPzIQx977KjCCteiWuhGfY2Q/exec";

// 手機側邊欄開關
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    sidebar.classList.toggle('-translate-x-full');
    overlay.classList.toggle('hidden');
}

// 開啟編輯視窗
function openProfileModal() {
    const user = Auth.getCurrentUser();
    if (!user) return alert("請先登入！");
    const select = document.getElementById('editGradeSelect');
    if (user.grade) select.value = user.grade;
    document.getElementById('profileModal').classList.remove('hidden');
}

function closeProfileModal() {
    document.getElementById('profileModal').classList.add('hidden');
}

async function saveProfile() {
    const newGrade = document.getElementById('editGradeSelect').value;
    const user = Auth.getCurrentUser();
    if (!user) return alert("請先登入！");

    const saveBtn = document.querySelector('#profileModal button[onclick="saveProfile()"]');
    const originalBtnText = saveBtn.innerText;

    // 1. 進入載入狀態
    saveBtn.disabled = true;
    saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 儲存中...';

    try {
        // 2. 發送請求給 GAS 後端
        const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: "update_grade", // 此 action 需與 GAS 後端對應
                account: user.account || user.username,
                newGrade: newGrade
            })
        });

        const result = await response.json();

        if (result.status === "success") {
            // 3. 伺服器成功更新後，才更新本地資料
            if (Auth.updateUser) {
                Auth.updateUser('grade', newGrade);
            }
            
            const roleEl = document.getElementById('sideUserRole');
            if (roleEl) roleEl.innerText = newGrade;

            alert(`✅ 修改成功！目前年級已更新為：${newGrade}`);
            closeProfileModal();
        } else {
            alert("❌ 修改失敗：" + (result.message || "未知錯誤"));
        }
    } catch (error) {
        console.error("更新年級發生錯誤:", error);
        alert("網路連線異常，請稍後再試。");
    } finally {
        saveBtn.disabled = false;
        saveBtn.innerText = originalBtnText;
    }
}

// 登入初始化
const currentUser = Auth.requireLogin();
if (currentUser) {
    document.getElementById('sideUserName').textContent = currentUser.name;
    document.getElementById('sideUserRole').textContent = currentUser.grade || "學生";
}


function toggleForm() {
    const form = document.getElementById('postForm');
    form.classList.toggle('hidden');
    if (!form.classList.contains('hidden')) document.getElementById('postTitle').focus();
}

// ==========================================
// 📢 論壇核心邏輯 (貼文與回覆)
// ==========================================

async function loadPosts() {
    // ⚠️ 請確認你的 HTML 標籤裡是 id="postList" 還是 id="postsContainer"
    const container = document.getElementById('postList') || document.getElementById('postsContainer');
    
    if (!container) {
        console.error("錯誤：找不到貼文顯示容器 (postList)");
        return;
    }

    container.innerHTML = '<div class="text-center p-10 text-slate-400 animate-pulse">稍等一下</div>';

    try {
        const response = await fetch(`${GAS_URL}?action=get_forum_posts`);
        const allData = await response.json();
        
        console.log("從雲端抓到的原始資料：", allData); // 👈 加入這一行，在 F12 檢查欄位名稱對不對

        if (!Array.isArray(allData)) {
            container.innerHTML = '<div class="text-center p-10 text-slate-400">目前尚無貼文。</div>';
            return;
        }

        const mainPosts = allData.filter(p => !p.parentId);
        const allReplies = allData.filter(p => p.parentId);

        container.innerHTML = ''; 

        mainPosts.reverse().forEach(post => {
            const userComments = allReplies.filter(r => String(r.parentId) === String(post.id));
            const html = renderPostTemplate(post, userComments);
            container.insertAdjacentHTML('beforeend', html);
        });
    } catch (e) {
        console.error("載入失敗：", e);
        container.innerHTML = '<div class="text-red-400 p-10">讀取貼文失敗，請檢查網路連線或 GAS 權限。</div>';
    }
}
function renderPostTemplate(post, userComments) {
    const id = post.id;
    const authorName = post.author || post.name || "學生";
    
    // 1. 容錯處理：確保內容不會顯示 undefined
    const displayTitle = post.title || "無標題提問";
    const displayContent = post.content || "（無內容）";
    const aiContent = post.aiReply || ""; 
    const hasAI = aiContent.trim() !== "" && aiContent !== "undefined";
    
    // 2. AI 區塊邏輯 (修正語法錯誤)
    let aiSection = ""; // 使用 let 才能在下面修改內容
    
    if (hasAI) {
        aiSection = `
            <div class="mt-4 p-5 rounded-2xl border ai-reply-card flex gap-4 bg-blue-50/30">
                <div class="flex-shrink-0">
                    <div class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center shadow-md">
                        <i class="fas fa-robot"></i>
                    </div>
                </div>
                <div class="flex-grow min-w-0">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="font-bold text-sm text-slate-800">AI 助教</span>
                        <span class="bg-blue-100 text-blue-700 text-[9px] px-1.5 py-0.5 rounded-md font-black">Verified AI</span>
                    </div>
                    <div class="text-sm text-slate-700 markdown-body">${marked.parse(aiContent)}</div>
                </div>
            </div>`;
    } else {
        aiSection = `
            <div class="mt-4 flex items-center justify-center gap-3 text-[11px] text-blue-400 bg-blue-50/50 px-4 py-4 rounded-xl border border-blue-100 border-dashed animate-pulse-soft">
                <i class="fas fa-spinner fa-spin"></i> 
                <span class="font-bold tracking-widest">AI 助教正在思考並查閱課本知識...</span>
            </div>`;
    }

    // 3. 真人留言處理
    const commentsHtml = userComments.map(c => {
        const cAuthor = c.author || c.name || "匿名";
        return `
            <div class="flex gap-3 p-3 bg-slate-50/50 rounded-2xl border border-slate-100 mb-2">
                <div class="w-6 h-6 rounded-full bg-slate-200 flex items-center justify-center text-[10px] font-bold text-slate-500">${cAuthor[0]}</div>
                <div class="flex-grow">
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-bold text-slate-700">${cAuthor}</span>
                        <span class="text-[9px] text-slate-400">${c.date || ""}</span>
                    </div>
                    <p class="text-xs text-slate-600 mt-1">${c.content || ""}</p>
                </div>
            </div>`;
    }).join('');

    // 4. 最終輸出
    return `
    <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 mb-6 fade-in">
        <div class="flex gap-4">
            <div class="w-10 h-10 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center font-bold text-lg">${authorName[0]}</div>
            <div class="flex-grow">
                <h3 class="font-bold text-slate-800 text-lg">${displayTitle}</h3>
                <p class="text-sm text-slate-500 mt-1 leading-relaxed">${displayContent}</p>
                <div class="text-[10px] text-slate-400 mt-2">由 ${authorName} 發表於 ${post.date || ""}</div>
            </div>
        </div>

        ${aiSection}

        <div id="comments-${id}" class="mt-4 ml-12 space-y-2">
            ${commentsHtml}
        </div>

        <div class="mt-4 ml-12 flex items-center gap-4">
            <button onclick="showReplyInput('${id}')" class="text-xs font-bold text-blue-500 hover:text-blue-700 transition-colors">
                <i class="fas fa-reply mr-1"></i> 我要回覆
            </button>
        </div>

        <div id="reply-box-${id}" class="hidden mt-3 ml-12">
            <div class="relative">
                <textarea id="input-${id}" class="w-full p-4 pr-16 text-sm border border-slate-200 rounded-2xl bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="寫下你的看法..."></textarea>
                <button onclick="submitReply('${id}')" class="absolute right-2 bottom-2 bg-slate-800 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-black transition-colors">傳送</button>
            </div>
        </div>
    </div>`;
}
function showReplyInput(postId) {
    const box = document.getElementById(`reply-box-${postId}`);
    if (box) box.classList.toggle('hidden');
}

async function submitReply(postId) {
    const input = document.getElementById(`input-${postId}`);
    const content = input.value.trim();
    if (!content) return alert("請輸入回覆內容");

    const user = Auth.getCurrentUser();
    
    try {
        const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: 'add_forum_post',
                id: 'R' + Date.now(),
                username: user.username,
                name: user.name,
                content: content,
                parentId: postId,
                date: new Date().toLocaleString()
            })
        });
        const data = await response.json();
        if (data.result === 'success') {
            input.value = '';
            showReplyInput(postId);
            loadPosts();
        }
    } catch (e) {
        alert("回覆失敗，請檢查連線");
    }
}

async function addPost() {
    const t = document.getElementById('postTitle').value;
    const c = document.getElementById('postContent').value;
    if (!t.trim() || !c.trim()) return alert("標題與內容不能為空");

    const user = Auth.getCurrentUser();
    const postId = Date.now();

    toggleForm();
    document.getElementById('postTitle').value = '';
    document.getElementById('postContent').value = '';

    try {
        // 1. 儲存提問
        await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: "add_forum_post",
                id: postId,
                username: user.username,
                name: user.name,
                title: t,
                content: c,
                date: new Date().toLocaleString()
            })
        });
        
        await loadPosts(); // 先秀出貼文（此時 AI 在思考）

        // 2. 呼叫 AI (RealAITutor 為你的自定義模組)
        const aiResponse = await RealAITutor.askGemini(t, c);

        // 3. 更新 AI 回覆到試算表
        await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: "update_forum_reply",
                id: postId,
                replyAuthor: "AI 助教",
                replyContent: aiResponse 
            })
        });

        await loadPosts(); // 更新 AI 內容
    } catch (err) {
        console.error(err);
    }
}

// ==========================================
// 📢 公告系統邏輯
// ==========================================

let currentAnnVersion = null; 

async function fetchAnnouncement() {
    try {
        const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ action: "get_announcement" })
        });
        const resData = await response.json();
        
        if (resData.result === "success" && resData.data && resData.data.isActive) {
            const ann = resData.data;
            currentAnnVersion = ann.version; 

            const user = Auth.getCurrentUser();
            const storageKey = `read_ann_${user ? user.username : 'guest'}`;
            const lastReadVersion = localStorage.getItem(storageKey);

            if (lastReadVersion !== currentAnnVersion) {
                renderAnnouncement(ann);
            }
        }
    } catch (error) {
        console.error("無法抓取公告:", error);
    }
}

function renderAnnouncement(ann) {
    const dateEl = document.getElementById('annDateDisplay');
    const titleEl = document.getElementById('annTitleDisplay');
    const contentEl = document.getElementById('annContentDisplay');

    // 檢查元素是否存在，存在才填入內容
    if (dateEl) dateEl.innerText = ann.date || "最新消息";
    if (titleEl) titleEl.innerText = ann.title || "";
    if (contentEl) contentEl.innerHTML = (ann.content || "").replace(/\n/g, '<br>');
    
    // 如果元素都齊全，才顯示彈窗
    if (dateEl && titleEl && contentEl) {
        setTimeout(showAnnouncement, 500);
    } else {
        console.error("找不到公告相關的 HTML 元素，請檢查 forum.html 是否包含公告 Modal 結構");
    }
}

function showAnnouncement() {
    const modal = document.getElementById('announcementModal');
    const content = document.getElementById('announcementContent');
    modal.classList.remove('hidden');
    setTimeout(() => {
        modal.classList.remove('opacity-0');
        content.classList.remove('scale-95');
    }, 10);
}

function closeAnnouncement() {
    const modal = document.getElementById('announcementModal');
    const content = document.getElementById('announcementContent');
    modal.classList.add('opacity-0');
    content.classList.add('scale-95');
    setTimeout(() => { modal.classList.add('hidden'); }, 300);
    
    if (currentAnnVersion) {
        const user = Auth.getCurrentUser();
        localStorage.setItem(`read_ann_${user ? user.username : 'guest'}`, currentAnnVersion);
    }
}

// ==========================================
// ✨ 檢查草稿功能
// ==========================================
function checkForumDraft() {
    const draft = localStorage.getItem('forum_draft');
    if (draft) {
        try {
            const data = JSON.parse(draft);
            const form = document.getElementById('postForm');
            if (form.classList.contains('hidden')) form.classList.remove('hidden');
            document.getElementById('postTitle').value = data.title || "";
            document.getElementById('postContent').value = data.content || "";
            document.getElementById('postContent').focus();
            localStorage.removeItem('forum_draft');
        } catch (e) { console.error(e); }
    }
}

// 初始化執行
window.addEventListener('DOMContentLoaded', () => {
    loadPosts();
    fetchAnnouncement();
    checkForumDraft();
});
</script>
