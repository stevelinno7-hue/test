                <div class="w-6 h-6 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center text-xs"><i class="fas fa-robot"></i></div>

<script>
    // ==========================================
// ✏️ 個人資料與介面功能
// ==========================================
const GAS_URL = "https://script.google.com/macros/s/AKfycbzQlG5LVquExr4qDerEGX_OaeOPYqp9Nk2Xk7WuJRq55XOPzIQx977KjCCteiWuhGfY2Q/exec";
// --- 核心主題引擎 ---
const ThemeEngine = {
    // 1. 執行變色
    apply: function(xp) {
        console.log("當前頁面主題判定中... XP:", xp);
        const body = document.body;
        body.classList.remove('theme-rookie', 'theme-bronze', 'theme-diamond', 'theme-master', 'theme-legend', 'theme-mythic');

        if (xp >= 50000) { body.classList.add('theme-mythic'); this.createStars(); }
        else if (xp >= 20000) body.classList.add('theme-legend');
        else if (xp >= 10000) body.classList.add('theme-master');
        else if (xp >= 5000) body.classList.add('theme-diamond');
        else if (xp >= 300) body.classList.add('theme-bronze');
        else if (xp >= 100) body.classList.add('theme-rookie');
    },

    // 2. 產生流星 (只有神話等級會觸發)
    createStars: function() {
        const container = document.getElementById('star-container');
        if (!container || container.hasChildNodes()) return;
        for (let i = 0; i < 6; i++) {
            let star = document.createElement('div');
            star.className = 'shooting-star'; // CSS 動畫已在上面定義
            star.style.top = Math.random() * 80 + 'vh';
            star.style.left = (Math.random() * 50 + 50) + 'vw';
            star.style.animationDelay = (Math.random() * 4) + 's';
            container.appendChild(star);
        }
    }
};

// --- 自動執行 ---
document.addEventListener('DOMContentLoaded', () => {
    // 讀取 currentUser，如果沒有就預設 0
    const user = JSON.parse(localStorage.getItem('currentUser') || '{"xp":0}');
    ThemeEngine.apply(user.xp);
});
// 手機側邊欄開關
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    sidebar.classList.toggle('-translate-x-full');
    overlay.classList.toggle('hidden');
}

// 開啟編輯視窗
function openProfileModal() {
    const user = Auth.getCurrentUser();
    if (!user) return alert("請先登入！");
    const select = document.getElementById('editGradeSelect');
    if (user.grade) select.value = user.grade;
    document.getElementById('profileModal').classList.remove('hidden');
}

function closeProfileModal() {
    document.getElementById('profileModal').classList.add('hidden');
}

async function saveProfile() {
    const newGrade = document.getElementById('editGradeSelect').value;
    const user = Auth.getCurrentUser();
    if (!user) return alert("請先登入！");

    const saveBtn = document.querySelector('#profileModal button[onclick="saveProfile()"]');
    const originalBtnText = saveBtn.innerText;

    // 1. 進入載入狀態
    saveBtn.disabled = true;
    saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 儲存中...';

    try {
        // 2. 發送請求給 GAS 後端
        const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: "update_grade", // 此 action 需與 GAS 後端對應
                account: user.account || user.username,
                newGrade: newGrade
            })
        });

        const result = await response.json();

        if (result.status === "success") {
            // 3. 伺服器成功更新後，才更新本地資料
            if (Auth.updateUser) {
                Auth.updateUser('grade', newGrade);
            }
            
            const roleEl = document.getElementById('sideUserRole');
            if (roleEl) roleEl.innerText = newGrade;

            alert(`✅ 修改成功！目前年級已更新為：${newGrade}`);
            closeProfileModal();
        } else {
            alert("❌ 修改失敗：" + (result.message || "未知錯誤"));
        }
    } catch (error) {
        console.error("更新年級發生錯誤:", error);
        alert("網路連線異常，請稍後再試。");
    } finally {
        saveBtn.disabled = false;
        saveBtn.innerText = originalBtnText;
    }
}

// 登入初始化
const currentUser = Auth.requireLogin();
if (currentUser) {
    document.getElementById('sideUserName').textContent = currentUser.name;
    document.getElementById('sideUserRole').textContent = currentUser.grade || "學生";
}


function toggleForm() {
    const form = document.getElementById('postForm');
    form.classList.toggle('hidden');
    if (!form.classList.contains('hidden')) document.getElementById('postTitle').focus();
}
// ==========================================
// 📢 論壇核心邏輯 (貼文與回覆) - 完美對話版
// ==========================================

async function loadPosts() {
    const container = document.getElementById('postList') || document.getElementById('postsContainer');
    if (!container) return;
    container.innerHTML = '<div class="text-center p-10 text-slate-400 animate-pulse"><i class="fas fa-spinner fa-spin text-3xl mb-3"></i><br>正在同步雲端討論區資料...</div>';

    try {
        const response = await fetch(`${GAS_URL}?action=get_forum_posts`);
        const posts = await response.json();

        if (!Array.isArray(posts) || posts.length === 0) {
            container.innerHTML = '<div class="text-center p-12 bg-white rounded-[2rem] border border-slate-100 shadow-sm"><i class="fas fa-comments text-5xl text-slate-200 mb-4"></i><p class="text-slate-500 font-bold">目前尚無貼文，來發佈第一個問題吧！</p></div>';
            return;
        }

        container.innerHTML = ''; 
        posts.reverse().forEach(post => {
            const html = renderPostTemplate(post);
            container.insertAdjacentHTML('beforeend', html);
        });
    } catch (e) {
        console.error(e);
        container.innerHTML = '<div class="text-center text-red-400 p-10 bg-red-50 rounded-2xl"><i class="fas fa-exclamation-triangle text-3xl mb-2"></i><p class="font-bold">讀取貼文失敗，請檢查網路連線。</p></div>';
    }
}

function renderPostTemplate(post) {
    const id = post.id;
    const authorName = post.author || post.name || post.username || "學生";
    const displayTitle = post.title || "無標題提問";
    const displayContent = post.content || "（無內容）";
    
    const aiContent = post.aiReply || ""; 
    const hasAI = aiContent.trim() !== "";
    let aiSection = ""; 
    
  if (hasAI) {
        const parsedAI = typeof marked !== 'undefined' ? marked.parse(aiContent) : aiContent;
        // 使用貼文的 id 來做為 AI 內容區塊的唯一識別碼
        const aiBodyId = `ai-content-${id}`;
        
        aiSection = `
            <div class="mt-4 p-5 rounded-2xl border ai-reply-card flex gap-4 bg-blue-50/30">
                <div class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center shadow-md shrink-0"><i class="fas fa-robot"></i></div>
                <div class="flex-grow min-w-0">
                    <div class="flex items-center justify-between mb-2">
                        <span class="font-bold text-sm text-slate-800">AI 助教</span>
                        <button onclick="toggleAIReply('${aiBodyId}', this)" class="text-[11px] font-bold text-blue-500 hover:text-blue-700 bg-blue-100/50 hover:bg-blue-100 px-2 py-1 rounded transition flex items-center">
                            <i class="fas fa-chevron-down mr-1"></i> 展開
                        </button>
                    </div>
                    <div id="${aiBodyId}" class="text-sm text-slate-700 markdown-body transition-all duration-300 hidden">
                        ${parsedAI}
                    </div>
                </div>
            </div>`;
    } else {
        aiSection = `
            <div class="mt-4 flex items-center justify-center gap-3 text-[11px] text-blue-500 bg-blue-50/50 px-4 py-4 rounded-xl border border-blue-100 border-dashed animate-pulse-soft">
                <i class="fas fa-spinner fa-spin"></i> <span class="font-bold tracking-widest">AI 正在思考並查閱課本知識...</span>
            </div>`;
    }

    // ✨ 渲染所有留言 (老師親自回覆 + 學生底下留言)
    let repliesHtml = "";
    if (post.replies && post.replies.length > 0) {
        repliesHtml = post.replies.map(r => {
            if (r.isTeacher) {
                return `
                <div class="mt-3 p-4 rounded-2xl border-l-4 border-indigo-500 bg-indigo-50 flex gap-3 shadow-sm">
                    <div class="w-8 h-8 rounded-full bg-indigo-600 text-white flex items-center justify-center shrink-0 shadow-md"><i class="fas fa-chalkboard-teacher text-sm"></i></div>
                    <div>
                        <span class="text-[10px] font-black text-indigo-800 bg-indigo-200 px-2 py-0.5 rounded uppercase tracking-widest">老師親自回覆</span>
                        <p class="text-sm font-bold text-slate-800 mt-1 whitespace-pre-wrap leading-relaxed">${r.content}</p>
                    </div>
                </div>`;
            } else {
                return `
                <div class="mt-2 p-3 bg-slate-50/80 rounded-2xl border border-slate-100 flex gap-3">
                    <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-xs font-bold text-slate-500 shrink-0">${r.author[0]}</div>
                    <div class="flex-grow">
                        <div class="flex items-center gap-2">
                            <span class="text-xs font-bold text-slate-700">${r.author}</span>
                            <span class="text-[9px] text-slate-400">${r.date || ''}</span>
                        </div>
                        <p class="text-xs text-slate-600 mt-1 whitespace-pre-wrap">${r.content}</p>
                    </div>
                </div>`;
            }
        }).join('');
    }

    return `
    <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 mb-6 fade-in">
        <div class="flex gap-4">
            <div class="w-10 h-10 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center font-bold text-lg shrink-0">${authorName[0]}</div>
            <div class="flex-grow">
                <h3 class="font-bold text-slate-800 text-lg">${displayTitle}</h3>
                <p class="text-sm text-slate-500 mt-1 leading-relaxed whitespace-pre-wrap">${displayContent}</p>
                <div class="text-[10px] text-slate-400 mt-2">由 ${authorName} 發表於 ${post.timestamp || post.date || ""}</div>
            </div>
        </div>

        ${aiSection}
        
        <div class="mt-4 ml-12 space-y-2">
            ${repliesHtml}
        </div>

        <div class="mt-4 ml-12 flex items-center gap-4">
            <button onclick="showReplyInput('${id}')" class="text-xs font-bold text-blue-500 hover:text-blue-700 transition-colors">
                <i class="fas fa-reply mr-1"></i> 我要回覆
            </button>
        </div>

        <div id="reply-box-${id}" class="hidden mt-3 ml-12 relative fade-in">
            <textarea id="input-${id}" class="w-full p-4 pr-16 text-sm border border-slate-200 rounded-2xl bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none transition-all resize-none h-20" placeholder="寫下你的看法..."></textarea>
            <button onclick="submitReply('${id}')" class="absolute right-2 bottom-2 bg-slate-800 text-white px-4 py-2 rounded-xl text-xs font-bold hover:bg-black transition-colors shadow-md">傳送</button>
        </div>
    </div>`;
}
function showReplyInput(postId) {
    const box = document.getElementById(`reply-box-${postId}`);
    if (box) box.classList.toggle('hidden');
}

async function submitReply(postId) {
    const input = document.getElementById(`input-${postId}`);
    const content = input.value.trim();
    if (!content) return alert("請輸入回覆內容");

    const user = Auth.getCurrentUser();
    
    try {
        const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: 'add_forum_post',
                id: 'R' + Date.now(),
                username: user.username,
                name: user.name,
                content: content,
                parentId: postId,
                date: new Date().toLocaleString()
            })
        });
        const data = await response.json();
        if (data.result === 'success') {
            input.value = '';
            showReplyInput(postId);
            loadPosts();
        }
    } catch (e) {
        alert("回覆失敗，請檢查連線");
    }
}

async function addPost() {
    const t = document.getElementById('postTitle').value;
    const c = document.getElementById('postContent').value;
    if (!t.trim() || !c.trim()) return alert("標題與內容不能為空");

    const user = Auth.getCurrentUser();
    const postId = Date.now();

    toggleForm();
    document.getElementById('postTitle').value = '';
    document.getElementById('postContent').value = '';

    try {
        // 1. 儲存提問
        await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: "add_forum_post",
                id: postId,
                username: user.username,
                name: user.name,
                title: t,
                content: c,
                date: new Date().toLocaleString()
            })
        });
        
        await loadPosts(); // 先秀出貼文（此時 AI 在思考）

        // 2. 呼叫 AI (RealAITutor 為你的自定義模組)
        const aiResponse = await RealAITutor.askGemini(t, c);

        // 3. 更新 AI 回覆到試算表
        await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: "update_forum_reply",
                id: postId,
                replyAuthor: "AI 助教",
                replyContent: aiResponse 
            })
        });

        await loadPosts(); // 更新 AI 內容
    } catch (err) {
        console.error(err);
    }
}

// ==========================================
// 📢 公告系統邏輯
// ==========================================

let currentAnnVersion = null; 

async function fetchAnnouncement() {
    try {
        const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ action: "get_announcement" })
        });
        const resData = await response.json();
        
        if (resData.result === "success" && resData.data && resData.data.isActive) {
            const ann = resData.data;
            currentAnnVersion = ann.version; 

            const user = Auth.getCurrentUser();
            const storageKey = `read_ann_${user ? user.username : 'guest'}`;
            const lastReadVersion = localStorage.getItem(storageKey);

            if (lastReadVersion !== currentAnnVersion) {
                renderAnnouncement(ann);
            }
        }
    } catch (error) {
        console.error("無法抓取公告:", error);
    }
}

function renderAnnouncement(ann) {
    const dateEl = document.getElementById('annDateDisplay');
    const titleEl = document.getElementById('annTitleDisplay');
    const contentEl = document.getElementById('annContentDisplay');

    // 檢查元素是否存在，存在才填入內容
    if (dateEl) dateEl.innerText = ann.date || "最新消息";
    if (titleEl) titleEl.innerText = ann.title || "";
    if (contentEl) contentEl.innerHTML = (ann.content || "").replace(/\n/g, '<br>');
    
    // 如果元素都齊全，才顯示彈窗
    if (dateEl && titleEl && contentEl) {
        setTimeout(showAnnouncement, 500);
    } else {
        console.error("找不到公告相關的 HTML 元素，請檢查 forum.html 是否包含公告 Modal 結構");
    }
}

function showAnnouncement() {
    const modal = document.getElementById('announcementModal');
    const content = document.getElementById('announcementContent');
    modal.classList.remove('hidden');
    setTimeout(() => {
        modal.classList.remove('opacity-0');
        content.classList.remove('scale-95');
    }, 10);
}

function closeAnnouncement() {
    const modal = document.getElementById('announcementModal');
    const content = document.getElementById('announcementContent');
    modal.classList.add('opacity-0');
    content.classList.add('scale-95');
    setTimeout(() => { modal.classList.add('hidden'); }, 300);
    
    if (currentAnnVersion) {
        const user = Auth.getCurrentUser();
        localStorage.setItem(`read_ann_${user ? user.username : 'guest'}`, currentAnnVersion);
    }
}

// ==========================================
// ✨ 檢查草稿功能
// ==========================================
function checkForumDraft() {
    const draft = localStorage.getItem('forum_draft');
    if (draft) {
        try {
            const data = JSON.parse(draft);
            const form = document.getElementById('postForm');
            if (form.classList.contains('hidden')) form.classList.remove('hidden');
            document.getElementById('postTitle').value = data.title || "";
            document.getElementById('postContent').value = data.content || "";
            document.getElementById('postContent').focus();
            localStorage.removeItem('forum_draft');
        } catch (e) { console.error(e); }
    }
}
// ==========================================
// 🤖 切換 AI 回覆收起/展開
// ==========================================
function toggleAIReply(contentId, btn) {
    const contentEl = document.getElementById(contentId);
    
    // 如果目前是隱藏狀態 -> 展開
    if (contentEl.classList.contains('hidden')) {
        contentEl.classList.remove('hidden');
        btn.innerHTML = '<i class="fas fa-chevron-up mr-1"></i> 收起';
    } 
    // 如果目前是顯示狀態 -> 收起
    else {
        contentEl.classList.add('hidden');
        btn.innerHTML = '<i class="fas fa-chevron-down mr-1"></i> 展開';
    }
}
// 初始化執行
window.addEventListener('DOMContentLoaded', () => {
    loadPosts();
    fetchAnnouncement();
    checkForumDraft();
});
</script>
