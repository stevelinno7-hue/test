/* --- 2. 讓卡片內容稍微透出背景，但不至於看不清楚 --- */

body.theme-mythic .bg-white {
    background-color: rgba(255, 255, 255, 0.1) !important; /* 半透明白色 */

}

/* 修正原本寫死為 text-slate-800 的文字 */

}
        /* 當主題啟動時，讓特定的區塊變透明，透出底層背景色 */

/* 修正手機端可能出現的白色區塊 */

body[class*="theme-"] section,

/* 讓手機端的底部導覽列（如果有）也透明 */

    document.addEventListener('DOMContentLoaded', () => {

            return;

        // 2. 檢查是否有登入者

            window.location.href = 'index.html'; // 假設你的登入頁是 index.html
        }
    });
</script>

   <script>
        window.onload = function() {
            // 確保 Auth 物件存在，避免報錯 (如果只測試前端 UI，可以註解掉這塊)
            if (typeof Auth !== 'undefined') {
                const user = Auth.getCurrentUser();
                if(user) {
                    document.getElementById('sideUserName').textContent = user.name;
                    document.getElementById('sideUserRole').textContent = user.grade;
                    if(user.grade && user.grade.includes('國')) setStage('junior_high');
                    else setStage('high_school');
                } else {
                    setStage('high_school');
                }
            } else {
                console.warn('Auth module not loaded, defaulting to high school.');
                setStage('high_school');
            }
        };

 const GAS_URL = "https://script.google.com/macros/s/AKfycbzQlG5LVquExr4qDerEGX_OaeOPYqp9Nk2Xk7WuJRq55XOPzIQx977KjCCteiWuhGfY2Q/exec";
       const ThemeEngine = {
    // 1. 執行變色
    apply: function(xp) {
        console.log("當前頁面主題判定中... XP:", xp);
        const body = document.body;
        body.classList.remove('theme-rookie', 'theme-bronze', 'theme-diamond', 'theme-master', 'theme-legend', 'theme-mythic');

        if (xp >= 50000) { body.classList.add('theme-mythic'); this.createStars(); }
        else if (xp >= 20000) body.classList.add('theme-legend');
        else if (xp >= 10000) body.classList.add('theme-master');
        else if (xp >= 5000) body.classList.add('theme-diamond');
        else if (xp >= 300) body.classList.add('theme-bronze');
        else if (xp >= 100) body.classList.add('theme-rookie');
    },

    // 2. 產生流星 (只有神話等級會觸發)
    createStars: function() {
        const container = document.getElementById('star-container');
        if (!container || container.hasChildNodes()) return;
        for (let i = 0; i < 6; i++) {
            let star = document.createElement('div');
            star.className = 'shooting-star'; // CSS 動畫已在上面定義
            star.style.top = Math.random() * 80 + 'vh';
            star.style.left = (Math.random() * 50 + 50) + 'vw';
            star.style.animationDelay = (Math.random() * 4) + 's';
            container.appendChild(star);
        }
    }
};

// 3. 儲存修改
async function saveProfile() {
    const newGrade = document.getElementById('editGradeSelect').value;
    const user = Auth.getCurrentUser();
    if (!user) return alert("請先登入！");

    const saveBtn = document.querySelector('#profileModal button[onclick="saveProfile()"]');
    const originalBtnText = saveBtn.innerText;

    // 1. 進入載入狀態
    saveBtn.disabled = true;
    saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 儲存中...';

    try {
        // 2. 發送請求給 GAS 後端
        const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: "update_grade", // 此 action 需與 GAS 後端對應
                account: user.account || user.username,
                newGrade: newGrade
            })
        });

        const result = await response.json();

        if (result.status === "success") {
            // 3. 伺服器成功更新後，才更新本地資料
            if (Auth.updateUser) {
                Auth.updateUser('grade', newGrade);
            }
            
            const roleEl = document.getElementById('sideUserRole');
            if (roleEl) roleEl.innerText = newGrade;

            alert(`✅ 修改成功！目前年級已更新為：${newGrade}`);
            closeProfileModal();
        } else {
            alert("❌ 修改失敗：" + (result.message || "未知錯誤"));
        }
    } catch (error) {
        console.error("更新年級發生錯誤:", error);
        alert("網路連線異常，請稍後再試。");
    } finally {
        saveBtn.disabled = false;
        saveBtn.innerText = originalBtnText;
    }
}

   <script>
    // 🌟 全站公告邏輯：確保每個帳號在每則新公告發布時都只顯示一次
    let currentAnnVersion = null; 

    async function fetchAnnouncement() {
        // GAS URL 檢查
        const url = typeof GAS_URL !== 'undefined' ? GAS_URL : "https://script.google.com/macros/s/AKfycbzQlG5LVquExr4qDerEGX_OaeOPYqp9Nk2Xk7WuJRq55XOPzIQx977KjCCteiWuhGfY2Q/exec";
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                body: JSON.stringify({ action: "get_announcement" })
            });
            const resData = await response.json();
            
            // 判斷公告是否處於「啟用」狀態
            if (resData.result === "success" && resData.data && resData.data.isActive) {
                const ann = resData.data;
                currentAnnVersion = ann.version; 

                // 🌟 關鍵邏輯：取得當前登入者 ID（確保不同帳號登入有獨立的已讀紀錄）
                // 請確認你的 HTML 導覽列中有 id="teacherName" 的元素，或改用你的用戶變數
                const currentUser = document.getElementById('teacherName')?.innerText.trim() || "guest";
                const storageKey = `read_ann_${currentUser}`;
                
                // 從瀏覽器取出該使用者最後讀過的版本號
                const lastReadVersion = localStorage.getItem(storageKey);

                // 如果 版本號不一致（代表有新公告）或 從未讀過
                if (lastReadVersion !== currentAnnVersion) {
                    renderAnnouncement(ann);
                }
            }
        } catch (error) {
            console.error("無法抓取公告:", error);
        }
    }

    // 將資料塞入 HTML 並顯示
    function renderAnnouncement(ann) {
        document.getElementById('annDateDisplay').innerText = ann.date || "最新消息";
        document.getElementById('annTitleDisplay').innerText = ann.title;
        // 支援換行符號
        document.getElementById('annContentDisplay').innerHTML = ann.content.replace(/\n/g, '<br>');
        
        // 延遲顯示，增加視覺緩衝感
        setTimeout(showAnnouncement, 500);
    }

    function showAnnouncement() {
        const modal = document.getElementById('announcementModal');
        const content = document.getElementById('announcementContent');
        modal.classList.remove('hidden');
        // Tailwind 動畫觸發
        setTimeout(() => {
            modal.classList.remove('opacity-0');
            content.classList.remove('scale-95');
        }, 10);
    }

    function closeAnnouncement() {
        const modal = document.getElementById('announcementModal');
        const content = document.getElementById('announcementContent');
        
        modal.classList.add('opacity-0');
        content.classList.add('scale-95');
        
        setTimeout(() => { 
            modal.classList.add('hidden'); 
        }, 300);
        
        // 🌟 使用者點擊「我知道了」後，立即標記該帳號已讀取此版本
        if (currentAnnVersion) {
            const currentUser = document.getElementById('teacherName')?.innerText.trim() || "guest";
            localStorage.setItem(`read_ann_${currentUser}`, currentAnnVersion);
        }
    }

    window.addEventListener('DOMContentLoaded', fetchAnnouncement);
</script>
