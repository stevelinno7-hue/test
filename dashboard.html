   <script>
        window.onload = function() {
            // 確保 Auth 物件存在，避免報錯 (如果只測試前端 UI，可以註解掉這塊)

// ==========================================
// ✏️ 個人資料編輯功能
// ==========================================
// 手機側邊欄開關
 const GAS_URL = "https://script.google.com/macros/s/AKfycbzQlG5LVquExr4qDerEGX_OaeOPYqp9Nk2Xk7WuJRq55XOPzIQx977KjCCteiWuhGfY2Q/exec";

 // --- 核心主題引擎 (12 個階級升級版) ---
// ==========================================
// 🎨 核心主題引擎 (12 個階級升級版)
// ==========================================
const ThemeEngine = {
    apply: function(xp) {
        console.log("儀表板主題判定中... XP:", xp);
        const body = document.body;
        
        // 清除舊主題
        body.classList.remove(
            'theme-novice', 'theme-rookie', 'theme-bronze', 'theme-silver', 
            'theme-gold', 'theme-diamond', 'theme-master', 'theme-grandmaster', 
            'theme-legend', 'theme-epic', 'theme-mythic', 'theme-celestial'
        );

        // 根據 XP 判定並加入新主題
        if (xp >= 100000) { body.classList.add('theme-celestial'); this.createStars(15); } 
        else if (xp >= 50000) { body.classList.add('theme-mythic'); this.createStars(8); } 
        else if (xp >= 30000) body.classList.add('theme-epic');         
        else if (xp >= 20000) body.classList.add('theme-legend');       
        else if (xp >= 15000) body.classList.add('theme-grandmaster');  
        else if (xp >= 10000) body.classList.add('theme-master');       
        else if (xp >= 5000)  body.classList.add('theme-diamond');      
        else if (xp >= 2500)  body.classList.add('theme-gold');         
        else if (xp >= 1000)  body.classList.add('theme-silver');       
        else if (xp >= 300)   body.classList.add('theme-bronze');       
        else if (xp >= 100)   body.classList.add('theme-rookie');       
        else                  body.classList.add('theme-novice');       
    },

    createStars: function(starCount) {
        const container = document.getElementById('star-container');
        if (!container || container.hasChildNodes()) return; 
        
        for (let i = 0; i < starCount; i++) {
            let star = document.createElement('div');
            star.className = 'shooting-star'; 
            star.style.top = Math.random() * 80 + 'vh';
            star.style.left = (Math.random() * 50 + 50) + 'vw';
            star.style.animationDelay = (Math.random() * 4) + 's';
            container.appendChild(star);
        }
    }
};

// 網頁載入時自動執行主題變色
document.addEventListener('DOMContentLoaded', () => {
    let userXP = 0;
    if (typeof Auth !== 'undefined') {
        const user = Auth.getCurrentUser();
        if (user && user.xp) userXP = user.xp;
    } else {
        const localUser = JSON.parse(localStorage.getItem('currentUser') || '{"xp":0}');
        userXP = localUser.xp;
    }
    ThemeEngine.apply(userXP);
});
function toggleSidebar() {

    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    
    if (sidebar.classList.contains('-translate-x-full')) {
        // 開啟
        sidebar.classList.remove('-translate-x-full');
        overlay.classList.remove('hidden');
    } else {
        // 關閉
        sidebar.classList.add('-translate-x-full');
        overlay.classList.add('hidden');
    }
}
// 1. 開啟編輯視窗
function openProfileModal() {
    const user = Auth.getCurrentUser();
    if (!user) {
        alert("請先登入！");
        return;
    }

    // 設定下拉選單為目前的年級
    const select = document.getElementById('editGradeSelect');
    if (user.grade) {
        select.value = user.grade;
    }
    
    // 顯示視窗
    document.getElementById('profileModal').classList.remove('hidden');
}

// 2. 關閉編輯視窗
function closeProfileModal() {
    document.getElementById('profileModal').classList.add('hidden');
}

// 3. 儲存修改
async function saveProfile() {
    const newGrade = document.getElementById('editGradeSelect').value;
    const user = Auth.getCurrentUser();
    if (!user) return alert("請先登入！");

    const saveBtn = document.querySelector('#profileModal button[onclick="saveProfile()"]');
    const originalBtnText = saveBtn.innerText;

    // 1. 進入載入狀態
    saveBtn.disabled = true;
    saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 儲存中...';

    try {
        // 2. 發送請求給 GAS 後端
        const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: "update_grade", // 此 action 需與 GAS 後端對應
                account: user.account || user.username,
                newGrade: newGrade
            })
        });

        const result = await response.json();

        if (result.status === "success") {
            // 3. 伺服器成功更新後，才更新本地資料
            if (Auth.updateUser) {
                Auth.updateUser('grade', newGrade);
            }
            
            const roleEl = document.getElementById('sideUserRole');
            if (roleEl) roleEl.innerText = newGrade;

            alert(`✅ 修改成功！目前年級已更新為：${newGrade}`);
            closeProfileModal();
        } else {
            alert("❌ 修改失敗：" + (result.message || "未知錯誤"));
        }
    } catch (error) {
        console.error("更新年級發生錯誤:", error);
        alert("網路連線異常，請稍後再試。");
    } finally {
        saveBtn.disabled = false;
        saveBtn.innerText = originalBtnText;
    }
}
        function setStage(stage) {
            document.getElementById('currentStage').value = stage;
            const btnHigh = document.getElementById('btnHigh');
            const btnJunior = document.getElementById('btnJunior');
            
            if (stage === 'high_school') {
                btnHigh.className = "px-4 py-1.5 rounded-md transition shadow-sm bg-white text-gray-800 font-bold";
                btnJunior.className = "px-4 py-1.5 rounded-md transition text-gray-500 hover:text-gray-700 font-bold";
            } else {
                btnHigh.className = "px-4 py-1.5 rounded-md transition text-gray-500 hover:text-gray-700 font-bold";
                btnJunior.className = "px-4 py-1.5 rounded-md transition shadow-sm bg-white text-gray-800 font-bold";
            }
            renderCourses();
        }

       // 產生課程卡片 HTML (修正版：鎖定年級)
        function renderCourses() {
            const stage = document.getElementById('currentStage').value;
            const container = document.getElementById('courseContainer');
            if(!container) return;
            
            container.innerHTML = '';

            // ✨ 1. 抓取使用者目前的具體年級 (例如：國七)
            const user = (typeof Auth !== 'undefined') ? Auth.getCurrentUser() : null;
            // 如果使用者的年級符合當前階段 (例如他是國七，現在在看國中區)，就用他的年級
            // 否則 (例如他是高一，但切換去看國中區)，就用該階段的統稱 (junior_high)
            let targetGrade = stage;
            if (user && user.grade) {
                if (stage === 'junior_high' && user.grade.includes('國')) targetGrade = user.grade;
                if (stage === 'high_school' && user.grade.includes('高')) targetGrade = user.grade;
            }

            // 定義基礎科目
            let subjects = [
                { id: 'chinese', name: '國文', icon: 'fa-book-open', color: 'red' },
                { id: 'math', name: '數學', icon: 'fa-calculator', color: 'blue' },
                { id: 'english', name: '英文', icon: 'fa-language', color: 'purple' },
            ];

            // 依據階段加入不同自然科
            if (stage === 'junior_high') {
                subjects.push(
                    { id: 'biology', name: '生物', icon: 'fa-leaf', color: 'green' }, 
                    { id: 'science', name: '理化', icon: 'fa-flask', color: 'indigo' }, 
                    { id: 'earth', name: '地科', icon: 'fa-globe', color: 'orange' } 
                );
            } else {
                subjects.push(
                    { id: 'physics', name: '物理', icon: 'fa-atom', color: 'indigo' },
                    { id: 'chemistry', name: '化學', icon: 'fa-vial', color: 'pink' },
                    { id: 'biology', name: '生物', icon: 'fa-leaf', color: 'green' },
                    { id: 'earth', name: '地科', icon: 'fa-globe', color: 'orange' }
                );
            }

            // 加入社會科
            subjects.push(
                { id: 'geography', name: '地理', icon: 'fa-globe-americas', color: 'cyan' },
                { id: 'history', name: '歷史', icon: 'fa-landmark', color: 'amber' },
                { id: 'civics', name: '公民', icon: 'fa-balance-scale', color: 'teal' }
            );

            // 生成卡片
            subjects.forEach((sub, idx) => {
                // ✨ 2. 在連結中傳遞具體的 targetGrade
                const linkHref = `course_hub.html?subject=${sub.id}&grade=${encodeURIComponent(targetGrade)}&title=${encodeURIComponent(sub.name)}`;
                
                const html = `
                    <a href="${linkHref}" class="course-card bg-white rounded-xl p-6 flex flex-col items-center text-center hover:bg-${sub.color}-50 group fade-in" style="animation-delay: ${idx * 0.05}s">
                        <div class="w-16 h-16 rounded-2xl bg-${sub.color}-100 text-${sub.color}-600 flex items-center justify-center text-3xl mb-4 group-hover:scale-110 transition">
                            <i class="fas ${sub.icon}"></i>
                        </div>
                        <h3 class="text-xl font-bold text-gray-800 mb-2">${sub.name}</h3>
                        <p class="text-xs text-gray-400 font-bold bg-gray-50 px-3 py-1 rounded-full border">
                            ${targetGrade.includes('high') ? (stage === 'high_school' ? '高中全冊' : '國中全冊') : targetGrade}
                        </p>
                        <div class="mt-4 w-full pt-4 border-t border-gray-100 flex justify-center text-${sub.color}-600 font-bold text-sm">
                            進入課程 <i class="fas fa-arrow-right ml-2 mt-1"></i>
                        </div>
                    </a>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        }
    </script>
