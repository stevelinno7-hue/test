    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzQlG5LVquExr4qDerEGX_OaeOPYqp9Nk2Xk7WuJRq55XOPzIQx977KjCCteiWuhGfY2Q/exec"; 

        // ==========================================
        // 📱 UI 與個人資料編輯功能
        // ==========================================
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        function openProfileModal() {
            const user = Auth.getCurrentUser();
            if (!user) return alert("請先登入！");
            const select = document.getElementById('editGradeSelect');
            if (user.grade) select.value = user.grade;
            document.getElementById('profileModal').classList.remove('hidden');
        }

        function closeProfileModal() {
            document.getElementById('profileModal').classList.add('hidden');
        }

        async function saveProfile() {
            const newGrade = document.getElementById('editGradeSelect').value;
            const user = Auth.getCurrentUser();
            if (!user) return alert("請先登入！");

            const saveBtn = document.querySelector('#profileModal button[onclick="saveProfile()"]');
            const originalBtnText = saveBtn.innerText;
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 儲存中...';

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "update_grade", account: user.account || user.username, newGrade: newGrade })
                });
                const result = await response.json();
                if (result.status === "success") {
                    if (Auth.updateUser) Auth.updateUser('grade', newGrade);
                    const roleEl = document.getElementById('sideUserRole');
                    if (roleEl) roleEl.innerText = newGrade;
                    alert(`✅ 修改成功！目前年級已更新為：${newGrade}`);
                    closeProfileModal();
                } else {
                    alert("❌ 修改失敗：" + (result.message || "未知錯誤"));
                }
            } catch (error) {
                console.error("更新年級發生錯誤:", error);
                alert("網路連線異常，請稍後再試。");
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerText = originalBtnText;
            }
        }

        // ==========================================
        // 💾 資料處理與渲染核心 (學習歷程 & 錯題)
        // ==========================================
        let historyDB = [];
        let wrongDB = [];
        let historyKey = "";
        let wrongKey = "";

        window.onload = function() {
            if (typeof Auth === 'undefined') return;
            const user = Auth.getCurrentUser();
            
            if(user) {
                const nameEl = document.getElementById('sideUserName');
                const roleEl = document.getElementById('sideUserRole');
                if(nameEl) nameEl.textContent = user.name;
                if(roleEl) roleEl.textContent = user.grade;
            }

            historyKey = user ? `history_${user.username}` : `history_guest`;
            wrongKey = user ? `wrong_questions_${user.username}` : `wrong_questions_guest`;

            loadLocalData();
            renderAll();
            fetchAnnouncement(); // 啟動公告檢查

            if (user && user.username !== 'guest') {
                syncFromCloud(user.username);
            }
        };

        function loadLocalData() {
            historyDB = []; wrongDB = [];
            if (historyKey) {
                try {
                    const data = JSON.parse(localStorage.getItem(historyKey));
                    if (Array.isArray(data)) historyDB = data;
                } catch(e) { console.error(e); }
            }
            if (wrongKey) {
                try {
                    const data = JSON.parse(localStorage.getItem(wrongKey));
                    if (Array.isArray(data)) wrongDB = data;
                } catch(e) { console.error(e); }
            }
            sortAndFilter();
        }

        function syncFromCloud(username) {
            const hCount = document.getElementById('historyCount');
            const wCount = document.getElementById('wrongCount');
            if(hCount) hCount.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            if(wCount) wCount.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            fetch(`${GAS_URL}?username=${username}`)
            .then(res => res.json())
            .then(cloudData => {
                const myData = cloudData.filter(item => (item.owner || item.username) === username);
                const localIds = new Set(historyDB.map(item => item.id));
                
                myData.forEach(item => {
                    if (!localIds.has(item.id)) historyDB.push(item);
                });

                let cloudWrongQuestions = [];
                myData.forEach(exam => {
                    if (exam.wrongList && Array.isArray(exam.wrongList)) {
                        cloudWrongQuestions = cloudWrongQuestions.concat(exam.wrongList);
                    }
                });

                wrongDB = wrongDB.concat(cloudWrongQuestions);
                sortAndFilter();
                
                if(historyKey) localStorage.setItem(historyKey, JSON.stringify(historyDB));
                if(wrongKey) localStorage.setItem(wrongKey, JSON.stringify(wrongDB));
                renderAll();
            })
            .catch(err => {
                console.error("同步失敗:", err);
                updateCounts(); 
            });
        }

        function sortAndFilter() {
            historyDB.sort((a, b) => b.id - a.id);
            const uniqueWrongs = [];
            const seen = new Set();
            wrongDB.forEach(q => {
                if(!seen.has(q.question)) {
                    seen.add(q.question);
                    uniqueWrongs.push(q);
                }
            });
            wrongDB = uniqueWrongs;
        }

        function renderAll() {
            renderHistory();
            renderWrong();
            updateCounts();
        }

        function updateCounts() {
            const hCount = document.getElementById('historyCount');
            const wCount = document.getElementById('wrongCount');
            if(hCount) hCount.textContent = historyDB.length;
            if(wCount) wCount.textContent = wrongDB.length;
        }

        function renderHistory() {
            const container = document.getElementById('historyList');
            const empty = document.getElementById('historyEmpty');
            if(!container) return;
            container.innerHTML = '';

            if (historyDB.length === 0) {
                if(empty) empty.classList.remove('hidden');
                return;
            }
            if(empty) empty.classList.add('hidden');

            historyDB.forEach(record => {
                let scoreColor = record.score >= 90 ? "text-green-600" : (record.score < 60 ? "text-red-600" : "text-gray-600");
                const html = `
                    <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition flex items-center justify-between cursor-pointer" onclick="viewResult(${record.id})">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 bg-blue-50 rounded-full flex items-center justify-center text-blue-500 font-bold text-lg">${record.score}</div>
                            <div>
                                <h3 class="font-bold text-gray-800">${record.title}</h3>
                                <p class="text-xs text-gray-500">${record.date || '未知日期'} • 答對 ${record.correctCount}/${record.totalCount}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-xs px-2 py-1 rounded bg-gray-100 text-gray-600">${record.subject || '一般'}</span>
                            <i class="fas fa-chevron-right text-gray-300"></i>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
        }

        function renderWrong() {
            const container = document.getElementById('wrongList');
            const empty = document.getElementById('wrongEmpty');
            if(!container) return;
            container.innerHTML = '';

            if (wrongDB.length === 0) {
                if(empty) empty.classList.remove('hidden');
                return;
            }
            if(empty) empty.classList.add('hidden');

            wrongDB.forEach((q, idx) => {
                let optionsHtml = '';
                if(q.options) {
                    q.options.forEach((opt, i) => {
                        let style = "bg-white border-gray-200 text-gray-600";
                        let icon = String.fromCharCode(65+i);
                        if (i === q.answer) style = "bg-green-50 border-green-300 text-green-800";
                        else if (i === q.yourAns) style = "bg-red-50 border-red-300 text-red-800";
                        optionsHtml += `<div class="p-2 border rounded mb-1 flex items-center gap-2 ${style}"><span class="font-bold">${icon}</span> ${opt}</div>`;
                    });
                }

                const explain = (q.explanation && Array.isArray(q.explanation)) ? q.explanation.join('<br>') : (q.explanation || "無解析");
                const safeQuestion = q.question.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                
                // ✨ 已徹底移除「已懂」按鈕，只保留 AI 解題
                const html = `
                    <div class="bg-white rounded-xl border border-gray-200 p-6 shadow-sm group hover:border-blue-200 transition">
                        <div class="flex justify-between items-start mb-4">
                            <h3 class="font-bold text-gray-800 text-lg flex-grow mr-4">${q.question}</h3>
                            <div class="flex gap-2 shrink-0">
                                <button onclick="askInForum('${safeQuestion}')" class="px-3 py-1.5 bg-blue-50 text-blue-600 rounded-lg text-xs font-bold hover:bg-blue-100 transition flex items-center gap-1">
                                    <i class="fas fa-comment-dots"></i> AI 解題
                                </button>
                            </div>
                        </div>
                        <div class="space-y-1 mb-4 text-sm">${optionsHtml}</div>
                        <div class="bg-slate-50 p-4 rounded text-sm text-slate-700 border-l-4 border-indigo-400">
                            <strong>解析：</strong><br>${explain}
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', html);
            });
            if (window.MathJax) MathJax.typesetPromise();
        }

        window.askInForum = function(qText) {
            const targetQ = wrongDB.find(q => q.question.replace(/'/g, "\\'").replace(/"/g, '&quot;') === qText || q.question === qText);
            if (targetQ) {
                const draftPost = {
                    title: `[請教] 關於錯題：${targetQ.question.substring(0, 15)}...`,
                    content: `AI 老師您好，我在練習時做錯了這題，請幫我詳細解說觀念：\n\n**題目**：\n${targetQ.question}\n\n**我的選項**：${targetQ.options[targetQ.yourAns]}\n**正確答案**：${targetQ.options[targetQ.answer]}\n\n**我不懂的地方**：\n(請在此輸入您的疑問)`
                };
                localStorage.setItem('forum_draft', JSON.stringify(draftPost));
                window.location.href = 'forum.html';
            } else {
                alert("發生錯誤：找不到該題目資料");
            }
        };

        window.viewResult = function(recordId) {
            const record = historyDB.find(r => r.id === recordId);
            if (record) {
                localStorage.setItem('examResult', JSON.stringify(record));
                window.location.href = "analysis.html";
            }
        };

        window.switchTab = function(tab) {
            const histBtn = document.getElementById('tab-history');
            const wrongBtn = document.getElementById('tab-wrong');
            const histView = document.getElementById('historyView');
            const wrongView = document.getElementById('wrongView');

            if (tab === 'history') {
                histBtn.className = "pb-3 px-2 tab-active transition";
                wrongBtn.className = "pb-3 px-2 tab-inactive transition";
                histView.classList.remove('hidden');
                wrongView.classList.add('hidden');
            } else {
                histBtn.className = "pb-3 px-2 tab-inactive transition";
                wrongBtn.className = "pb-3 px-2 tab-active transition";
                histView.classList.add('hidden');
                wrongView.classList.remove('hidden');
                if (window.MathJax) MathJax.typesetPromise();
            }
        };

        // ==========================================
        // 📢 系統公告功能 
        // ==========================================
        let currentAnnVersion = null; 
        async function fetchAnnouncement() {
            try {
                const response = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "get_announcement" }) });
                const resData = await response.json();
                
                if (resData.result === "success" && resData.data && resData.data.isActive) {
                    const ann = resData.data;
                    currentAnnVersion = ann.version; 
                    const currentUser = Auth.getCurrentUser()?.username || "guest";
                    const storageKey = `read_ann_${currentUser}`;
                    const lastReadVersion = localStorage.getItem(storageKey);

                    if (lastReadVersion !== currentAnnVersion) {
                        renderAnnouncement(ann);
                    }
                }
            } catch (error) { console.error("無法抓取公告:", error); }
        }

        function renderAnnouncement(ann) {
            document.getElementById('annDateDisplay').innerText = ann.date || "最新消息";
            document.getElementById('annTitleDisplay').innerText = ann.title;
            document.getElementById('annContentDisplay').innerHTML = ann.content.replace(/\n/g, '<br>');
            setTimeout(showAnnouncement, 500);
        }

        function showAnnouncement() {
            const modal = document.getElementById('announcementModal');
            const content = document.getElementById('announcementContent');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                content.classList.remove('scale-95');
            }, 10);
        }

        function closeAnnouncement() {
            const modal = document.getElementById('announcementModal');
            const content = document.getElementById('announcementContent');
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
            
            if (currentAnnVersion) {
                const currentUser = Auth.getCurrentUser()?.username || "guest";
                localStorage.setItem(`read_ann_${currentUser}`, currentAnnVersion);
            }
        }
    </script>
</body>
</html>
