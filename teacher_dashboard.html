                                <option value="english">英文</option>
                                <option value="biology">生物</option>
                                <option value="physics">理化(物理)</option>
                                <option value="chemistry">理化(化學)</option>
                                <option value="earth_science">地球科學</option>
                                <option value="history">歷史</option>
                                <option value="geography">地理</option>
                                <option value="civics">公民</option>


                                    </select>
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-blue-200 mb-2">抓題範圍標籤 (選填)</label>
                                    <input type="text" id="assignTags" placeholder="例: 國九,相似形" class="w-full bg-white/20 border border-white/30 rounded-xl px-4 py-3 text-white placeholder-white/60 focus:bg-white/30 outline-none text-sm">
                                </div>
                            </div>
                        </div>

                        <div id="dispatchMessageSettings" class="hidden pt-2 border-t border-white/10">

                            <textarea id="assignMessage" rows="3" placeholder="提醒同學記得帶圓規..." class="w-full bg-white/20 border border-white/30 rounded-xl px-4 py-3 text-white placeholder-white/60 focus:bg-white/30 outline-none text-sm resize-none"></textarea>
                        </div>
                    </div>

                    <button onclick="sendDispatch(this)" class="w-full bg-yellow-400 text-blue-900 font-black py-4 rounded-xl shadow-lg hover:bg-yellow-300 transition text-lg">
                        <i class="fas fa-paper-plane mr-2"></i> 立即發布任務
                    </button>
                </div>
            </div>

          <div id="tab-questions" class="tab-content hidden max-w-4xl mx-auto space-y-6">
                <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">

                        <div>

                            <select id="qSubject" class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-slate-700 outline-none focus:ring-2 focus:ring-purple-400 font-bold shadow-sm">
                                <option value="math">數學</option>
                                <option value="english">英文</option>
                                <option value="biology">生物</option>
                                <option value="physics">理化(物理)</option>

                                <option value="earth_science">地球科學</option>
                                <option value="history">歷史</option>
                                <option value="geography">地理</option>
                                <option value="civics">公民</option>

                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-2">2. 適用年級/冊別</label>
                            <select id="qGrade" class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-slate-700 outline-none focus:ring-2 focus:ring-purple-400 shadow-sm">
                                <option value="七上">七上</option>
                                <option value="七下">七下</option>
                                <option value="八上">八上</option>
                                <option value="八下">八下</option>
                                <option value="九上">九上</option>
                                <option value="九下">九下</option>
                                <option value="全冊複習">全冊複習</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-2">3. 單元 / 章節名稱</label>
                            <input type="text" id="qChapter" placeholder="例: 1-1 相似形" class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-purple-400 shadow-sm">

                        <div>
                            <label class="block text-xs font-bold text-slate-500 mb-2">4. 題目難易度</label>
                            <select id="qLevel" class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-slate-700 outline-none focus:ring-2 focus:ring-purple-400 shadow-sm">
                                <option value="基礎">🟢 基礎題</option>
                                <option value="進階">🟡 進階題</option>
                                <option value="難題">🔴 挑戰難題</option>
                                <option value="素養">📚 素養題</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="mb-5">
                        <label class="block text-xs font-bold text-slate-500 mb-2">題目敘述</label>
                        <textarea id="qText" rows="3" placeholder="請輸入完整的題目敘述..." class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-700 outline-none resize-none focus:ring-2 focus:ring-purple-400"></textarea>
                    </div>
                    
                    <div class="mb-6 p-6 bg-slate-50 border border-slate-100 rounded-2xl">

                        <input type="text" id="qCorrect" placeholder="輸入正確答案..." class="w-full bg-white border border-green-300 rounded-xl px-4 py-3 mb-5 text-sm font-bold text-green-700 outline-none focus:ring-2 focus:ring-green-400">
                        
                        <label class="block text-sm font-black text-red-500 mb-2"><i class="fas fa-times-circle mr-1"></i> 錯誤干擾項 (3個)</label>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                            <input type="text" id="qWrong1" placeholder="干擾項 1" class="bg-white border border-red-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-red-400">
                            <input type="text" id="qWrong2" placeholder="干擾項 2" class="bg-white border border-red-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-red-400">
                            <input type="text" id="qWrong3" placeholder="干擾項 3" class="bg-white border border-red-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-red-400">
                        </div>
                    </div>

                    <button onclick="createSmartQuestion(this)" class="w-full bg-purple-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-purple-700 transition text-lg flex justify-center items-center">
                        <i class="fas fa-save mr-2"></i> 寫入雲端題庫
                    </button>
                </div>

                <div class="bg-indigo-50 border border-indigo-100 p-8 rounded-3xl shadow-sm">
                    <h3 class="text-xl font-bold text-indigo-900 mb-2"><i class="fas fa-play-circle text-indigo-500 mr-2"></i>模擬出題與預覽</h3>
                    <p class="text-sm text-indigo-700 mb-5">輸入範圍後立即從題庫抓題，以教師專屬的「上帝視角」（包含解答標示）預覽考卷。</p>
                    
                    <div class="flex flex-col md:flex-row space-y-3 md:space-y-0 md:space-x-3">
                        <select id="mockSubject" class="bg-white border border-indigo-200 rounded-xl px-4 py-3 text-sm outline-none font-bold text-indigo-900 focus:ring-2 focus:ring-indigo-400">
                            <option value="math">數學</option>
                                <option value="english">英文</option>
                                <option value="biology">生物</option>
                                <option value="physics">理化(物理)</option>
                                <option value="chemistry">理化(化學)</option>
                                <option value="earth_science">地球科學</option>
                                <option value="history">歷史</option>
                                <option value="geography">地理</option>
                                <option value="civics">公民</option>
                        </select>
                        <input type="text" id="mockTags" placeholder="欲測試之標籤 (例: 單元測試)" class="flex-1 bg-white border border-indigo-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-indigo-400">

                            <i class="fas fa-search-plus mr-2"></i>預覽考卷

                    </div>
                </div>
            </div>

            <div id="tab-students" class="tab-content hidden">
                <div class="bg-white rounded-3xl shadow-sm overflow-hidden border border-slate-200">
                    <div class="p-6 border-b border-slate-100 flex flex-col md:flex-row justify-between items-center bg-slate-50 space-y-4 md:space-y-0">
                        <h3 class="font-bold text-slate-800 text-xl"><i class="fas fa-users text-blue-500 mr-2"></i>班級學生名冊</h3>
                        <div class="flex space-x-3 w-full md:w-auto">
                            <div class="relative flex-1 md:flex-none">
                                <i class="fas fa-filter absolute left-4 top-3 text-slate-400"></i>
                                <input type="text" id="searchBar" onkeyup="filterRoster()" placeholder="過濾列表..." class="pl-10 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none w-full md:w-48 transition shadow-sm">
                            </div>
                            <button onclick="exportToCSV()" class="bg-green-500 text-white border border-green-600 px-4 py-2.5 rounded-xl text-sm font-bold hover:bg-green-600 transition shadow-sm flex items-center whitespace-nowrap">
                                <i class="fas fa-file-excel mr-2"></i> 匯出成績
                            </button>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-slate-500 text-xs uppercase font-bold tracking-wider border-b border-slate-200">
                                <tr>
                                    <th class="px-6 py-4">學生資訊</th>
                                    <th class="px-6 py-4">年級</th>

                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            
        </div> </main>

            </div>
        </div>
    </div>

        // ⚠️ 請確保這是你正確的 GAS 網址
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzQlG5LVquExr4qDerEGX_OaeOPYqp9Nk2Xk7WuJRq55XOPzIQx977KjCCteiWuhGfY2Q/exec"; 
        
        let studentData = [];
        let scoreChart = null;

        window.onload = () => {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user || user.role !== 'teacher') {
                alert('權限不足，請以教師帳號登入！');
                window.location.href = 'index.html';
                return;
            }
            document.getElementById('teacherName').textContent = user.name;
            fetchRoster();
        };

        // UI: 切換左側選單分頁
        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.remove('active', 'bg-blue-600', 'text-white');
                el.classList.add('text-slate-400');
            });
            document.getElementById(tabId).classList.remove('hidden');
            
            if(btnElement) {
                btnElement.classList.add('active', 'bg-blue-600', 'text-white');
                btnElement.classList.remove('text-slate-400');
            }

            const titles = {
                'tab-overview': '學習數據總覽',
                'tab-dispatch': '派送任務管理',
                'tab-questions': '雲端自訂題庫與模擬',
                'tab-students': '學生名單與成績'
            };
            document.getElementById('pageTitle').textContent = titles[tabId];
        }

        // 處理全域快速搜尋
        function handleQuickSearch(e) {
            if (e.key === 'Enter') executeQuickSearch();
        }

        function executeQuickSearch() {
            const q = document.getElementById('quickSearchInput').value.trim().toLowerCase();
            if (!q) return alert("請輸入學生姓名或帳號");
            if (studentData.length === 0) return alert("學生資料尚未載入完成，請稍候");

            const found = studentData.filter(s => s.name.toLowerCase().includes(q) || s.username.toLowerCase().includes(q));
            
            if (found.length === 1) {
                viewStudentDetails(found[0].username, found[0].name);
                document.getElementById('quickSearchInput').value = ''; 
            } else if (found.length > 1) {
                alert(`找到 ${found.length} 位符合條件的同學，已為您切換至列表檢視。`);
                switchTab('tab-students', document.getElementById('btn-tab-students'));
                document.getElementById('searchBar').value = q;
                filterRoster();
            } else {
                alert('系統中找不到符合此姓名或帳號的同學！');
            }
        }

        // 🌟 新增：模擬出題預覽 (教師專用彈窗，不切換頁面)
        async function openMockExam() {
            const subject = document.getElementById('mockSubject').value;
            const subjectName = document.getElementById('mockSubject').options[document.getElementById('mockSubject').selectedIndex].text;
            const tags = document.getElementById('mockTags').value.trim() || subject;
            
            const modal = document.getElementById('mockExamModal');
            const body = document.getElementById('mockExamBody');
            
            document.getElementById('mockExamMeta').textContent = `範圍：${subjectName} / 標籤：${tags}`;
            modal.classList.remove('hidden');
            body.innerHTML = '<div class="text-center p-12"><i class="fas fa-circle-notch fa-spin text-5xl text-indigo-500 mb-4"></i><p class="text-slate-500 font-bold mt-2">正在從雲端題庫為您組卷中...</p></div>';

            try {
                // 呼叫 GAS API 抓取符合條件的題目
                const res = await fetch(`${GAS_URL}?action=get_questions&subject=${subject}&tags=${tags}`);
                const questions = await res.json();

                if (!questions || questions.length === 0) {
                    body.innerHTML = `
                        <div class="text-center p-12 flex flex-col items-center justify-center h-full">
                            <i class="fas fa-box-open text-6xl mb-4 text-slate-300"></i>
                            <h3 class="text-xl font-bold text-slate-700 mb-2">找不到相關題目</h3>
                            <p class="text-slate-500">目前雲端題庫中，沒有符合「${subjectName}」且標籤包含「${tags}」的題目。<br>請先在上方新增題目！</p>
                        </div>`;
                    return;
                }

                // 渲染考卷畫面，特別將「正解」用綠底標示
                let html = `<div class="mb-4 text-sm font-bold text-indigo-600 bg-indigo-100 p-3 rounded-xl inline-block shadow-sm"><i class="fas fa-info-circle mr-2"></i>共為您抓取出 ${questions.length} 題，綠色選項為系統紀錄之正解。</div>`;
                
                questions.forEach((q, index) => {
                    html += `
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-4">
                            <h3 class="font-bold text-slate-800 mb-4 text-lg"><span class="text-indigo-500 mr-2">Q${index + 1}.</span>${q.question}</h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                                ${q.options.map((opt, i) => {
                                    const isCorrect = opt === q.answer;
                                    const boxClass = isCorrect 
                                        ? 'bg-green-50 border-green-300 text-green-800 font-bold shadow-sm' 
                                        : 'bg-slate-50 border-slate-200 text-slate-600';
                                    return `
                                    <div class="px-4 py-3 rounded-xl border ${boxClass} flex items-center justify-between">
                                        <span><span class="mr-2 opacity-60">${String.fromCharCode(65 + i)}.</span> ${opt}</span>
                                        ${isCorrect ? '<i class="fas fa-check-circle text-green-500 text-lg"></i>' : ''}
                                    </div>`;
                                }).join('')}
                            </div>
                        </div>
                    `;
                });
                body.innerHTML = html;
            } catch (err) {
                body.innerHTML = '<div class="text-center p-12 text-red-500"><i class="fas fa-wifi text-5xl mb-4"></i><p class="font-bold">連線至雲端題庫失敗，請檢查網路狀態。</p></div>';
            }
        }

        function closeMockModal() {
            document.getElementById('mockExamModal').classList.add('hidden');
        }

        // UI: 切換派送種類
        function toggleDispatchType() {
            const type = document.getElementById('dispatchType').value;
            if (type === 'exam') {
                document.getElementById('dispatchExamSettings').classList.remove('hidden');
                document.getElementById('dispatchMessageSettings').classList.add('hidden');
            } else {
                document.getElementById('dispatchExamSettings').classList.add('hidden');
                document.getElementById('dispatchMessageSettings').classList.remove('hidden');
            }
        }

        // 1. 抓取學生名單與成績
        async function fetchRoster() {
            try {
                const res = await fetch(`${GAS_URL}?action=get_roster`);
                studentData = await res.json();
                renderTable(studentData);
                updateDashboardStats(studentData);
                
                const targetSelect = document.getElementById('dispatchTarget');
                targetSelect.innerHTML = '<option value="all">📢 全班廣播 (所有人)</option>';
                studentData.forEach(s => {
                    targetSelect.innerHTML += `<option value="${s.username}">👤 ${s.name} (${s.username})</option>`;
                });
            } catch (err) {
                document.getElementById('studentTableBody').innerHTML = '<tr><td colspan="6" class="p-10 text-center text-red-500 font-bold">資料讀取失敗，請確認網路狀態。</td></tr>';
            }
        }

        // 2. 渲染學生表格
        function renderTable(data) {
            const tbody = document.getElementById('studentTableBody');
            if(data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="p-10 text-center text-slate-400">目前尚無符合的學生資料</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(s => {
                const scoreColor = s.avgScore >= 80 ? 'text-green-600 bg-green-50' : (s.avgScore < 60 ? 'text-red-600 bg-red-50' : 'text-blue-600 bg-blue-50');
                return `
                    <tr class="hover:bg-slate-50 transition border-b border-slate-50 last:border-0">
                        <td class="px-6 py-4">
                            <div class="flex items-center space-x-3">
                                <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-500"><i class="fas fa-user"></i></div>
                                <div><p class="font-bold text-slate-800">${s.name}</p><p class="text-xs text-slate-400">${s.username}</p></div>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-sm font-medium text-slate-600">${s.grade}</td>
                        <td class="px-6 py-4 text-center"><span class="px-3 py-1 rounded-lg text-sm font-black ${scoreColor}">${s.avgScore} 分</span></td>
                        <td class="px-6 py-4 text-center text-sm font-bold text-slate-600">${s.testCount} 次</td>
                        <td class="px-6 py-4 text-center text-xs font-medium text-slate-400">${s.lastActive === '尚無紀錄' ? '從未練習' : s.lastActive.split('T')[0]}</td>
                        <td class="px-6 py-4 text-center">
                            <button onclick="viewStudentDetails('${s.username}', '${s.name}')" class="bg-white border border-slate-200 text-blue-600 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-blue-50 hover:border-blue-200 transition shadow-sm">
                                <i class="fas fa-chart-line mr-1"></i> 分析
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // 3. 更新儀表板
        function updateDashboardStats(data) {
            document.getElementById('stat-total').textContent = data.length;
            const validData = data.filter(s => s.testCount > 0);
            const avg = validData.length > 0 ? Math.round(validData.reduce((sum, s) => sum + s.avgScore, 0) / validData.length) : 0;
            document.getElementById('stat-avg').textContent = avg + ' 分';
            document.getElementById('stat-alert').textContent = data.filter(s => s.avgScore < 60 && s.testCount > 0).length + ' 人';

            const dist = [
                validData.filter(s => s.avgScore >= 80).length,
                validData.filter(s => s.avgScore >= 60 && s.avgScore < 80).length,
                validData.filter(s => s.avgScore < 60).length
            ];
            const ctx = document.getElementById('scoreChart').getContext('2d');
            if(scoreChart) scoreChart.destroy();
            scoreChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['優秀 (80+)', '及格 (60-79)', '待加強 (<60)'],
                    datasets: [{ data: dist, backgroundColor: ['#10b981', '#3b82f6', '#ef4444'], borderWidth: 0, hoverOffset: 5 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } }, cutout: '75%' }
            });
        }

        // 4. 進階任務派送
        async function sendDispatch(btn) {
            const target = document.getElementById('dispatchTarget').value;
            const type = document.getElementById('dispatchType').value;
            let payloadContent;

            if (type === 'exam') {
                const title = document.getElementById('assignTitle').value.trim();
                const subject = document.getElementById('assignSubject').value;
                const tags = document.getElementById('assignTags').value.trim();
                if(!title) return alert('請輸入測驗標題！');
                payloadContent = { subject: subject, tags: tags || subject, title: title };
            } else {
                const msg = document.getElementById('assignMessage').value.trim();
                if(!msg) return alert('請輸入公告內容！');
                payloadContent = msg;
            }

            const origText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> 發送中...';
            btn.disabled = true;

            try {
                const payload = { action: "send_dispatch", target: target, type: type, content: payloadContent };
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                
                if(result.result === "success") {
                    alert('🎉 任務發布成功！學生登入時將會收到通知。');
                    document.getElementById('assignTitle').value = '';
                    document.getElementById('assignMessage').value = '';
                } else alert('錯誤: ' + result.message);
            } catch (err) { alert('連線失敗，請檢查網路。'); } 
            finally { btn.innerHTML = origText; btn.disabled = false; }
        }

        // 5. 雲端智能出題
        async function createSmartQuestion(btn) {
    // 1. 抓取升級後的四個分類欄位
    const subject = document.getElementById('qSubject').value;
    const grade = document.getElementById('qGrade').value;
    const chapter = document.getElementById('qChapter').value.trim();
    const level = document.getElementById('qLevel').value;

    // 2. 抓取題目與選項
    const q = document.getElementById('qText').value.trim();
    const a = document.getElementById('qCorrect').value.trim();
    const o1 = document.getElementById('qWrong1').value.trim();
    const o2 = document.getElementById('qWrong2').value.trim();
    const o3 = document.getElementById('qWrong3').value.trim();

    // 防呆檢查
    if(!q || !a || !o1 || !o2 || !o3) return alert('⚠️ 請填寫完整的題目、正解與三個干擾項！');
    if(!chapter) return alert('⚠️ 請填寫「單元 / 章節名稱」！');

    // 3. 把分類組合成 Tags 傳給後端
    let tagsArray = [subject, grade, chapter, level];
    let tagsString = tagsArray.join(','); // 結果會像這樣: "math,七上,1-1 相似形,基礎"

    const user = JSON.parse(localStorage.getItem('currentUser'));
    const origText = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> 寫入中...';
    btn.disabled = true;

    try {
        const payload = { 
    action: "create_question", 
    teacher: user.name, 
    subject: subject, 
    question: q, 
    answer: a, // 這個是為了方便對答案用的欄位
    optA: a,   // 將正確答案寫入選項A
    optB: o1,  // 錯誤選項1 寫入選項B
    optC: o2,  // 錯誤選項2 寫入選項C
    optD: o3,  // 錯誤選項3 寫入選項D！格子終於填滿啦！
    tags: tagsString 
};
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await res.json();
        
        if(result.result === "success") {
            alert('🎉 題目儲存成功！測驗時將自動洗牌選項。');
            // 注意：這裡把 qTags 拿掉了，改成清空 chapter 和題目內容
            ['qChapter', 'qText', 'qCorrect', 'qWrong1', 'qWrong2', 'qWrong3'].forEach(id => {
                document.getElementById(id).value = '';
            });
        } else {
            alert('錯誤: ' + result.message);
        }
    } catch (err) { 
        alert('連線失敗，請檢查網路。'); 
    } finally { 
        btn.innerHTML = origText; 
        btn.disabled = false; 
    }
}
        // 6. 搜尋與過濾學生
        function filterRoster() {
            const q = document.getElementById('searchBar').value.toLowerCase();
            const filtered = studentData.filter(s => s.name.toLowerCase().includes(q) || s.username.toLowerCase().includes(q));
            renderTable(filtered);
        }

        // 一鍵匯出 CSV 
        function exportToCSV() {
            if (studentData.length === 0) return alert("目前沒有資料可以匯出。");
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; 
            csvContent += "帳號,姓名,年級,平均分數,測驗次數,最後上線時間\n";
            studentData.forEach(s => {
                csvContent += `${s.username},${s.name},${s.grade},${s.avgScore},${s.testCount},${s.lastActive.replace('T', ' ')}\n`;
            });
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `班級成績報表_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 7. 查看個人錯題紀錄
        async function viewStudentDetails(username, name) {
            const modal = document.getElementById('detailModal');
            const body = document.getElementById('modalBody');
            document.getElementById('modalName').textContent = name + ' 的學習歷程與錯題分析';
            modal.classList.remove('hidden');
            body.innerHTML = '<div class="text-center p-12"><i class="fas fa-circle-notch fa-spin text-4xl text-blue-500 mb-4"></i><p class="text-slate-500 font-bold">正在讀取雲端大數據...</p></div>';

            try {
                const res = await fetch(GAS_URL + '?username=' + username);
                const records = await res.json();
                
                if(!records || records.length === 0) {
                    body.innerHTML = '<div class="text-center p-10 text-slate-400 font-bold">尚無測驗紀錄</div>';
                    return;
                }
                
                let htmlContent = '';
                records.forEach(r => {
                    let scoreClass = r.score >= 60 ? 'text-green-500 bg-green-50' : 'text-red-500 bg-red-50';
                    let dateStr = r.date.replace('T', ' ');
                    
                    htmlContent += `<div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm mb-4">
                        <div class="flex justify-between items-center mb-4">
                            <h4 class="font-bold text-slate-800 text-lg border-l-4 border-blue-500 pl-3">${r.title}</h4>
                            <span class="text-xl font-black px-4 py-1 rounded-lg ${scoreClass}">${r.score} 分</span>
                        </div>
                        <p class="text-xs text-slate-400 mb-4 border-b border-slate-100 pb-3"><i class="far fa-clock mr-1"></i>繳卷時間：${dateStr}</p>`;
                    
                    if (r.wrongList && r.wrongList.length > 0) {
                        htmlContent += `<div class="space-y-3">
                            <p class="text-xs font-black text-red-500 flex items-center"><i class="fas fa-exclamation-triangle mr-1"></i> 答錯題目解析</p>`;
                        
                        r.wrongList.forEach(w => {
                            let qText = w.question || w.q || "無法解析題目內容";
                            let studentAns = (w.yourAns !== null && w.options) ? w.options[w.yourAns] : "未作答";
                            let correctAns = (w.answer !== null && w.options) ? w.options[w.answer] : "未知正解";
                            
                            htmlContent += `
                            <div class="bg-red-50/50 p-4 rounded-xl border border-red-100 text-sm">
                                <div class="font-bold text-slate-800 mb-3"><span class="text-red-500 mr-2">Q.</span>${qText}</div>
                                <div class="flex flex-col space-y-2 text-xs font-bold">
                                    <div class="bg-white px-3 py-2 rounded-lg text-red-600 border border-red-200 w-fit shadow-sm">
                                        <i class="fas fa-times mr-1"></i> 學生作答：${studentAns}
                                    </div>
                                    <div class="bg-white px-3 py-2 rounded-lg text-green-600 border border-green-200 w-fit shadow-sm">
                                        <i class="fas fa-check mr-1"></i> 正確答案：${correctAns}
                                    </div>
                                </div>
                            </div>`;
                        });
                        htmlContent += `</div>`;
                    } else {
                        htmlContent += '<p class="text-sm text-green-600 font-bold bg-green-50 p-4 rounded-xl flex items-center"><i class="fas fa-award text-lg mr-2"></i> 完美表現，全數答對！無錯題紀錄。</p>';
                    }
                    htmlContent += '</div>';
                });
                body.innerHTML = htmlContent;
            } catch(e) { 
                body.innerHTML = '<p class="text-red-500 text-center font-bold p-10"><i class="fas fa-wifi mr-2"></i>資料載入錯誤，請檢查網路連線</p>'; 
            }
        }

        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
        function logout() { localStorage.removeItem('currentUser'); window.location.href = 'index.html'; }
        // 📱 控制手機版側邊欄開關
function toggleSidebar() {
    const sidebar = document.getElementById('mobileSidebar');
    const backdrop = document.getElementById('sidebarBackdrop');
    
    // 控制側邊欄滑出/收回
    sidebar.classList.toggle('-translate-x-full');
    
    // 控制黑底遮罩的淡入/淡出
    if (backdrop.classList.contains('hidden')) {
        backdrop.classList.remove('hidden');
        // 給予微小延遲讓 transition 動畫生效
        setTimeout(() => backdrop.classList.remove('opacity-0'), 10);
    } else {
        backdrop.classList.add('opacity-0');
        // 等待動畫結束 (300ms) 後再隱藏元素
        setTimeout(() => backdrop.classList.add('hidden'), 300);
    }
}
