<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教師管理中心 - 雲端學院</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="1-1ce8683e.ico">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 bg-slate-900 text-white flex flex-col sticky top-0 h-screen shadow-xl hidden lg:flex">
        <div class="p-6 flex items-center space-x-3">
            <div class="w-10 h-10 bg-blue-500 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/50">
                <i class="fas fa-chalkboard-teacher text-lg"></i>
            </div>
            <span class="text-xl font-black tracking-tight">教師後台</span>
        </div>
        <nav class="flex-1 px-4 space-y-2 mt-4">
            <a href="#" class="flex items-center space-x-3 p-3 bg-blue-600 rounded-xl font-bold transition">
                <i class="fas fa-th-large w-5"></i><span>總覽面板</span>
            </a>
            <a href="#action-section" class="flex items-center space-x-3 p-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition">
                <i class="fas fa-toolbox w-5"></i><span>教學工具</span>
            </a>
            <a href="#student-section" class="flex items-center space-x-3 p-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-xl transition">
                <i class="fas fa-users w-5"></i><span>學生名單</span>
            </a>
        </nav>
        <div class="p-6 border-t border-slate-800">
            <button onclick="logout()" class="flex items-center space-x-3 text-red-400 hover:text-red-300 transition w-full">
                <i class="fas fa-sign-out-alt"></i><span>安全登出</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 p-6 md:p-10 overflow-y-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black text-slate-800">學習數據中心</h1>
                <p class="text-slate-500 font-medium mt-1">歡迎回來，<span id="teacherName" class="text-blue-600 font-bold">老師</span></p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
            <div class="glass-card p-6 rounded-2xl shadow-sm border-l-4 border-blue-500">
                <p class="text-slate-400 text-xs font-bold uppercase mb-1">全班總人數</p>
                <h2 class="text-3xl font-black text-slate-800" id="stat-total">--</h2>
            </div>
            <div class="glass-card p-6 rounded-2xl shadow-sm border-l-4 border-green-500">
                <p class="text-slate-400 text-xs font-bold uppercase mb-1">班級平均分數</p>
                <h2 class="text-3xl font-black text-green-600" id="stat-avg">--</h2>
            </div>
            <div class="glass-card p-6 rounded-2xl shadow-sm border-l-4 border-red-500">
                <p class="text-slate-400 text-xs font-bold uppercase mb-1">待關注學生 (低於60分)</p>
                <h2 class="text-3xl font-black text-red-500" id="stat-alert">--</h2>
            </div>
        </div>

        <div id="action-section" class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-10">
            
            <div class="glass-card p-6 rounded-2xl shadow-sm lg:col-span-1 flex flex-col">
                <h3 class="font-bold text-slate-800 mb-6 flex items-center"><i class="fas fa-chart-pie mr-2 text-blue-500"></i> 成績分佈比例</h3>
                <div class="flex-1 relative min-h-[250px]"><canvas id="scoreChart"></canvas></div>
            </div>

            <div class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-6 rounded-2xl shadow-sm text-white border-0 flex flex-col justify-between">
                    <div>
                        <h3 class="font-bold mb-2 flex items-center text-lg"><i class="fas fa-paper-plane mr-2 text-blue-200"></i> 快速派送任務</h3>
                        <p class="text-blue-100 text-xs mb-4">發送指定練習任務給全班學生。</p>
                        <input type="text" id="assignTitle" placeholder="任務標題 (例:地科第一單元)" class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/50 focus:bg-white/20 outline-none mb-3 text-sm">
                        <select id="assignSubject" class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white outline-none mb-4 text-sm">
                            <option value="earth_science" class="text-slate-800">地球科學</option>
                            <option value="biology" class="text-slate-800">生物科學</option>
                            <option value="chemistry" class="text-slate-800">理化學科</option>
                        </select>
                    </div>
                    <button onclick="createAssignment(this)" class="w-full bg-white text-blue-700 font-black py-3 rounded-xl shadow-lg hover:bg-yellow-400 hover:text-blue-900 transition flex justify-center items-center">
                        <i class="fas fa-rocket mr-2"></i> 發布任務
                    </button>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col justify-between">
                    <div>
                        <h3 class="font-bold text-slate-800 mb-2 flex items-center text-lg"><i class="fas fa-pen-nib mr-2 text-purple-500"></i> 自訂雲端題庫</h3>
                        <p class="text-slate-400 text-xs mb-4">題目將儲存至 Google 試算表。</p>
                        <select id="qSubject" class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-gray-700 outline-none mb-3 text-sm">
                            <option value="earth_science">地球科學</option>
                            <option value="biology">生物科學</option>
                            <option value="chemistry">理化學科</option>
                        </select>
                        <textarea id="qText" rows="2" placeholder="請輸入題目敘述..." class="w-full bg-gray-50 border border-gray-200 rounded-xl px-3 py-2 text-gray-700 outline-none resize-none mb-3 text-sm"></textarea>
                        <div class="grid grid-cols-2 gap-2 mb-3">
                            <input type="text" id="qOptA" placeholder="選項 A" class="bg-gray-50 border border-gray-200 rounded-lg px-2 py-1.5 text-xs outline-none">
                            <input type="text" id="qOptB" placeholder="選項 B" class="bg-gray-50 border border-gray-200 rounded-lg px-2 py-1.5 text-xs outline-none">
                            <input type="text" id="qOptC" placeholder="選項 C" class="bg-gray-50 border border-gray-200 rounded-lg px-2 py-1.5 text-xs outline-none">
                            <input type="text" id="qOptD" placeholder="選項 D" class="bg-gray-50 border border-gray-200 rounded-lg px-2 py-1.5 text-xs outline-none">
                        </div>
                        <select id="qAnswer" class="w-full bg-green-50 border border-green-200 rounded-xl px-3 py-2 text-green-700 font-bold outline-none mb-4 text-sm">
                            <option value="A">正確答案: A</option>
                            <option value="B">正確答案: B</option>
                            <option value="C">正確答案: C</option>
                            <option value="D">正確答案: D</option>
                        </select>
                    </div>
                    <button onclick="createQuestion(this)" class="w-full bg-purple-600 text-white font-black py-3 rounded-xl shadow-lg hover:bg-purple-700 transition flex justify-center items-center">
                        <i class="fas fa-save mr-2"></i> 儲存題目
                    </button>
                </div>
            </div>
        </div>

        <div id="student-section" class="glass-card rounded-2xl shadow-sm overflow-hidden">
            <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white">
                <h3 class="font-bold text-slate-800 text-lg">班級學生名冊</h3>
                <div class="relative">
                    <i class="fas fa-search absolute left-3 top-2.5 text-slate-400"></i>
                    <input type="text" id="searchBar" onkeyup="filterRoster()" placeholder="搜尋學生姓名..." class="pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none w-48 md:w-64 transition">
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-slate-500 text-xs uppercase font-bold">
                        <tr>
                            <th class="px-6 py-4">學生資訊</th>
                            <th class="px-6 py-4">年級</th>
                            <th class="px-6 py-4">平均分數</th>
                            <th class="px-6 py-4">測驗次數</th>
                            <th class="px-6 py-4">最後練習</th>
                            <th class="px-6 py-4 text-center">學習分析</th>
                        </tr>
                    </thead>
                    <tbody id="studentTableBody" class="divide-y divide-slate-100 bg-white">
                        <tr><td colspan="6" class="p-10 text-center text-slate-400"><i class="fas fa-circle-notch fa-spin text-2xl mb-2 text-blue-500"></i><br>資料同步中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="detailModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-2xl max-h-[85vh] flex flex-col shadow-2xl overflow-hidden">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                <h2 class="text-xl font-bold text-slate-800" id="modalName">學生學習歷程</h2>
                <button onclick="closeModal()" class="w-8 h-8 bg-slate-200 hover:bg-slate-300 rounded-full flex items-center justify-center transition text-slate-600"><i class="fas fa-times"></i></button>
            </div>
            <div id="modalBody" class="p-6 overflow-y-auto space-y-4 custom-scrollbar bg-slate-50/50">
            </div>
        </div>
    </div>

    <script>
        // ⚠️ 替換為你最新部署的 GAS Web App URL
        const GAS_URL = "你的_GAS_部署網址"; 
        
        let studentData = [];
        let scoreChart = null;

        window.onload = () => {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user || user.role !== 'teacher') {
                alert('權限不足，請以教師帳號登入！');
                window.location.href = 'index.html';
                return;
            }
            document.getElementById('teacherName').textContent = user.name;
            fetchRoster();
        };

        // 1. 抓取學生名單與成績
        async function fetchRoster() {
            try {
                const res = await fetch(`${GAS_URL}?action=get_roster`);
                studentData = await res.json();
                renderTable(studentData);
                updateDashboardStats(studentData);
            } catch (err) {
                document.getElementById('studentTableBody').innerHTML = '<tr><td colspan="6" class="p-10 text-center text-red-500 font-bold">資料讀取失敗，請確認 GAS 網址與網路狀態。</td></tr>';
            }
        }

        // 2. 渲染學生表格
        function renderTable(data) {
            const tbody = document.getElementById('studentTableBody');
            if(data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="p-10 text-center text-slate-400">目前尚無學生資料</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(s => {
                const scoreColor = s.avgScore >= 80 ? 'text-green-600 bg-green-50' : (s.avgScore < 60 ? 'text-red-600 bg-red-50' : 'text-blue-600 bg-blue-50');
                return `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="px-6 py-4">
                            <div class="flex items-center space-x-3">
                                <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-500"><i class="fas fa-user"></i></div>
                                <div><p class="font-bold text-slate-800">${s.name}</p><p class="text-xs text-slate-400">${s.username}</p></div>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-sm font-medium text-slate-600">${s.grade}</td>
                        <td class="px-6 py-4"><span class="px-3 py-1 rounded-lg text-sm font-black ${scoreColor}">${s.avgScore} 分</span></td>
                        <td class="px-6 py-4 text-sm font-bold text-slate-600">${s.testCount} 次</td>
                        <td class="px-6 py-4 text-xs font-medium text-slate-400">${s.lastActive === '尚無紀錄' ? '從未練習' : s.lastActive.split('T')[0]}</td>
                        <td class="px-6 py-4 text-center">
                            <button onclick="viewStudentDetails('${s.username}', '${s.name}')" class="bg-white border border-slate-200 text-slate-600 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200 transition shadow-sm">查看錯題</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // 3. 更新儀表板數據與圖表
        function updateDashboardStats(data) {
            document.getElementById('stat-total').textContent = data.length;
            const validData = data.filter(s => s.testCount > 0);
            const avg = validData.length > 0 ? Math.round(validData.reduce((sum, s) => sum + s.avgScore, 0) / validData.length) : 0;
            document.getElementById('stat-avg').textContent = avg + ' 分';
            document.getElementById('stat-alert').textContent = data.filter(s => s.avgScore < 60 && s.testCount > 0).length + ' 人';

            // 繪製圓餅圖
            const dist = [
                validData.filter(s => s.avgScore >= 80).length,
                validData.filter(s => s.avgScore >= 60 && s.avgScore < 80).length,
                validData.filter(s => s.avgScore < 60).length
            ];
            
            const ctx = document.getElementById('scoreChart').getContext('2d');
            if(scoreChart) scoreChart.destroy();
            scoreChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['優秀 (80+)', '及格 (60-79)', '待加強 (<60)'],
                    datasets: [{ data: dist, backgroundColor: ['#10b981', '#3b82f6', '#ef4444'], borderWidth: 0, hoverOffset: 5 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } }, cutout: '70%' }
            });
        }

        // 4. 教師派送任務
        async function createAssignment(btn) {
            const title = document.getElementById('assignTitle').value.trim();
            const subject = document.getElementById('assignSubject').value;
            if(!title) return alert('請輸入任務標題！');

            const origText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> 發布中...';
            btn.disabled = true;

            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "create_assignment", title, subject }) });
                const result = await res.json();
                if(result.result === "success") {
                    alert('🎉 任務發布成功！學生將在儀表板看到此任務。');
                    document.getElementById('assignTitle').value = '';
                } else alert('錯誤: ' + result.message);
            } catch (err) { alert('連線失敗，請檢查網路。'); } 
            finally { btn.innerHTML = origText; btn.disabled = false; }
        }

        // 5. 教師自訂出題
        async function createQuestion(btn) {
            const subject = document.getElementById('qSubject').value;
            const answer = document.getElementById('qAnswer').value;
            const question = document.getElementById('qText').value.trim();
            const optA = document.getElementById('qOptA').value.trim();
            const optB = document.getElementById('qOptB').value.trim();
            const optC = document.getElementById('qOptC').value.trim();
            const optD = document.getElementById('qOptD').value.trim();

            if(!question || !optA || !optB || !optC || !optD) return alert('⚠️ 請填寫完整的題目與四個選項！');

            const user = JSON.parse(localStorage.getItem('currentUser'));
            const origText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> 儲存中...';
            btn.disabled = true;

            try {
                const res = await fetch(GAS_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: "create_question", teacher: user.name, subject, question, optA, optB, optC, optD, answer }) 
                });
                const result = await res.json();
                if(result.result === "success") {
                    alert('🎉 題目儲存成功！已寫入 Google 試算表。');
                    ['qText','qOptA','qOptB','qOptC','qOptD'].forEach(id => document.getElementById(id).value = '');
                } else alert('錯誤: ' + result.message);
            } catch (err) { alert('連線失敗，請檢查網路。'); } 
            finally { btn.innerHTML = origText; btn.disabled = false; }
        }

        // 6. 搜尋學生
        function filterRoster() {
            const q = document.getElementById('searchBar').value.toLowerCase();
            const filtered = studentData.filter(s => s.name.toLowerCase().includes(q) || s.username.toLowerCase().includes(q));
            renderTable(filtered);
        }

        // 7. 顯示學生錯題紀錄
        async function viewStudentDetails(username, name) {
            const modal = document.getElementById('detailModal');
            const body = document.getElementById('modalBody');
            document.getElementById('modalName').textContent = `${name} 的學習歷程`;
            modal.classList.remove('hidden');
            body.innerHTML = '<div class="text-center p-10"><i class="fas fa-circle-notch fa-spin text-3xl text-blue-500 mb-4"></i><p class="text-slate-500">正在抓取錯題數據...</p></div>';

            try {
                const res = await fetch(`${GAS_URL}?username=${username}`);
                const records = await res.json();
                if(records.length === 0) {
                    body.innerHTML = '<div class="text-center p-10 text-slate-400">尚無任何測驗紀錄</div>';
                    return;
                }
                body.innerHTML = records.map(r => `
                    <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                        <div class="flex justify-between items-center mb-3">
                            <h4 class="font-bold text-slate-800 text-lg">${r.title}</h4>
                            <span class="text-xl font-black ${r.score >= 60 ? 'text-green-500' : 'text-red-500'}">${r.score}分</span>
                        </div>
                        <p class="text-xs text-slate-400 mb-3 border-b border-slate-100 pb-2"><i class="far fa-clock mr-1"></i>${r.date.replace('T', ' ')}</p>
                        ${r.wrongList && r.wrongList.length > 0 ? `
                            <p class="text-xs font-bold text-red-500 mb-2">錯誤題目紀錄：</p>
                            <ul class="space-y-2">
                                ${r.wrongList.map(w => `<li class="text-sm text-slate-700 bg-red-50 p-3 rounded-xl border border-red-100"><span class="font-bold text-red-400 mr-2">Q:</span>${w.q}</li>`).join('')}
                            </ul>
                        ` : '<p class="text-sm text-green-600 font-bold bg-green-50 p-3 rounded-xl"><i class="fas fa-check-circle mr-2"></i>完美表現，全數答對！</p>'}
                    </div>
                `).join('');
            } catch(e) { body.innerHTML = '<p class="text-red-500 text-center">資料載入錯誤</p>'; }
        }

        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
        function logout() { localStorage.removeItem('currentUser'); window.location.href = 'index.html'; }
    </script>
</body>
</html>
