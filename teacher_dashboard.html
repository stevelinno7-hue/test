<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教師管理中心 - 雲端學院</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="1-1ce8683e.ico">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .nav-item.active { background-color: #2563eb; color: white; font-weight: bold; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 bg-slate-900 text-white flex flex-col sticky top-0 h-screen shadow-xl hidden lg:flex">
        <div class="p-6 flex items-center space-x-3">
            <div class="w-10 h-10 bg-blue-500 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/50">
                <i class="fas fa-chalkboard-teacher text-lg"></i>
            </div>
            <span class="text-xl font-black tracking-tight">教師控制台</span>
        </div>
        <nav class="flex-1 px-4 space-y-2 mt-4" id="sidebarNav">
            <button onclick="switchTab('tab-overview', this)" class="nav-item active w-full flex items-center space-x-3 p-3 rounded-xl transition text-slate-400 hover:bg-slate-800 hover:text-white">
                <i class="fas fa-th-large w-5"></i><span>數據總覽</span>
            </button>
            <button onclick="switchTab('tab-dispatch', this)" class="nav-item w-full flex items-center space-x-3 p-3 rounded-xl transition text-slate-400 hover:bg-slate-800 hover:text-white">
                <i class="fas fa-paper-plane w-5"></i><span>派送任務</span>
            </button>
            <button onclick="switchTab('tab-questions', this)" class="nav-item w-full flex items-center space-x-3 p-3 rounded-xl transition text-slate-400 hover:bg-slate-800 hover:text-white">
                <i class="fas fa-pen-nib w-5"></i><span>雲端出題</span>
            </button>
            <button onclick="switchTab('tab-students', this)" class="nav-item w-full flex items-center space-x-3 p-3 rounded-xl transition text-slate-400 hover:bg-slate-800 hover:text-white">
                <i class="fas fa-users w-5"></i><span>學生名單 & 成績</span>
            </button>
        </nav>
        <div class="p-6 border-t border-slate-800">
            <button onclick="logout()" class="flex items-center space-x-3 text-red-400 hover:text-red-300 transition w-full">
                <i class="fas fa-sign-out-alt"></i><span>登出系統</span>
            </button>
        </div>
    </aside>

    <main class="flex-1 p-6 md:p-10 overflow-y-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black text-slate-800" id="pageTitle">學習數據中心</h1>
                <p class="text-slate-500 font-medium mt-1">歡迎回來，<span id="teacherName" class="text-blue-600 font-bold">老師</span></p>
            </div>
        </header>

        <div id="tab-overview" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
                <div class="glass-card p-6 rounded-2xl shadow-sm border-l-4 border-blue-500">
                    <p class="text-slate-400 text-xs font-bold uppercase mb-1">全班總人數</p>
                    <h2 class="text-3xl font-black text-slate-800" id="stat-total">--</h2>
                </div>
                <div class="glass-card p-6 rounded-2xl shadow-sm border-l-4 border-green-500">
                    <p class="text-slate-400 text-xs font-bold uppercase mb-1">班級平均分數</p>
                    <h2 class="text-3xl font-black text-green-600" id="stat-avg">--</h2>
                </div>
                <div class="glass-card p-6 rounded-2xl shadow-sm border-l-4 border-red-500">
                    <p class="text-slate-400 text-xs font-bold uppercase mb-1">待關注學生 (低於60分)</p>
                    <h2 class="text-3xl font-black text-red-500" id="stat-alert">--</h2>
                </div>
            </div>
            <div class="glass-card p-6 rounded-2xl shadow-sm max-w-2xl flex flex-col">
                <h3 class="font-bold text-slate-800 mb-6 flex items-center"><i class="fas fa-chart-pie mr-2 text-blue-500"></i> 成績分佈比例</h3>
                <div class="flex-1 relative min-h-[250px]"><canvas id="scoreChart"></canvas></div>
            </div>
        </div>

        <div id="tab-dispatch" class="tab-content hidden max-w-3xl">
            <div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-8 rounded-3xl shadow-lg text-white">
                <h2 class="text-2xl font-black mb-2 flex items-center"><i class="fas fa-rocket mr-3"></i> 智慧任務派送</h2>
                <p class="text-blue-100 mb-6 text-sm">指定特定學生或全班，發送測驗卷或是文字公告。</p>
                
                <div class="bg-white/10 p-5 rounded-2xl border border-white/20 mb-5">
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-xs font-bold text-blue-200 mb-1">對象</label>
                            <select id="dispatchTarget" class="w-full bg-white text-slate-800 rounded-xl px-4 py-3 outline-none text-sm font-bold">
                                <option value="all">📢 全班廣播 (所有人)</option>
                                </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-blue-200 mb-1">任務類型</label>
                            <select id="dispatchType" onchange="toggleDispatchType()" class="w-full bg-white text-slate-800 rounded-xl px-4 py-3 outline-none text-sm font-bold">
                                <option value="exam">📝 測驗卷</option>
                                <option value="message">💬 文字公告</option>
                            </select>
                        </div>
                    </div>

                    <div id="dispatchExamSettings" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-blue-200 mb-1">測驗標題</label>
                            <input type="text" id="assignTitle" placeholder="例: 週末地科特訓" class="w-full bg-white/20 border border-white/30 rounded-xl px-4 py-3 text-white placeholder-white/60 focus:bg-white/30 outline-none text-sm">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-blue-200 mb-1">科目</label>
                                <select id="assignSubject" class="w-full bg-white/20 border border-white/30 rounded-xl px-4 py-3 text-white outline-none text-sm">
                                   <option value="chinese">國文</option>
                                <option value="math">數學</option>
                                <option value="english">英文</option>
                                <option value="biology">生物</option>
                                <option value="physics">理化(物理)</option>
                                <option value="chemistry">理化(化學)</option>
                                <option value="earth_science">地球科學</option>
                                <option value="history">歷史</option>
                                <option value="geography">地理</option>
                                <option value="civics">公民</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-blue-200 mb-1">抓題範圍標籤 (選填)</label>
                                <input type="text" id="assignTags" placeholder="例: 國九,相似形" class="w-full bg-white/20 border border-white/30 rounded-xl px-4 py-3 text-white placeholder-white/60 focus:bg-white/30 outline-none text-sm">
                            </div>
                        </div>
                    </div>

                    <div id="dispatchMessageSettings" class="hidden">
                        <label class="block text-xs font-bold text-blue-200 mb-1">公告內容</label>
                        <textarea id="assignMessage" rows="3" placeholder="提醒同學記得帶圓規..." class="w-full bg-white/20 border border-white/30 rounded-xl px-4 py-3 text-white placeholder-white/60 focus:bg-white/30 outline-none text-sm resize-none"></textarea>
                    </div>
                </div>

                <button onclick="sendDispatch(this)" class="w-full bg-yellow-400 text-blue-900 font-black py-4 rounded-xl shadow-lg hover:bg-yellow-300 transition text-lg">
                    <i class="fas fa-paper-plane mr-2"></i> 立即發布任務
                </button>
            </div>
        </div>

        <div id="tab-questions" class="tab-content hidden max-w-3xl">
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                <h2 class="text-2xl font-black text-slate-800 mb-2 flex items-center"><i class="fas fa-cloud-upload-alt text-purple-500 mr-3"></i> 建立自訂雲端題庫</h2>
                <p class="text-slate-400 text-sm mb-6 border-b pb-4">輸入正解與干擾項，存入雲端後，系統在測驗時會自動洗牌選項。</p>
                
                <div class="flex space-x-4 mb-5">
                    <div class="w-1/3">
                        <label class="block text-xs font-bold text-slate-500 mb-1">科目</label>
                        <select id="qSubject" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-700 outline-none focus:ring-2 focus:ring-purple-400">
                           <option value="chinese">國文</option>
                                <option value="math">數學</option>
                                <option value="english">英文</option>
                                <option value="biology">生物</option>
                                <option value="physics">理化(物理)</option>
                                <option value="chemistry">理化(化學)</option>
                                <option value="earth_science">地球科學</option>
                                <option value="history">歷史</option>
                                <option value="geography">地理</option>
                                <option value="civics">公民</option>
                        </select>
                    </div>
                    <div class="w-2/3">
                        <label class="block text-xs font-bold text-slate-500 mb-1">題目專屬標籤 (供日後派卷抓題用)</label>
                        <input type="text" id="qTags" placeholder="例: 單元測試,難題" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-purple-400">
                    </div>
                </div>
                
                <div class="mb-5">
                    <label class="block text-xs font-bold text-slate-500 mb-1">題目敘述</label>
                    <textarea id="qText" rows="3" placeholder="請輸入完整的題目敘述..." class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-slate-700 outline-none resize-none focus:ring-2 focus:ring-purple-400"></textarea>
                </div>
                
                <div class="mb-6 p-5 bg-slate-50 border border-slate-100 rounded-2xl">
                    <label class="block text-sm font-black text-green-600 mb-2"><i class="fas fa-check-circle mr-1"></i> 正確答案</label>
                    <input type="text" id="qCorrect" placeholder="輸入正確答案..." class="w-full bg-white border border-green-300 rounded-xl px-4 py-3 mb-4 text-sm font-bold text-green-700 outline-none focus:ring-2 focus:ring-green-400">
                    
                    <label class="block text-sm font-black text-red-500 mb-2"><i class="fas fa-times-circle mr-1"></i> 錯誤干擾項 (3個)</label>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                        <input type="text" id="qWrong1" placeholder="干擾項 1" class="bg-white border border-red-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-red-400">
                        <input type="text" id="qWrong2" placeholder="干擾項 2" class="bg-white border border-red-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-red-400">
                        <input type="text" id="qWrong3" placeholder="干擾項 3" class="bg-white border border-red-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-red-400">
                    </div>
                </div>

                <button onclick="createSmartQuestion(this)" class="w-full bg-purple-600 text-white font-black py-4 rounded-xl shadow-lg hover:bg-purple-700 transition text-lg flex justify-center items-center">
                    <i class="fas fa-save mr-2"></i> 寫入雲端題庫
                </button>
            </div>
        </div>

        <div id="tab-students" class="tab-content hidden">
            <div class="glass-card rounded-3xl shadow-sm overflow-hidden border border-slate-200">
                <div class="p-6 border-b border-slate-100 flex flex-col md:flex-row justify-between items-center bg-white space-y-4 md:space-y-0">
                    <h3 class="font-bold text-slate-800 text-xl"><i class="fas fa-users text-blue-500 mr-2"></i>班級學生名冊</h3>
                    <div class="flex space-x-3 w-full md:w-auto">
                        <div class="relative flex-1 md:flex-none">
                            <i class="fas fa-search absolute left-4 top-3 text-slate-400"></i>
                            <input type="text" id="searchBar" onkeyup="filterRoster()" placeholder="搜尋姓名..." class="pl-11 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none w-full md:w-64 transition">
                        </div>
                        <button onclick="exportToCSV()" class="bg-green-100 text-green-700 border border-green-200 px-4 py-2.5 rounded-xl text-sm font-bold hover:bg-green-200 transition flex items-center whitespace-nowrap">
                            <i class="fas fa-file-excel mr-2"></i> 匯出成績
                        </button>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-slate-500 text-xs uppercase font-bold tracking-wider">
                            <tr>
                                <th class="px-6 py-4">學生資訊</th>
                                <th class="px-6 py-4">年級</th>
                                <th class="px-6 py-4">平均分數</th>
                                <th class="px-6 py-4">測驗次數</th>
                                <th class="px-6 py-4">最後練習</th>
                                <th class="px-6 py-4 text-center">學習分析</th>
                            </tr>
                        </thead>
                        <tbody id="studentTableBody" class="divide-y divide-slate-100 bg-white">
                            <tr><td colspan="6" class="p-10 text-center text-slate-400"><i class="fas fa-circle-notch fa-spin text-2xl mb-2 text-blue-500"></i><br>資料同步中...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="detailModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-2xl max-h-[85vh] flex flex-col shadow-2xl overflow-hidden transform transition-all">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                <h2 class="text-xl font-bold text-slate-800" id="modalName">學生學習歷程</h2>
                <button onclick="closeModal()" class="w-10 h-10 bg-slate-200 hover:bg-slate-300 rounded-full flex items-center justify-center transition text-slate-600"><i class="fas fa-times text-lg"></i></button>
            </div>
            <div id="modalBody" class="p-6 overflow-y-auto space-y-4 custom-scrollbar bg-slate-50/50">
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzQlG5LVquExr4qDerEGX_OaeOPYqp9Nk2Xk7WuJRq55XOPzIQx977KjCCteiWuhGfY2Q/exec"; 
        
        let studentData = [];
        let scoreChart = null;

        window.onload = () => {
            const user = JSON.parse(localStorage.getItem('currentUser'));
            if (!user || user.role !== 'teacher') {
                alert('權限不足，請以教師帳號登入！');
                window.location.href = 'index.html';
                return;
            }
            document.getElementById('teacherName').textContent = user.name;
            fetchRoster();
        };

        // UI: 切換左側選單分頁
        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.remove('active', 'bg-blue-600', 'text-white');
                el.classList.add('text-slate-400');
            });
            document.getElementById(tabId).classList.remove('hidden');
            
            btnElement.classList.add('active', 'bg-blue-600', 'text-white');
            btnElement.classList.remove('text-slate-400');

            const titles = {
                'tab-overview': '學習數據總覽',
                'tab-dispatch': '派送任務管理',
                'tab-questions': '雲端自訂題庫',
                'tab-students': '學生名單與成績'
            };
            document.getElementById('pageTitle').textContent = titles[tabId];
        }

        // UI: 切換派送種類 (測驗 vs 公告)
        function toggleDispatchType() {
            const type = document.getElementById('dispatchType').value;
            if (type === 'exam') {
                document.getElementById('dispatchExamSettings').classList.remove('hidden');
                document.getElementById('dispatchMessageSettings').classList.add('hidden');
            } else {
                document.getElementById('dispatchExamSettings').classList.add('hidden');
                document.getElementById('dispatchMessageSettings').classList.remove('hidden');
            }
        }

        // 1. 抓取學生名單與成績
        async function fetchRoster() {
            try {
                const res = await fetch(`${GAS_URL}?action=get_roster`);
                studentData = await res.json();
                renderTable(studentData);
                updateDashboardStats(studentData);
                
                // 動態填充派送對象的下拉選單
                const targetSelect = document.getElementById('dispatchTarget');
                targetSelect.innerHTML = '<option value="all">📢 全班廣播 (所有人)</option>';
                studentData.forEach(s => {
                    targetSelect.innerHTML += `<option value="${s.username}">👤 ${s.name} (${s.username})</option>`;
                });
            } catch (err) {
                document.getElementById('studentTableBody').innerHTML = '<tr><td colspan="6" class="p-10 text-center text-red-500 font-bold">資料讀取失敗，請確認網路狀態。</td></tr>';
            }
        }

        // 2. 渲染學生表格
        function renderTable(data) {
            const tbody = document.getElementById('studentTableBody');
            if(data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="p-10 text-center text-slate-400">目前尚無學生資料</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(s => {
                const scoreColor = s.avgScore >= 80 ? 'text-green-600 bg-green-50' : (s.avgScore < 60 ? 'text-red-600 bg-red-50' : 'text-blue-600 bg-blue-50');
                return `
                    <tr class="hover:bg-slate-50 transition">
                        <td class="px-6 py-4">
                            <div class="flex items-center space-x-3">
                                <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-500"><i class="fas fa-user"></i></div>
                                <div><p class="font-bold text-slate-800">${s.name}</p><p class="text-xs text-slate-400">${s.username}</p></div>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-sm font-medium text-slate-600">${s.grade}</td>
                        <td class="px-6 py-4"><span class="px-3 py-1 rounded-lg text-sm font-black ${scoreColor}">${s.avgScore} 分</span></td>
                        <td class="px-6 py-4 text-sm font-bold text-slate-600">${s.testCount} 次</td>
                        <td class="px-6 py-4 text-xs font-medium text-slate-400">${s.lastActive === '尚無紀錄' ? '從未練習' : s.lastActive.split('T')[0]}</td>
                        <td class="px-6 py-4 text-center">
                            <button onclick="viewStudentDetails('${s.username}', '${s.name}')" class="bg-white border border-slate-200 text-slate-600 px-3 py-1.5 rounded-lg text-xs font-bold hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200 transition shadow-sm">
                                <i class="fas fa-chart-line mr-1"></i> 分析
                            </button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        // 3. 更新儀表板數據與圖表
        function updateDashboardStats(data) {
            document.getElementById('stat-total').textContent = data.length;
            const validData = data.filter(s => s.testCount > 0);
            const avg = validData.length > 0 ? Math.round(validData.reduce((sum, s) => sum + s.avgScore, 0) / validData.length) : 0;
            document.getElementById('stat-avg').textContent = avg + ' 分';
            document.getElementById('stat-alert').textContent = data.filter(s => s.avgScore < 60 && s.testCount > 0).length + ' 人';

            const dist = [
                validData.filter(s => s.avgScore >= 80).length,
                validData.filter(s => s.avgScore >= 60 && s.avgScore < 80).length,
                validData.filter(s => s.avgScore < 60).length
            ];
            const ctx = document.getElementById('scoreChart').getContext('2d');
            if(scoreChart) scoreChart.destroy();
            scoreChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['優秀 (80+)', '及格 (60-79)', '待加強 (<60)'],
                    datasets: [{ data: dist, backgroundColor: ['#10b981', '#3b82f6', '#ef4444'], borderWidth: 0, hoverOffset: 5 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' } }, cutout: '75%' }
            });
        }

        // 4. 進階任務派送
        async function sendDispatch(btn) {
            const target = document.getElementById('dispatchTarget').value;
            const type = document.getElementById('dispatchType').value;
            let payloadContent;

            if (type === 'exam') {
                const title = document.getElementById('assignTitle').value.trim();
                const subject = document.getElementById('assignSubject').value;
                const tags = document.getElementById('assignTags').value.trim();
                if(!title) return alert('請輸入測驗標題！');
                payloadContent = { subject: subject, tags: tags || subject, title: title };
            } else {
                const msg = document.getElementById('assignMessage').value.trim();
                if(!msg) return alert('請輸入公告內容！');
                payloadContent = msg;
            }

            const origText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> 發送中...';
            btn.disabled = true;

            try {
                const payload = { action: "send_dispatch", target: target, type: type, content: payloadContent };
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                
                if(result.result === "success") {
                    alert('🎉 任務發布成功！學生登入時將會收到通知。');
                    document.getElementById('assignTitle').value = '';
                    document.getElementById('assignMessage').value = '';
                } else alert('錯誤: ' + result.message);
            } catch (err) { alert('連線失敗，請檢查網路。'); } 
            finally { btn.innerHTML = origText; btn.disabled = false; }
        }

        // 5. 雲端智能出題
        async function createSmartQuestion(btn) {
            const subject = document.getElementById('qSubject').value;
            const tagsRaw = document.getElementById('qTags').value;
            const q = document.getElementById('qText').value.trim();
            const a = document.getElementById('qCorrect').value.trim();
            const o1 = document.getElementById('qWrong1').value.trim();
            const o2 = document.getElementById('qWrong2').value.trim();
            const o3 = document.getElementById('qWrong3').value.trim();

            if(!q || !a || !o1 || !o2 || !o3) return alert('⚠️ 請填寫完整的題目、正解與三個干擾項！');

            let tags = tagsRaw.split(/[,，]/).map(t => t.trim()).filter(Boolean);
            tags.unshift(subject); 

            const user = JSON.parse(localStorage.getItem('currentUser'));
            const origText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> 寫入中...';
            btn.disabled = true;

            try {
                const payload = { action: "create_question", teacher: user.name, subject: subject, question: q, answer: a, optA: o1, optB: o2, optC: o3, optD: "", tags: tags.join(',') };
                // 因為 doPost 的 create_question 我們修改成了直接存欄位，這裡配合調整
                // （為了相容前一個版本的 GAS 參數）
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await res.json();
                if(result.result === "success") {
                    alert('🎉 題目儲存成功！測驗時將自動洗牌選項。');
                    ['qText','qCorrect','qWrong1','qWrong2','qWrong3', 'qTags'].forEach(id => document.getElementById(id).value = '');
                } else alert('錯誤: ' + result.message);
            } catch (err) { alert('連線失敗，請檢查網路。'); } 
            finally { btn.innerHTML = origText; btn.disabled = false; }
        }

        // 6. 搜尋與過濾學生名冊
        function filterRoster() {
            const q = document.getElementById('searchBar').value.toLowerCase();
            const filtered = studentData.filter(s => s.name.toLowerCase().includes(q) || s.username.toLowerCase().includes(q));
            renderTable(filtered);
        }

        // 🌟 新功能：一鍵匯出 CSV 學生名單與成績
        function exportToCSV() {
            if (studentData.length === 0) return alert("目前沒有資料可以匯出。");
            
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; // 加上 BOM 解決中文亂碼
            csvContent += "帳號,姓名,年級,平均分數,測驗次數,最後上線時間\n";
            
            studentData.forEach(s => {
                csvContent += `${s.username},${s.name},${s.grade},${s.avgScore},${s.testCount},${s.lastActive.replace('T', ' ')}\n`;
            });
            
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `班級成績報表_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 7. 查看個人錯題紀錄
        async function viewStudentDetails(username, name) {
            const modal = document.getElementById('detailModal');
            const body = document.getElementById('modalBody');
            document.getElementById('modalName').textContent = name + ' 的學習歷程與錯題分析';
            modal.classList.remove('hidden');
            body.innerHTML = '<div class="text-center p-12"><i class="fas fa-circle-notch fa-spin text-4xl text-blue-500 mb-4"></i><p class="text-slate-500 font-bold">正在讀取雲端大數據...</p></div>';

            try {
                const res = await fetch(GAS_URL + '?action=get_records_by_user&username=' + username);
                const records = await res.json();
                
                if(records.length === 0) {
                    body.innerHTML = '<div class="text-center p-10 text-slate-400 font-bold">尚無測驗紀錄</div>';
                    return;
                }
                
                let htmlContent = '';
                records.forEach(r => {
                    let scoreClass = r.score >= 60 ? 'text-green-500 bg-green-50' : 'text-red-500 bg-red-50';
                    let dateStr = r.date.replace('T', ' ');
                    
                    htmlContent += `<div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm mb-4">
                        <div class="flex justify-between items-center mb-4">
                            <h4 class="font-bold text-slate-800 text-lg border-l-4 border-blue-500 pl-3">${r.title}</h4>
                            <span class="text-xl font-black px-4 py-1 rounded-lg ${scoreClass}">${r.score} 分</span>
                        </div>
                        <p class="text-xs text-slate-400 mb-4 border-b border-slate-100 pb-3"><i class="far fa-clock mr-1"></i>繳卷時間：${dateStr}</p>`;
                    
                    if (r.wrongList && r.wrongList.length > 0) {
                        htmlContent += `<div class="space-y-3">
                            <p class="text-xs font-black text-red-500 flex items-center"><i class="fas fa-exclamation-triangle mr-1"></i> 答錯題目解析</p>`;
                        
                        r.wrongList.forEach(w => {
                            let qText = w.question || w.q || "無法解析題目內容";
                            let studentAns = (w.yourAns !== null && w.options) ? w.options[w.yourAns] : "未作答";
                            let correctAns = (w.answer !== null && w.options) ? w.options[w.answer] : "未知正解";
                            
                            htmlContent += `
                            <div class="bg-red-50/50 p-4 rounded-xl border border-red-100 text-sm">
                                <div class="font-bold text-slate-800 mb-3"><span class="text-red-500 mr-2">Q.</span>${qText}</div>
                                <div class="flex flex-col space-y-2 text-xs font-bold">
                                    <div class="bg-white px-3 py-2 rounded-lg text-red-600 border border-red-200 w-fit shadow-sm">
                                        <i class="fas fa-times mr-1"></i> 學生作答：${studentAns}
                                    </div>
                                    <div class="bg-white px-3 py-2 rounded-lg text-green-600 border border-green-200 w-fit shadow-sm">
                                        <i class="fas fa-check mr-1"></i> 正確答案：${correctAns}
                                    </div>
                                </div>
                            </div>`;
                        });
                        htmlContent += `</div>`;
                    } else {
                        htmlContent += '<p class="text-sm text-green-600 font-bold bg-green-50 p-4 rounded-xl flex items-center"><i class="fas fa-award text-lg mr-2"></i> 完美表現，全數答對！無錯題紀錄。</p>';
                    }
                    htmlContent += '</div>';
                });
                body.innerHTML = htmlContent;
            } catch(e) { 
                body.innerHTML = '<p class="text-red-500 text-center font-bold p-10"><i class="fas fa-wifi mr-2"></i>資料載入錯誤，請檢查網路連線</p>'; 
            }
        }

        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }
        function logout() { localStorage.removeItem('currentUser'); window.location.href = 'index.html'; }
    </script>
</body>
</html>
