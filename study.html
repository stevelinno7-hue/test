    <script>
        
        // 1. 定義全域變數
        let currentSubject = 'math';
        let userStage = 'high_school'; 

        window.onload = function() {
            // --- A. 處理使用者登入與學制判斷 ---
            const user = Auth.getCurrentUser();
            if(user) {
                document.getElementById('sideUserName').textContent = user.name;
                document.getElementById('sideUserRole').textContent = user.grade;
                
                // 判斷是否為國中生
                if(user.grade && user.grade.includes('國')) {
                    userStage = 'junior_high';
                } else {
                    userStage = 'high_school';
                }
            }
            if(typeof setStage === 'function') setStage(userStage);

            // --- B. 自動調整下拉選單 (重要更新) ---
            const optScience = document.getElementById('optScience');
            const optPhysics = document.getElementById('optPhysics');
            const optChemistry = document.getElementById('optChemistry');
            const subjectSelect = document.getElementById('subjectSelect');

            if (userStage === 'junior_high') {
                // 如果是國中生：顯示「自然(理化)」，隱藏物理/化學
                optScience.classList.remove('hidden');
                optPhysics.classList.add('hidden');
                optChemistry.classList.add('hidden');
                
                // 如果原本預設是 math，保持 math；但如果沒有選，預設跳轉邏輯
                // 這裡簡單處理：如果是 math 不動，其他則預設
            } else {
                // 如果是高中生：隱藏整合的理化，顯示分科
                optScience.classList.add('hidden');
                optPhysics.classList.remove('hidden');
                optChemistry.classList.remove('hidden');
            }

            // --- C. 處理網址參數與預設值 ---
            const urlParams = new URLSearchParams(window.location.search);
            let filterParam = urlParams.get('filter');

            // 如果參數是物理或化學，且是國中生，強制轉為 science
            if ((filterParam === 'physics' || filterParam === 'chemistry') && userStage === 'junior_high') {
                filterParam = 'science';
            }

            currentSubject = filterParam || 'math';
            subjectSelect.value = currentSubject;

            // --- D. 初始化 ---
            setTimeout(() => {
                if(window.initCurriculumData) window.initCurriculumData(); 
                patchScienceData(userStage); // 執行資料補丁
                loadBookMenu();
            }, 300);
        };

// 手機側邊欄開關
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    
    if (sidebar.classList.contains('-translate-x-full')) {
        // 開啟
        sidebar.classList.remove('-translate-x-full');
        overlay.classList.remove('hidden');
    } else {
        // 關閉
        sidebar.classList.add('-translate-x-full');
        overlay.classList.add('hidden');
    }
}
// 1. 開啟編輯視窗
function openProfileModal() {
    const user = Auth.getCurrentUser();
    if (!user) {
        alert("請先登入！");
        return;
    }

    // 設定下拉選單為目前的年級
    const select = document.getElementById('editGradeSelect');
    if (user.grade) {
        select.value = user.grade;
    }
    
    // 顯示視窗
    document.getElementById('profileModal').classList.remove('hidden');
}

// 2. 關閉編輯視窗
function closeProfileModal() {
    document.getElementById('profileModal').classList.add('hidden');
}

// 3. 儲存修改
function saveProfile() {
    const newGrade = document.getElementById('editGradeSelect').value;
    
    // 呼叫 Auth 模組更新資料庫 (這會同時更新 LocalStorage 和 mockdata)
    if (Auth.updateUser) {
        Auth.updateUser('grade', newGrade);
        
        // 更新畫面上的文字
        const roleEl = document.getElementById('sideUserRole');
        if (roleEl) roleEl.innerText = newGrade;
        
        // 提示成功
        alert(`修改成功！目前年級已更新為：${newGrade}`);
        closeProfileModal();
        
        // 如果是在 dashboard，可能需要重新整理頁面以套用新題庫設定
        // location.reload(); 
    } else {
        console.error("Auth.updateUser 函式不存在，請檢查 auth.js");
        alert("系統錯誤：無法儲存資料");
    }
}
        // 資料補丁：確保國中理化資料存在
        function patchScienceData(stage) {
            if (!window.CurriculumLibrary || !window.CurriculumLibrary.data) return;

            // 確保 physics 和 chemistry 陣列存在
            if (!window.CurriculumLibrary.data['physics']) window.CurriculumLibrary.data['physics'] = [];
            if (!window.CurriculumLibrary.data['chemistry']) window.CurriculumLibrary.data['chemistry'] = [];

            // 檢查是否已有國中物理
            const hasJuniorPhysics = window.CurriculumLibrary.data['physics'].some(b => b.stage === 'junior_high');
            if (!hasJuniorPhysics && stage === 'junior_high') {
                window.CurriculumLibrary.data['physics'].push({
                    book: "國中理化 (物理篇)",
                    stage: "junior_high",
                    // 標記這是物理來源，供混合時識別
                    sourceSubject: "physics", 
                    units: [
                        { name: "基本測量與密度", tags: ["測量", "密度"] },
                        { name: "力與運動", tags: ["牛頓運動定律", "力"] },
                        { name: "功與能", tags: ["功", "能量"] },
                        { name: "溫度與熱", tags: ["熱學", "比熱"] },
                        { name: "波動與聲音", tags: ["波動", "聲音"] },
                        { name: "光與折射", tags: ["光學", "折射"] },
                        { name: "電與磁", tags: ["電學", "磁場"] }
                    ]
                });
            }

            // 檢查是否已有國中化學
            const hasJuniorChem = window.CurriculumLibrary.data['chemistry'].some(b => b.stage === 'junior_high');
            if (!hasJuniorChem && stage === 'junior_high') {
                window.CurriculumLibrary.data['chemistry'].push({
                    book: "國中理化 (化學篇)",
                    stage: "junior_high",
                    sourceSubject: "chemistry",
                    units: [
                        { name: "物質的分類與變化", tags: ["物質", "化學變化"] },
                        { name: "原子結構與元素週期表", tags: ["原子", "週期表"] },
                        { name: "化學反應與計量", tags: ["化學反應", "莫耳"] },
                        { name: "氧化還原", tags: ["氧化還原"] },
                        { name: "酸鹼鹽", tags: ["酸鹼", "pH值"] },
                        { name: "有機化合物", tags: ["有機化學", "碳氫化合物"] }
                    ]
                });
            }
        }

        // 2. 載入選單 (包含合併邏輯)
        function loadBookMenu() {
            const subjectSelect = document.getElementById('subjectSelect');
            if(subjectSelect) currentSubject = subjectSelect.value;
            
            const menu = document.getElementById('unitMenu');
            menu.innerHTML = '';

            if (!window.CurriculumLibrary || !window.CurriculumLibrary.data) {
                menu.innerHTML = `<div class="p-4 text-center text-sm text-gray-400">資料庫載入中...</div>`;
                return;
            }

            let books = [];

            // ★★★ 關鍵修改：處理「science (理化)」的合併邏輯 ★★★
            if (currentSubject === 'science') {
                // 1. 抓取物理資料
                const phyBooks = (window.CurriculumLibrary.data['physics'] || [])
                    .filter(b => b.stage === userStage)
                    .map(b => ({...b, realSubject: 'physics'})); // 標記真實科目
                
                // 2. 抓取化學資料
                const chemBooks = (window.CurriculumLibrary.data['chemistry'] || [])
                    .filter(b => b.stage === userStage)
                    .map(b => ({...b, realSubject: 'chemistry'})); // 標記真實科目

                // 3. 合併
                books = [...phyBooks, ...chemBooks];

            } else {
                // 正常單科處理
                const allBooks = window.CurriculumLibrary.data[currentSubject] || [];
                books = allBooks.filter(b => b.stage === userStage)
                                .map(b => ({...b, realSubject: currentSubject}));
            }

            if (books.length === 0) {
                menu.innerHTML = `<div class="p-4 text-center text-sm text-gray-400 bg-slate-100 m-2 rounded">此科目尚無資料</div>`;
                return;
            }

            books.forEach((book, bIdx) => {
                const detailsOpen = bIdx === 0 ? 'open' : '';
                let unitsHtml = '';
                
                book.units.forEach((unit, uIdx) => {
                    const tagsStr = encodeURIComponent(JSON.stringify(unit.tags || []));
                    // 點擊時，傳入真實科目 (book.realSubject)，這樣 AI 才知道要用物理還是化學公式
                    unitsHtml += `
                        <div class="unit-item px-4 py-3 text-sm text-slate-600 rounded-lg mb-1 flex items-center gap-2 cursor-pointer hover:bg-slate-100" 
                             onclick="loadUnitContent('${unit.name}', '${tagsStr}', this, '${book.realSubject}')">
                            <i class="fas fa-circle text-[6px] text-slate-300"></i>
                            ${unit.name}
                        </div>`;
                });

                const html = `
                    <details ${detailsOpen} class="group">
                        <summary class="flex items-center justify-between p-3 font-bold text-slate-700 cursor-pointer hover:bg-slate-100 rounded-lg list-none">
                            <span>${book.book}</span>
                            <i class="fas fa-chevron-down text-xs text-slate-400 transition-transform group-open:rotate-180"></i>
                        </summary>
                        <div class="pl-2 mt-1 space-y-1 border-l-2 border-slate-100 ml-3">
                            ${unitsHtml}
                        </div>
                    </details>
                `;
                menu.insertAdjacentHTML('beforeend', html);
            });
        }

// 3. 內容生成 (全面改為課本/教材重點導向)
function loadUnitContent(unitName, tagsStr, el, realSubject) {
    // UI 高亮處理
    document.querySelectorAll('.unit-item').forEach(i => i.classList.remove('active', 'bg-blue-50', 'text-blue-600', 'font-bold'));
    el.classList.add('active', 'bg-blue-50', 'text-blue-600', 'font-bold');
    
    // 顯示標題
    let displaySubject = currentSubject;
    if (currentSubject === 'science') {
        displaySubject = realSubject === 'physics' ? '理化 (物理篇)' : '理化 (化學篇)';
    }
    
    document.getElementById('currentUnitTitle').textContent = unitName;
    // 💡 來源修改為：雲端課本教材
    document.getElementById('currentUnitSub').textContent = `科目：${displaySubject} | 來源：雲端課本教材 (整合版)`;

    const tags = JSON.parse(decodeURIComponent(tagsStr));
    const container = document.getElementById('notesContainer');
    
    container.innerHTML = '<div class="text-center py-10 text-gray-400"><i class="fas fa-spinner fa-spin"></i> 正在檢索課本教材重點...</div>';

    setTimeout(() => {
        let items = [];
        // 呼叫生成引擎，但我們這次主要提取其內核觀念
        if (window.generatePaper) {
            items = window.generatePaper({ subject: realSubject || currentSubject, total: 8, tags: tags });
        }

        if (!items || items.length === 0) {
            container.innerHTML = `
                <div class="bg-blue-50 border border-blue-100 p-8 rounded-xl text-center">
                    <i class="fas fa-book-reader text-blue-500 text-3xl mb-3"></i>
                    <p class="text-blue-700 font-bold">本單元教材正在編寫中，請稍候再試</p>
                </div>`;
            return;
        }

        let contentHtml = '';
        
        // 將資料重新包裝成「教材章節」格式
        items.forEach((item, idx) => {
            const concept = item.concept || unitName.split(' ')[0] || '核心觀念';
            
            // 💡 課本化處理：如果沒有詳細解析，就用標籤來生成學習目標
            const keyPoints = (item.explanation && item.explanation.length > 0) 
                ? item.explanation 
                : [`了解 ${concept} 的基本定義`, `掌握 ${unitName} 在考試中的應用技巧`];

            const targetSubject = realSubject || currentSubject;
            let imageVisual = '';

            // 🚀 智能插圖邏輯：根據單元內容決定是否觸發示意圖
            if (['physics', 'chemistry', 'biology', 'earth'].includes(targetSubject)) {
                // 生成更精確的圖表標籤
                const imgAlt = `Image of ${targetSubject} ${concept} diagram`;
                imageVisual = `
                    <div class="my-4 bg-slate-50 border border-slate-200 rounded-xl overflow-hidden">
                        <div class="h-40 lg:h-56 bg-white flex flex-col items-center justify-center relative group">
                             <img src="https://via.placeholder.com/600x400/f8fafc/64748b?text=${encodeURIComponent(concept + ' 示意圖')}" 
                                  class="w-full h-full object-contain opacity-60 group-hover:opacity-100 transition" />
                             <div class="absolute bottom-2 right-2 bg-slate-800/60 text-white text-[10px] px-2 py-1 rounded backdrop-blur">
                                [${imgAlt}]
                             </div>
                        </div>
                    </div>`;
            }

            contentHtml += `
                <div class="bg-white border-l-4 border-l-blue-500 border-y border-r border-slate-200 rounded-r-2xl p-6 shadow-sm fade-in mb-6" style="animation-delay: ${idx * 0.05}s">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-blue-50 rounded-full flex items-center justify-center text-blue-600 font-bold">
                                ${idx + 1}
                            </div>
                            <div>
                                <h4 class="text-sm font-bold text-blue-600 uppercase tracking-wider">學習重點</h4>
                                <h3 class="text-lg font-extrabold text-slate-800">${concept}</h3>
                            </div>
                        </div>
                    </div>
                    
                    <div class="space-y-4 text-slate-700">
                        <div class="prose prose-slate max-w-none">
                            <ul class="list-none space-y-3 p-0">
                                ${keyPoints.map(point => `
                                    <li class="flex items-start gap-2">
                                        <i class="fas fa-check-circle text-emerald-500 mt-1"></i>
                                        <span class="text-base">${point.replace('✅ 正確答案：', '核心定義：')}</span>
                                    </li>
                                `).join('')}
                            </ul>
                        </div>

                        ${imageVisual}

                        <div class="mt-4 pt-4 border-t border-slate-50">
                            <div class="bg-amber-50 rounded-lg p-4 flex gap-3">
                                <div class="text-amber-500"><i class="fas fa-exclamation-triangle"></i></div>
                                <div>
                                    <div class="text-xs font-bold text-amber-700 mb-1">課本延伸思考</div>
                                    <p class="text-sm text-amber-800">${item.question.split('?')[0]}？這在 ${unitName} 中是如何運作的？</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });

        container.innerHTML = contentHtml;
        if(window.MathJax) MathJax.typesetPromise();

    }, 300);
}
    </script>
</body>
</html>
