    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzQlG5LVquExr4qDerEGX_OaeOPYqp9Nk2Xk7WuJRq55XOPzIQx977KjCCteiWuhGfY2Q/exec"; 
const ThemeEngine = {
    // 1. 執行變色
    apply: function(xp) {
        console.log("當前頁面主題判定中... XP:", xp);
        const body = document.body;
        body.classList.remove('theme-rookie', 'theme-bronze', 'theme-diamond', 'theme-master', 'theme-legend', 'theme-mythic');

        if (xp >= 50000) { body.classList.add('theme-mythic'); this.createStars(); }
        else if (xp >= 20000) body.classList.add('theme-legend');
        else if (xp >= 10000) body.classList.add('theme-master');
        else if (xp >= 5000) body.classList.add('theme-diamond');
        else if (xp >= 300) body.classList.add('theme-bronze');
        else if (xp >= 100) body.classList.add('theme-rookie');
    },

    // 2. 產生流星 (只有神話等級會觸發)
    createStars: function() {
        const container = document.getElementById('star-container');
        if (!container || container.hasChildNodes()) return;
        for (let i = 0; i < 6; i++) {
            let star = document.createElement('div');
            star.className = 'shooting-star'; // CSS 動畫已在上面定義
            star.style.top = Math.random() * 80 + 'vh';
            star.style.left = (Math.random() * 50 + 50) + 'vw';
            star.style.animationDelay = (Math.random() * 4) + 's';
            container.appendChild(star);
        }
    }
};

// --- 自動執行 ---
document.addEventListener('DOMContentLoaded', () => {
    // 讀取 currentUser，如果沒有就預設 0
    const user = JSON.parse(localStorage.getItem('currentUser') || '{"xp":0}');

});
        // 1. 定義全域變數
        let currentSubject = 'math';
        let userStage = 'high_school'; 

        window.onload = function() {
            // --- A. 處理使用者登入與學制判斷 ---
            const user = Auth.getCurrentUser();
            if(user) {
                document.getElementById('sideUserName').textContent = user.name;
                document.getElementById('sideUserRole').textContent = user.grade;
                
                // 判斷是否為國中生
                if(user.grade && user.grade.includes('國')) {
                    userStage = 'junior_high';
                } else {
                    userStage = 'high_school';
                }
            }
            if(typeof setStage === 'function') setStage(userStage);

            // --- B. 自動調整下拉選單 (重要更新) ---
            const optScience = document.getElementById('optScience');
            const optPhysics = document.getElementById('optPhysics');
            const optChemistry = document.getElementById('optChemistry');
            const subjectSelect = document.getElementById('subjectSelect');

            if (userStage === 'junior_high') {
                // 如果是國中生：顯示「自然(理化)」，隱藏物理/化學
                optScience.classList.remove('hidden');
                optPhysics.classList.add('hidden');
                optChemistry.classList.add('hidden');
                
                // 如果原本預設是 math，保持 math；但如果沒有選，預設跳轉邏輯
                // 這裡簡單處理：如果是 math 不動，其他則預設
            } else {
                // 如果是高中生：隱藏整合的理化，顯示分科
                optScience.classList.add('hidden');
                optPhysics.classList.remove('hidden');
                optChemistry.classList.remove('hidden');
            }

            // --- C. 處理網址參數與預設值 ---
            const urlParams = new URLSearchParams(window.location.search);
            let filterParam = urlParams.get('filter');

            // 如果參數是物理或化學，且是國中生，強制轉為 science
            if ((filterParam === 'physics' || filterParam === 'chemistry') && userStage === 'junior_high') {
                filterParam = 'science';
            }

            currentSubject = filterParam || 'math';
            subjectSelect.value = currentSubject;

            // --- D. 初始化 ---
            setTimeout(() => {
                if(window.initCurriculumData) window.initCurriculumData(); 
                patchScienceData(userStage); // 執行資料補丁
                loadBookMenu();
            }, 300);
        };

// 手機側邊欄開關
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    
    if (sidebar.classList.contains('-translate-x-full')) {
        // 開啟
        sidebar.classList.remove('-translate-x-full');
        overlay.classList.remove('hidden');
    } else {
        // 關閉
        sidebar.classList.add('-translate-x-full');
        overlay.classList.add('hidden');
    }
}
// 1. 開啟編輯視窗
function openProfileModal() {
    const user = Auth.getCurrentUser();
    if (!user) {
        alert("請先登入！");
        return;
    }

    // 設定下拉選單為目前的年級
    const select = document.getElementById('editGradeSelect');
    if (user.grade) {
        select.value = user.grade;
    }
    
    // 顯示視窗
    document.getElementById('profileModal').classList.remove('hidden');
}

// 2. 關閉編輯視窗
function closeProfileModal() {
    document.getElementById('profileModal').classList.add('hidden');
}

async function saveProfile() {
    const newGrade = document.getElementById('editGradeSelect').value;
    const user = Auth.getCurrentUser();
    if (!user) return alert("請先登入！");

    const saveBtn = document.querySelector('#profileModal button[onclick="saveProfile()"]');
    const originalBtnText = saveBtn.innerText;

    // 1. 進入載入狀態
    saveBtn.disabled = true;
    saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 儲存中...';

    try {
        // 2. 發送請求給 GAS 後端
        const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: "update_grade", // 此 action 需與 GAS 後端對應
                account: user.account || user.username,
                newGrade: newGrade
            })
        });

        const result = await response.json();

        if (result.status === "success") {
            // 3. 伺服器成功更新後，才更新本地資料
            if (Auth.updateUser) {
                Auth.updateUser('grade', newGrade);
            }
            
            const roleEl = document.getElementById('sideUserRole');
            if (roleEl) roleEl.innerText = newGrade;

            alert(`✅ 修改成功！目前年級已更新為：${newGrade}`);
            closeProfileModal();
        } else {

        // 2. 載入選單 (包含合併邏輯)
        function loadBookMenu() {
            const subjectSelect = document.getElementById('subjectSelect');
            if(subjectSelect) currentSubject = subjectSelect.value;
            
            const menu = document.getElementById('unitMenu');
            menu.innerHTML = '';

            if (!window.CurriculumLibrary || !window.CurriculumLibrary.data) {
                menu.innerHTML = `<div class="p-4 text-center text-sm text-gray-400">資料庫載入中...</div>`;
                return;
            }

            let books = [];

            // ★★★ 關鍵修改：處理「science (理化)」的合併邏輯 ★★★
            if (currentSubject === 'science') {
                // 1. 抓取物理資料
                const phyBooks = (window.CurriculumLibrary.data['physics'] || [])
                    .filter(b => b.stage === userStage)
                    .map(b => ({...b, realSubject: 'physics'})); // 標記真實科目
                
                // 2. 抓取化學資料
                const chemBooks = (window.CurriculumLibrary.data['chemistry'] || [])
                    .filter(b => b.stage === userStage)
                    .map(b => ({...b, realSubject: 'chemistry'})); // 標記真實科目

                // 3. 合併
                books = [...phyBooks, ...chemBooks];

            } else {
                // 正常單科處理
                const allBooks = window.CurriculumLibrary.data[currentSubject] || [];
                books = allBooks.filter(b => b.stage === userStage)
                                .map(b => ({...b, realSubject: currentSubject}));
            }

            if (books.length === 0) {
                menu.innerHTML = `<div class="p-4 text-center text-sm text-gray-400 bg-slate-100 m-2 rounded">此科目尚無資料</div>`;
                return;
            }

            books.forEach((book, bIdx) => {
                const detailsOpen = bIdx === 0 ? 'open' : '';
                let unitsHtml = '';
                
                book.units.forEach((unit, uIdx) => {
                    const tagsStr = encodeURIComponent(JSON.stringify(unit.tags || []));
                    // 點擊時，傳入真實科目 (book.realSubject)，這樣 AI 才知道要用物理還是化學公式
                    unitsHtml += `
                        <div class="unit-item px-4 py-3 text-sm text-slate-600 rounded-lg mb-1 flex items-center gap-2 cursor-pointer hover:bg-slate-100" 
                             onclick="loadUnitContent('${unit.name}', '${tagsStr}', this, '${book.realSubject}')">
                            <i class="fas fa-circle text-[6px] text-slate-300"></i>
                            ${unit.name}
                        </div>`;
                });

                const html = `
                    <details ${detailsOpen} class="group">
                        <summary class="flex items-center justify-between p-3 font-bold text-slate-700 cursor-pointer hover:bg-slate-100 rounded-lg list-none">
                            <span>${book.book}</span>
                            <i class="fas fa-chevron-down text-xs text-slate-400 transition-transform group-open:rotate-180"></i>
                        </summary>
                        <div class="pl-2 mt-1 space-y-1 border-l-2 border-slate-100 ml-3">
                            ${unitsHtml}
                        </div>
                    </details>
                `;
                menu.insertAdjacentHTML('beforeend', html);
            });
        }

// 3. 內容生成 (全面改為課本/教材重點導向)
function loadUnitContent(unitName, tagsStr, el, realSubject) {
    // UI 高亮處理
    document.querySelectorAll('.unit-item').forEach(i => i.classList.remove('active', 'bg-blue-50', 'text-blue-600', 'font-bold'));
    el.classList.add('active', 'bg-blue-50', 'text-blue-600', 'font-bold');
    
    // 顯示標題
    let displaySubject = currentSubject;
    if (currentSubject === 'science') {
        displaySubject = realSubject === 'physics' ? '理化 (物理篇)' : '理化 (化學篇)';
    }
    
    document.getElementById('currentUnitTitle').textContent = unitName;
    // 💡 來源修改為：雲端課本教材
    document.getElementById('currentUnitSub').textContent = `科目：${displaySubject} | 來源：雲端課本教材 (整合版)`;
// 1. UI 狀態更新 (略，維持原本的高亮邏輯)
    // ...

    const subject = realSubject || currentSubject;
    const tags = JSON.parse(decodeURIComponent(tagsStr));
    const container = document.getElementById('notesContainer');
    
    container.innerHTML = '<div class="text-center py-20 text-slate-400 font-bold"><i class="fas fa-print fa-spin mr-2"></i> 正在排版正式課本章節...</div>';

    setTimeout(() => {
        // 從您的題庫引擎抓取資料
        const rawData = window.generatePaper({ subject: subject, total: 10, tags: tags });

        if (!rawData || rawData.length === 0) {
            container.innerHTML = `<div class="p-10 text-center">此章節教材尚在編校中。</div>`;
            return;
        }

        // 🚀 關鍵：將每一題轉換為「課本卡片」
        let finalHtml = `
            <div class="mb-12 text-center">
                <h1 class="text-4xl font-black text-slate-900 mb-2">${unitName}</h1>
                <div class="flex justify-center items-center gap-4 text-slate-400 font-bold tracking-widest">
                    <span>${subject.toUpperCase()}</span>
                    <span class="w-2 h-2 bg-slate-200 rounded-full"></span>
                    <span>STUDY GUIDE</span>
                </div>
            </div>
        `;

        rawData.forEach((item, index) => {
            finalHtml += window.TextbookFactory.formatToChapter(item, subject, index);
        });

        container.innerHTML = finalHtml;
        if(window.MathJax) MathJax.typesetPromise();
    }, 400);
}

   <script>
    // 🌟 全站公告邏輯：確保每個帳號在每則新公告發布時都只顯示一次
    let currentAnnVersion = null; 

    async function fetchAnnouncement() {
        // GAS URL 檢查
        const url = typeof GAS_URL !== 'undefined' ? GAS_URL : "https://script.google.com/macros/s/AKfycbzQlG5LVquExr4qDerEGX_OaeOPYqp9Nk2Xk7WuJRq55XOPzIQx977KjCCteiWuhGfY2Q/exec";
        
        try {
            const response = await fetch(url, {
                method: 'POST',
                body: JSON.stringify({ action: "get_announcement" })
            });
            const resData = await response.json();
            
            // 判斷公告是否處於「啟用」狀態
            if (resData.result === "success" && resData.data && resData.data.isActive) {
                const ann = resData.data;
                currentAnnVersion = ann.version; 

                // 🌟 關鍵邏輯：取得當前登入者 ID（確保不同帳號登入有獨立的已讀紀錄）
                // 請確認你的 HTML 導覽列中有 id="teacherName" 的元素，或改用你的用戶變數
                const currentUser = document.getElementById('teacherName')?.innerText.trim() || "guest";
                const storageKey = `read_ann_${currentUser}`;
                
                // 從瀏覽器取出該使用者最後讀過的版本號
                const lastReadVersion = localStorage.getItem(storageKey);

                // 如果 版本號不一致（代表有新公告）或 從未讀過
                if (lastReadVersion !== currentAnnVersion) {
                    renderAnnouncement(ann);
                }
            }
        } catch (error) {
            console.error("無法抓取公告:", error);
        }
    }

    // 將資料塞入 HTML 並顯示
    function renderAnnouncement(ann) {
        document.getElementById('annDateDisplay').innerText = ann.date || "最新消息";
        document.getElementById('annTitleDisplay').innerText = ann.title;
        // 支援換行符號
        document.getElementById('annContentDisplay').innerHTML = ann.content.replace(/\n/g, '<br>');
        
        // 延遲顯示，增加視覺緩衝感
        setTimeout(showAnnouncement, 500);
    }

    function showAnnouncement() {
        const modal = document.getElementById('announcementModal');
        const content = document.getElementById('announcementContent');
        modal.classList.remove('hidden');
        // Tailwind 動畫觸發
        setTimeout(() => {
            modal.classList.remove('opacity-0');
            content.classList.remove('scale-95');
        }, 10);
    }

    function closeAnnouncement() {
        const modal = document.getElementById('announcementModal');
        const content = document.getElementById('announcementContent');
        
        modal.classList.add('opacity-0');
        content.classList.add('scale-95');
        
        setTimeout(() => { 
            modal.classList.add('hidden'); 
        }, 300);
        
        // 🌟 使用者點擊「我知道了」後，立即標記該帳號已讀取此版本
        if (currentAnnVersion) {
            const currentUser = document.getElementById('teacherName')?.innerText.trim() || "guest";
            localStorage.setItem(`read_ann_${currentUser}`, currentAnnVersion);
        }
    }

    window.addEventListener('DOMContentLoaded', fetchAnnouncement);
</script>
