    <script>
        // ==========================================
// ✏️ 個人資料與介面功能
// ==========================================
 const GAS_URL = "https://script.google.com/macros/s/AKfycbzQlG5LVquExr4qDerEGX_OaeOPYqp9Nk2Xk7WuJRq55XOPzIQx977KjCCteiWuhGfY2Q/exec";
        let userGrade = "高一";
        // --- 核心主題引擎 ---// --- 核心主題引擎 (12 個階級升級版) ---
const ThemeEngine = {
    // 1. 執行變色
    apply: function(xp) {
        console.log("當前頁面主題判定中... XP:", xp);
        const body = document.body;
        
        // ⚠️ 必須在這裡把 12 個主題的 class 全部列出來，確保切換時能清除乾淨
        body.classList.remove(
            'theme-novice', 'theme-rookie', 'theme-bronze', 'theme-silver', 
            'theme-gold', 'theme-diamond', 'theme-master', 'theme-grandmaster', 
            'theme-legend', 'theme-epic', 'theme-mythic', 'theme-celestial'
        );

        // 根據 XP 判定主題 (必須從最高分往下寫)
        if (xp >= 100000) { 
            body.classList.add('theme-celestial'); 
            this.createStars(15); // 12. 創世星神 (最高階，流星加倍！)
        } 
        else if (xp >= 50000) { 
            body.classList.add('theme-mythic'); 
            this.createStars(8);  // 11. 萬古神話 (一般流星)
        } 
        else if (xp >= 30000) body.classList.add('theme-epic');         // 10. 史詩英雄
        else if (xp >= 20000) body.classList.add('theme-legend');       // 9. 傳奇領主
        else if (xp >= 15000) body.classList.add('theme-grandmaster');  // 8. 榮耀宗師
        else if (xp >= 10000) body.classList.add('theme-master');       // 7. 聖域大師
        else if (xp >= 5000)  body.classList.add('theme-diamond');      // 6. 頂尖學者
        else if (xp >= 2500)  body.classList.add('theme-gold');         // 5. 黃金菁英
        else if (xp >= 1000)  body.classList.add('theme-silver');       // 4. 白銀騎士
        else if (xp >= 300)   body.classList.add('theme-bronze');       // 3. 勤奮書生
        else if (xp >= 100)   body.classList.add('theme-rookie');       // 2. 潛力新秀
        else                  body.classList.add('theme-novice');       // 1. 初心學徒 (0~99 XP)
    },

    // 2. 產生流星 (現在可以根據等級決定流星數量)
    createStars: function(starCount) {
        const container = document.getElementById('star-container');
        if (!container || container.hasChildNodes()) return; // 避免重複產生
        
        for (let i = 0; i < starCount; i++) {
            let star = document.createElement('div');
            star.className = 'shooting-star'; 
            star.style.top = Math.random() * 80 + 'vh';
            star.style.left = (Math.random() * 50 + 50) + 'vw';
            star.style.animationDelay = (Math.random() * 4) + 's';
            container.appendChild(star);
        }
    }
};

// --- 自動執行 ---
document.addEventListener('DOMContentLoaded', () => {
    // 讀取 currentUser，如果沒有就預設 0
    const user = JSON.parse(localStorage.getItem('currentUser') || '{"xp":0}');
    ThemeEngine.apply(user.xp);
});
// ==========================================
// ✏️ 個人資料編輯功能
// ==========================================
// 手機側邊欄開關
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    
    if (sidebar.classList.contains('-translate-x-full')) {
        // 開啟
        sidebar.classList.remove('-translate-x-full');
        overlay.classList.remove('hidden');
    } else {
        // 關閉
        sidebar.classList.add('-translate-x-full');
        overlay.classList.add('hidden');
    }
}
// 1. 開啟編輯視窗
function openProfileModal() {
    const user = Auth.getCurrentUser();
    if (!user) {
        alert("請先登入！");
        return;
    }

    // 設定下拉選單為目前的年級
    const select = document.getElementById('editGradeSelect');
    if (user.grade) {
        select.value = user.grade;
    }
    
    // 顯示視窗
    document.getElementById('profileModal').classList.remove('hidden');
}

// 2. 關閉編輯視窗
function closeProfileModal() {
    document.getElementById('profileModal').classList.add('hidden');
}

async function saveProfile() {
    const newGrade = document.getElementById('editGradeSelect').value;
    const user = Auth.getCurrentUser();
    if (!user) return alert("請先登入！");

    const saveBtn = document.querySelector('#profileModal button[onclick="saveProfile()"]');
    const originalBtnText = saveBtn.innerText;

    // 1. 進入載入狀態
    saveBtn.disabled = true;
    saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 儲存中...';

    try {
        // 2. 發送請求給 GAS 後端
        const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: "update_grade", // 此 action 需與 GAS 後端對應
                account: user.account || user.username,
                newGrade: newGrade
            })
        });

        const result = await response.json();

        if (result.status === "success") {
            // 3. 伺服器成功更新後，才更新本地資料
            if (Auth.updateUser) {
                Auth.updateUser('grade', newGrade);
            }
            
            const roleEl = document.getElementById('sideUserRole');
            if (roleEl) roleEl.innerText = newGrade;

            alert(`✅ 修改成功！目前年級已更新為：${newGrade}`);
            closeProfileModal();
        } else {
            alert("❌ 修改失敗：" + (result.message || "未知錯誤"));
        }
    } catch (error) {
        console.error("更新年級發生錯誤:", error);
        alert("網路連線異常，請稍後再試。");
    } finally {
        saveBtn.disabled = false;
        saveBtn.innerText = originalBtnText;
    }
}

      // 抓取任務核心邏輯 (修正版)
async function fetchAssignments() {
    const loadingState = document.getElementById('loadingState');
    const emptyState = document.getElementById('emptyState');
    const taskList = document.getElementById('taskList');
    const user = Auth.getCurrentUser(); // 取得當前學生資訊

    try {
        // ✨ 修正點 1：必須傳入 username 參數，GAS 才知道要把 lin 的任務給誰
        const res = await fetch(`${GAS_URL}?action=get_dispatches&username=${encodeURIComponent(user.username)}`);
        const tasks = await res.json();
        
        loadingState.classList.add('hidden');

        if (!tasks || tasks.length === 0) {
            emptyState.classList.remove('hidden');
            taskList.classList.add('hidden');
        } else {
            emptyState.classList.add('hidden');
            taskList.classList.remove('hidden');

            taskList.innerHTML = tasks.map((task, idx) => {
                // ✨ 修正點 2：處理「訊息類型」與「考卷類型」的差異
                let title, subject, link, icon, theme;

                if (task.type === 'message') {
                    // 這是老師發的「記得寫題目」
                    title = task.content; 
                    subject = "系統公告";
                    theme = { bg: 'bg-amber-100', text: 'text-amber-600', icon: 'fa-comment-dots' };
                    link = "#"; // 訊息純讀取，不跳轉
              // ... 在 fetchAssignments 的迴圈內 ...
               } else {
    // 這是考試類型
    const contentObj = typeof task.content === 'string' ? JSON.parse(task.content) : task.content;
    
    title = contentObj.title || "新測驗任務";
    subject = contentObj.subject || "math";
    
    // ✨ 關鍵修改：取得老師設定的「單元名稱」
    // 這裡預設老師端發送的 JSON 欄位名稱為 unitName
    const unitName = contentObj.unitName || ""; 
    
    theme = getSubjectTheme(subject);
    
    // ✨ 修改點：在 URL 加入 unit 參數，並移除舊有的 tags
    // 這樣 course_hub.html 就能根據單元名稱去 curriculum_integrated.js 抓取對應的題目範圍
    link = `course_hub.html?subject=${subject}&grade=${encodeURIComponent(userGrade)}&unit=${encodeURIComponent(unitName)}&missionId=${task.id}`;
}
                return `
                    <div class="task-card bg-white p-6 rounded-3xl shadow-sm flex flex-col h-full fade-in" style="animation-delay: ${idx * 0.1}s">
                        <div class="flex justify-between items-start mb-4">
                            <div class="w-12 h-12 ${theme.bg} ${theme.text} rounded-2xl flex items-center justify-center text-xl shadow-sm">
                                <i class="fas ${theme.icon}"></i>
                            </div>
                            <span class="text-[10px] font-black bg-red-100 text-red-600 px-3 py-1 rounded-full uppercase tracking-wider animate-pulse">
                                NEW
                            </span>
                        </div>
                        <div class="flex-grow">
                            <h3 class="font-black text-gray-800 text-lg mb-2 line-clamp-2">${title}</h3>
                            <p class="text-xs font-bold text-gray-400 mb-2 px-2 py-1 bg-gray-50 rounded-md inline-block">類型：${task.type === 'message' ? '老師留言' : '課程任務'}</p>
                        </div>
                        <div class="mt-6 pt-4 border-t border-gray-50">
                            <a href="${link}" class="block w-full text-center ${task.type === 'message' ? 'bg-slate-200 text-slate-500 cursor-default' : 'bg-gray-800 text-white hover:bg-orange-500'} py-3 rounded-xl text-sm font-bold transition shadow-md">
                                <i class="fas ${task.type === 'message' ? 'fa-check' : 'fa-play'} mr-2"></i>
                                ${task.type === 'message' ? '已閱讀' : '立即挑戰'}
                            </a>
                        </div>
                    </div>
                `;
            }).join('');
        }
    } catch (err) {
        console.error("載入任務失敗", err);
        loadingState.innerHTML = `<p class="text-red-500">系統連線失敗，請檢查網路</p>`;
    }
}
        // 輔助函數：取得科目的顏色與圖示設定
        function getSubjectTheme(subjectKey) {
            const themes = {
                'earth_science': { name: '地球科學', icon: 'fa-globe-asia', bg: 'bg-blue-100', text: 'text-blue-600' },
                'biology': { name: '生物科學', icon: 'fa-leaf', bg: 'bg-green-100', text: 'text-green-600' },
                'chemistry': { name: '理化學科', icon: 'fa-flask', bg: 'bg-purple-100', text: 'text-purple-600' },
                'chinese': { name: '國文', icon: 'fa-book-open', bg: 'bg-red-100', text: 'text-red-600' },
                'math': { name: '數學', icon: 'fa-calculator', bg: 'bg-indigo-100', text: 'text-indigo-600' },
                'english': { name: '英文', icon: 'fa-language', bg: 'bg-cyan-100', text: 'text-cyan-600' }
            };
            return themes[subjectKey] || { name: '綜合測驗', icon: 'fa-star', bg: 'bg-orange-100', text: 'text-orange-600' };
        }

        // 側邊欄開關 (手機版)
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }
    </script>
