/* 1. 鎖定所有 bg-white, bg-slate-50 等背景，全部變透明 */

/* 1. 無視任何設定，把所有區塊、白色、灰色背景全部強制變成「極淡的透明玻璃」！ */

/* ⚠️ 5. 唯一例外防護：把你的「XP經驗進度條」救回來，不然它也會變透明消失 */

}

                </div>

                <div id="emptyState" class="hidden text-center py-20 bg-white rounded-3xl shadow-sm border border-slate-100 fade-in">
                    <div class="w-24 h-24 bg-green-50 text-green-500 rounded-full flex items-center justify-center text-4xl mx-auto mb-6 shadow-inner">
                        <i class="fas fa-check-double"></i>
                    </div>
                    <h3 class="text-2xl font-black text-slate-800 mb-2">太棒了！目前沒有待辦任務</h3>
                    <p class="text-slate-500 mb-6">你已經完成了所有老師交代的作業。你可以前往自由學習，或是到遊戲場放鬆一下。</p>
                    <a href="dashboard.html" class="inline-block bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200">
                        <i class="fas fa-rocket mr-2"></i>前往課程總覽
                    </a>
                </div>

                <div id="taskList" class="hidden grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    </div>

            </div>
        </div>
        
    <div id="profileModal" class="hidden fixed inset-0 bg-black/50 z-[60] flex items-center justify-center backdrop-blur-sm fade-in px-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden transform transition-all scale-100">
            <div class="bg-blue-600 px-6 py-4 flex justify-between items-center">
                <h3 class="text-white font-bold text-lg"><i class="fas fa-user-edit mr-2"></i> 修改年級</h3>
                <button onclick="closeProfileModal()" class="text-white/80 hover:text-white transition">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="p-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">請選擇目前的年級：</label>
                <div class="relative">
                    <select id="editGradeSelect" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-xl focus:outline-none focus:border-blue-500 focus:bg-white appearance-none transition text-gray-700 font-bold">
                         <option value="國七">國七</option>
                    <option value="國八">國八</option>
                    <option value="國九">國九</option>
                    <hr>
                    <option value="高一">高一</option>
                    <option value="高二">高二</option>
                    <option value="高三">高三</option>
                </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                        <i class="fas fa-chevron-down"></i>
                    </div>
                </div>
                <p class="text-xs text-gray-400 mt-3">※ 修改後，系統將會優先推薦該年級的題目。</p>
            </div>

            <div class="bg-gray-50 px-6 py-4 flex justify-end gap-3 border-t border-gray-100">
                <button onclick="closeProfileModal()" class="px-4 py-2 text-gray-500 hover:text-gray-700 font-bold text-sm">取消</button>
                <button onclick="saveProfile()" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 shadow-md hover:shadow-lg transition">
                    確認修改
                </button>
            </div>
        </div>
    </div>
    </main>

    <script>
        // ==========================================
// ✏️ 個人資料與介面功能
// ==========================================
 const GAS_URL = "https://script.google.com/macros/s/AKfycbzQlG5LVquExr4qDerEGX_OaeOPYqp9Nk2Xk7WuJRq55XOPzIQx977KjCCteiWuhGfY2Q/exec";
        let userGrade = "高一";
        // --- 核心主題引擎 ---
const ThemeEngine = {
    // 1. 執行變色
    apply: function(xp) {
        console.log("當前頁面主題判定中... XP:", xp);
        const body = document.body;
        body.classList.remove('theme-rookie', 'theme-bronze', 'theme-diamond', 'theme-master', 'theme-legend', 'theme-mythic');

        if (xp >= 50000) { body.classList.add('theme-mythic'); this.createStars(); }
        else if (xp >= 20000) body.classList.add('theme-legend');
        else if (xp >= 10000) body.classList.add('theme-master');
        else if (xp >= 5000) body.classList.add('theme-diamond');
        else if (xp >= 300) body.classList.add('theme-bronze');
        else if (xp >= 100) body.classList.add('theme-rookie');
    },

    // 2. 產生流星 (只有神話等級會觸發)
    createStars: function() {
        const container = document.getElementById('star-container');
        if (!container || container.hasChildNodes()) return;
        for (let i = 0; i < 6; i++) {
            let star = document.createElement('div');
            star.className = 'shooting-star'; // CSS 動畫已在上面定義
            star.style.top = Math.random() * 80 + 'vh';
            star.style.left = (Math.random() * 50 + 50) + 'vw';
            star.style.animationDelay = (Math.random() * 4) + 's';
            container.appendChild(star);
        }
    }
};

// --- 自動執行 ---
document.addEventListener('DOMContentLoaded', () => {
    // 讀取 currentUser，如果沒有就預設 0
    const user = JSON.parse(localStorage.getItem('currentUser') || '{"xp":0}');
    ThemeEngine.apply(user.xp);
});
// ==========================================
// ✏️ 個人資料編輯功能
// ==========================================
// 手機側邊欄開關
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    
    if (sidebar.classList.contains('-translate-x-full')) {
        // 開啟
        sidebar.classList.remove('-translate-x-full');
        overlay.classList.remove('hidden');
    } else {
        // 關閉
        sidebar.classList.add('-translate-x-full');
        overlay.classList.add('hidden');
    }
}
// 1. 開啟編輯視窗
function openProfileModal() {
    const user = Auth.getCurrentUser();
    if (!user) {
        alert("請先登入！");
        return;
    }

    // 設定下拉選單為目前的年級
    const select = document.getElementById('editGradeSelect');
    if (user.grade) {
        select.value = user.grade;
    }
    
    // 顯示視窗
    document.getElementById('profileModal').classList.remove('hidden');
}

// 2. 關閉編輯視窗
function closeProfileModal() {
    document.getElementById('profileModal').classList.add('hidden');
}

async function saveProfile() {
    const newGrade = document.getElementById('editGradeSelect').value;
    const user = Auth.getCurrentUser();
    if (!user) return alert("請先登入！");

    const saveBtn = document.querySelector('#profileModal button[onclick="saveProfile()"]');
    const originalBtnText = saveBtn.innerText;

    // 1. 進入載入狀態
    saveBtn.disabled = true;
    saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 儲存中...';

    try {
        // 2. 發送請求給 GAS 後端
        const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: "update_grade", // 此 action 需與 GAS 後端對應
                account: user.account || user.username,
                newGrade: newGrade
            })
        });

        const result = await response.json();

        if (result.status === "success") {
            // 3. 伺服器成功更新後，才更新本地資料
            if (Auth.updateUser) {
                Auth.updateUser('grade', newGrade);
            }
            
            const roleEl = document.getElementById('sideUserRole');
            if (roleEl) roleEl.innerText = newGrade;

            alert(`✅ 修改成功！目前年級已更新為：${newGrade}`);
            closeProfileModal();
        } else {
            alert("❌ 修改失敗：" + (result.message || "未知錯誤"));
        }
    } catch (error) {
        console.error("更新年級發生錯誤:", error);
        alert("網路連線異常，請稍後再試。");
    } finally {
        saveBtn.disabled = false;
        saveBtn.innerText = originalBtnText;
    }
}
        // ⚠️ 替換為你的 GAS URL
       

        window.onload = function() {
            if (typeof Auth !== 'undefined') {
                const user = Auth.getCurrentUser();
                if(user) {
                    document.getElementById('sideUserName').textContent = user.name;
                    document.getElementById('sideUserRole').textContent = user.grade;
                    userGrade = user.grade;
                    fetchAssignments(); // 載入任務
                } else {
                    alert("請先登入！");
                    window.location.href = 'index.html';
                }
            }
        };

      // 抓取任務核心邏輯 (修正版)
async function fetchAssignments() {
    const loadingState = document.getElementById('loadingState');
    const emptyState = document.getElementById('emptyState');
    const taskList = document.getElementById('taskList');
    const user = Auth.getCurrentUser(); // 取得當前學生資訊

    try {
        // ✨ 修正點 1：必須傳入 username 參數，GAS 才知道要把 lin 的任務給誰
        const res = await fetch(`${GAS_URL}?action=get_dispatches&username=${encodeURIComponent(user.username)}`);
        const tasks = await res.json();
        
        loadingState.classList.add('hidden');

        if (!tasks || tasks.length === 0) {
            emptyState.classList.remove('hidden');
            taskList.classList.add('hidden');
        } else {
            emptyState.classList.add('hidden');
            taskList.classList.remove('hidden');

            taskList.innerHTML = tasks.map((task, idx) => {
                // ✨ 修正點 2：處理「訊息類型」與「考卷類型」的差異
                let title, subject, link, icon, theme;

                if (task.type === 'message') {
                    // 這是老師發的「記得寫題目」
                    title = task.content; 
                    subject = "系統公告";
                    theme = { bg: 'bg-amber-100', text: 'text-amber-600', icon: 'fa-comment-dots' };
                    link = "#"; // 訊息純讀取，不跳轉
              // ... 在 fetchAssignments 的迴圈內 ...
               } else {
    // 這是考試類型
    const contentObj = typeof task.content === 'string' ? JSON.parse(task.content) : task.content;
    
    title = contentObj.title || "新測驗任務";
    subject = contentObj.subject || "math";
    
    // ✨ 關鍵修改：取得老師設定的「單元名稱」
    // 這裡預設老師端發送的 JSON 欄位名稱為 unitName
    const unitName = contentObj.unitName || ""; 
    
    theme = getSubjectTheme(subject);
    
    // ✨ 修改點：在 URL 加入 unit 參數，並移除舊有的 tags
    // 這樣 course_hub.html 就能根據單元名稱去 curriculum_integrated.js 抓取對應的題目範圍
    link = `course_hub.html?subject=${subject}&grade=${encodeURIComponent(userGrade)}&unit=${encodeURIComponent(unitName)}&missionId=${task.id}`;
}
                return `
                    <div class="task-card bg-white p-6 rounded-3xl shadow-sm flex flex-col h-full fade-in" style="animation-delay: ${idx * 0.1}s">
                        <div class="flex justify-between items-start mb-4">
                            <div class="w-12 h-12 ${theme.bg} ${theme.text} rounded-2xl flex items-center justify-center text-xl shadow-sm">
                                <i class="fas ${theme.icon}"></i>
                            </div>
                            <span class="text-[10px] font-black bg-red-100 text-red-600 px-3 py-1 rounded-full uppercase tracking-wider animate-pulse">
                                NEW
                            </span>
                        </div>
                        <div class="flex-grow">
                            <h3 class="font-black text-gray-800 text-lg mb-2 line-clamp-2">${title}</h3>
                            <p class="text-xs font-bold text-gray-400 mb-2 px-2 py-1 bg-gray-50 rounded-md inline-block">類型：${task.type === 'message' ? '老師留言' : '課程任務'}</p>
                        </div>
                        <div class="mt-6 pt-4 border-t border-gray-50">
                            <a href="${link}" class="block w-full text-center ${task.type === 'message' ? 'bg-slate-200 text-slate-500 cursor-default' : 'bg-gray-800 text-white hover:bg-orange-500'} py-3 rounded-xl text-sm font-bold transition shadow-md">
                                <i class="fas ${task.type === 'message' ? 'fa-check' : 'fa-play'} mr-2"></i>
                                ${task.type === 'message' ? '已閱讀' : '立即挑戰'}
                            </a>
                        </div>
                    </div>
                `;
            }).join('');
        }
    } catch (err) {
        console.error("載入任務失敗", err);
        loadingState.innerHTML = `<p class="text-red-500">系統連線失敗，請檢查網路</p>`;
    }
}
        // 輔助函數：取得科目的顏色與圖示設定
        function getSubjectTheme(subjectKey) {
            const themes = {
                'earth_science': { name: '地球科學', icon: 'fa-globe-asia', bg: 'bg-blue-100', text: 'text-blue-600' },
                'biology': { name: '生物科學', icon: 'fa-leaf', bg: 'bg-green-100', text: 'text-green-600' },
                'chemistry': { name: '理化學科', icon: 'fa-flask', bg: 'bg-purple-100', text: 'text-purple-600' },
                'chinese': { name: '國文', icon: 'fa-book-open', bg: 'bg-red-100', text: 'text-red-600' },
                'math': { name: '數學', icon: 'fa-calculator', bg: 'bg-indigo-100', text: 'text-indigo-600' },
                'english': { name: '英文', icon: 'fa-language', bg: 'bg-cyan-100', text: 'text-cyan-600' }
            };
            return themes[subjectKey] || { name: '綜合測驗', icon: 'fa-star', bg: 'bg-orange-100', text: 'text-orange-600' };
        }

        // 側邊欄開關 (手機版)
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }
    </script>
