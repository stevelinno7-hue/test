    <script>

        const urlParams = new URLSearchParams(window.location.search);

        const stage = urlParams.get('stage') || 'junior_high';
        const title = decodeURIComponent(urlParams.get('title') || '課程');
        const gradeParam = urlParams.get('grade') || '';
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzQlG5LVquExr4qDerEGX_OaeOPYqp9Nk2Xk7WuJRq55XOPzIQx977KjCCteiWuhGfY2Q/exec";

        let currentBooks = [];
        let activeBookIndex = 0;  // 請替換為您實際的 GAS Web App URL
       // ==========================================
// 🎨 核心主題引擎 (12 個階級升級版)
// ==========================================
const ThemeEngine = {
    apply: function(xp) {
        console.log("儀表板主題判定中... XP:", xp);
        const body = document.body;
        
        // 清除舊主題
        body.classList.remove(
            'theme-novice', 'theme-rookie', 'theme-bronze', 'theme-silver', 
            'theme-gold', 'theme-diamond', 'theme-master', 'theme-grandmaster', 
            'theme-legend', 'theme-epic', 'theme-mythic', 'theme-celestial'
        );

        // 根據 XP 判定並加入新主題
        if (xp >= 100000) { body.classList.add('theme-celestial'); this.createStars(15); } 
        else if (xp >= 50000) { body.classList.add('theme-mythic'); this.createStars(8); } 
        else if (xp >= 30000) body.classList.add('theme-epic');         
        else if (xp >= 20000) body.classList.add('theme-legend');       
        else if (xp >= 15000) body.classList.add('theme-grandmaster');  
        else if (xp >= 10000) body.classList.add('theme-master');       
        else if (xp >= 5000)  body.classList.add('theme-diamond');      
        else if (xp >= 2500)  body.classList.add('theme-gold');         
        else if (xp >= 1000)  body.classList.add('theme-silver');       
        else if (xp >= 300)   body.classList.add('theme-bronze');       
        else if (xp >= 100)   body.classList.add('theme-rookie');       
        else                  body.classList.add('theme-novice');       
    },

    createStars: function(starCount) {
        const container = document.getElementById('star-container');
        if (!container || container.hasChildNodes()) return; 
        
        for (let i = 0; i < starCount; i++) {
            let star = document.createElement('div');
            star.className = 'shooting-star'; 
            star.style.top = Math.random() * 80 + 'vh';
            star.style.left = (Math.random() * 50 + 50) + 'vw';
            star.style.animationDelay = (Math.random() * 4) + 's';
            container.appendChild(star);
        }
    }
};

// 網頁載入時自動執行主題變色
document.addEventListener('DOMContentLoaded', () => {
    let userXP = 0;
    if (typeof Auth !== 'undefined') {
        const user = Auth.getCurrentUser();
        if (user && user.xp) userXP = user.xp;
    } else {
        const localUser = JSON.parse(localStorage.getItem('currentUser') || '{"xp":0}');
        userXP = localUser.xp;
    }
    ThemeEngine.apply(userXP);
});
        // ==========================================
        // 🚀 初始化
        // ==========================================
window.onload = function() {
            if (window.Auth && !Auth.requireLogin()) return;
            
            // 1. 初始化使用者顯示
            const user = Auth.getCurrentUser();
            if (user) {
                const nameEl = document.getElementById('sideUserName');
                const roleEl = document.getElementById('sideUserRole');
                if (nameEl) nameEl.innerText = user.name || "學生";
                if (roleEl) roleEl.innerText = user.grade || "未設定年級";
            }

            // 2. 設定頁面靜態資訊
            document.getElementById('courseTitle').textContent = title;
            document.getElementById('breadcrumbCurrent').textContent = title;
            document.getElementById('gradeBadge').textContent = stage === 'high_school' ? '高中部' : '國中部';

            // 3. 設定快速按鈕連結
            document.getElementById('linkStudy').href = `study.html?filter=${subject}`;
            document.getElementById('linkArcade').href = `arcade.html?subject=${subject}`;
            document.getElementById('linkExamAll').href = `exam.html?subject=${subject}&title=${encodeURIComponent(title + "總複習")}&count=20&grade=${encodeURIComponent(gradeParam)}`;

            // 4. 載入課程資料 (確保對應到你的 curriculum_integrated.js 結構)
            if(window.initCurriculumData) window.initCurriculumData();
            
            // 這裡修正為直接從 CurriculumLibrary 取值，因為你的檔案結構看起來是 global 的
            const rawData = (window.CurriculumLibrary.data ? window.CurriculumLibrary.data[subject] : window.CurriculumLibrary[subject]) || [];
            
            // 5. 過濾與排序
            currentBooks = rawData.filter(book => book.stage === stage);
            
            if (currentBooks.length === 0) {
                document.getElementById('unitContainer').innerHTML = `
                    <div class="text-center py-20">
                        <i class="fas fa-search text-4xl text-gray-300 mb-4"></i>
                        <p class="text-gray-500 font-bold">尚無此課程資料</p>
                        <p class="text-sm text-gray-400 mt-2">Subject: ${subject} / Stage: ${stage}</p>
                    </div>`;
                return;
            }

            // 智能排序：嘗試解析 "Book 1", "第一冊" 等
            currentBooks.sort((a, b) => {
                const getNum = (item) => {
                    const str = (item.book || item.name || "").toString();
                    const match = str.match(/\d+/);
                    if (match) return parseInt(match[0]);
                    const map = { '一':1, '二':2, '三':3, '四':4, '五':5, '六':6, '七':7, '八':8, '九':9, '全':0 };
                    for(let k in map) { if(str.includes(k)) return map[k]; }
                    return 99;
                };
                return getNum(a) - getNum(b);
            });

            // 🌟 6. 智慧單元定位 (核心新增)
            const targetUnit = urlParams.get('unit'); // 接收來自任務中心的單元名稱
            let targetBookIdx = 0; // 預設顯示第一冊

            if (targetUnit) {
                // 在所有冊別中搜尋哪一冊包含這個單元
                const foundIdx = currentBooks.findIndex(book => 
                    book.units.some(u => u.name === targetUnit)
                );
                if (foundIdx !== -1) {
                    targetBookIdx = foundIdx;
                    activeBookIndex = foundIdx;
                }
            }

            // 7. 渲染畫面
            renderTabs();
            renderUnits(targetBookIdx);

            // 🌟 8. 自動捲動並高亮目標單元 (進階優化)
            if (targetUnit) {
                setTimeout(() => {
                    const unitElements = document.querySelectorAll('#unitContainer .fade-in');
                    unitElements.forEach(el => {
                        if (el.innerText.includes(targetUnit)) {
                            // 加上亮藍色外框標示
                            el.classList.add('ring-4', 'ring-blue-400', 'ring-opacity-50', 'bg-blue-50/50');
                            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    });
                }, 600);
            }
        };

        }
async function saveProfile() {
    const newGrade = document.getElementById('editGradeSelect').value;
    const user = Auth.getCurrentUser();
    if (!user) return alert("請先登入！");

    const saveBtn = document.querySelector('#profileModal button[onclick="saveProfile()"]');
    const originalBtnText = saveBtn.innerText;

    // 1. 進入載入狀態
    saveBtn.disabled = true;
    saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 儲存中...';

    try {
        // 2. 發送請求給 GAS 後端
        const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
                action: "update_grade", // 此 action 需與 GAS 後端對應
                account: user.account || user.username,
                newGrade: newGrade
            })
        });

        const result = await response.json();

        if (result.status === "success") {
            // 3. 伺服器成功更新後，才更新本地資料
            if (Auth.updateUser) {
                Auth.updateUser('grade', newGrade);
            }
            
            const roleEl = document.getElementById('sideUserRole');
            if (roleEl) roleEl.innerText = newGrade;

            alert(`✅ 修改成功！目前年級已更新為：${newGrade}`);
            closeProfileModal();
        } else {
            alert("❌ 修改失敗：" + (result.message || "未知錯誤"));
        }
    } catch (error) {
        console.error("更新年級發生錯誤:", error);
        alert("網路連線異常，請稍後再試。");
    } finally {
        saveBtn.disabled = false;
        saveBtn.innerText = originalBtnText;
    }
}
        // ==========================================
        // 📚 渲染邏輯
        // ==========================================
        function renderTabs() {
            const container = document.getElementById('bookTabs');
            container.innerHTML = '';
            
            currentBooks.forEach((book, idx) => {
                const btn = document.createElement('button');
                const isActive = idx === activeBookIndex;
                btn.className = `px-6 py-4 text-sm whitespace-nowrap transition-colors flex-shrink-0 ${isActive ? 'tab-active' : 'tab-inactive'}`;
                btn.textContent = book.name || book.book || `第 ${idx+1} 冊`; 
                btn.onclick = () => {
                    activeBookIndex = idx;
                    renderTabs();
                    renderUnits(idx);
                };
                container.appendChild(btn);
            });
        }

        function renderUnits(bookIdx) {
            const container = document.getElementById('unitContainer');
            const bookData = currentBooks[bookIdx];
            
            if (!bookData || !bookData.units || bookData.units.length === 0) {
                container.innerHTML = '<p class="text-center py-10 text-gray-400">本冊尚無單元資料</p>';
                return;
            }

            let html = '<div class="grid grid-cols-1 gap-4">';
            
            bookData.units.forEach((unit, uIdx) => {
                const tags = unit.tags || [];
                const topics = unit.topics || [];
                const displayTags = tags.length > 0 ? tags : topics;
                const tagParam = displayTags.join(','); 

                const examLink = `exam.html?subject=${subject}&title=${encodeURIComponent(unit.name)}&count=10&grade=${encodeURIComponent(tagParam)}`;
                const gameLink = `arcade.html?subject=${subject}&grade=${encodeURIComponent(tagParam)}`;

                const topicsHtml = displayTags.map(t => `<span class="bg-white border border-slate-200 text-slate-500 text-xs px-2 py-1 rounded">${t}</span>`).join('');
        
                html += `
                    <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm hover:border-blue-300 hover:shadow-md transition group fade-in" style="animation-delay: ${uIdx * 0.05}s">
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div class="flex-grow min-w-0"> <h3 class="font-bold text-lg text-slate-800 mb-2 flex items-center gap-2 flex-wrap">
                                    <span class="bg-slate-100 text-slate-500 text-xs px-2 py-1 rounded shrink-0">單元 ${uIdx + 1}</span>
                                    <span class="break-words">${unit.name}</span>
                                </h3>
                                <div class="flex flex-wrap gap-2">
                                    ${topicsHtml}
                                </div>
                            </div>
                            
                            <div class="flex gap-2 w-full md:w-auto mt-2 md:mt-0 shrink-0">
                                <a href="study.html?filter=${subject}" class="flex-1 md:flex-none px-3 py-2 border border-slate-200 text-slate-600 rounded-lg text-sm font-bold hover:bg-slate-50 text-center flex items-center justify-center">
                                    <i class="fas fa-book-open md:mr-1"></i> <span class="hidden md:inline">複習</span>
                                </a>

                                <a href="${gameLink}" class="flex-1 md:flex-none px-3 py-2 bg-orange-50 text-orange-600 border border-orange-100 rounded-lg text-sm font-bold hover:bg-orange-100 text-center flex items-center justify-center transition">
                                    <i class="fas fa-gamepad md:mr-1"></i> <span class="hidden md:inline">遊戲</span><span class="md:hidden">玩</span>
                                </a>

                                <a href="${examLink}" class="flex-1 md:flex-none px-3 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold hover:bg-blue-700 shadow-sm text-center flex items-center justify-center transition">
                                    <i class="fas fa-pencil-alt md:mr-1"></i> <span class="hidden md:inline">測驗</span>
                                </a>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            container.innerHTML = html;
        }
    </script>
