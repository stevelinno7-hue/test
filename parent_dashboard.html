<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家長監護中心 | 學習進度即時看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="mockdata/curriculum_integrated.js"></script>
    <link rel="icon" type="image/x-icon" href="1-1ce8683e.ico"> 
</head>
<body class="bg-gray-50 min-h-screen text-slate-900">
<nav class="bg-slate-900 text-white p-6 shadow-xl sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-500 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                    <i class="fas fa-chart-line"></i>
                </div>
                <div>
                    <h1 class="font-black text-xl tracking-tighter uppercase">家長<span class="text-blue-400">監護看板</span></h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">即時學習追蹤系統</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p class="text-sm font-bold" id="studentName">讀取中...</p>
                    <p class="text-[10px] text-blue-400 font-mono" id="studentIdDisplay">學號: ----</p>
                </div>
                
                <button onclick="logout()" class="w-10 h-10 bg-slate-800 hover:bg-red-500 rounded-xl flex items-center justify-center transition-colors shadow-sm border border-slate-700 hover:border-red-400 group">
                    <i class="fas fa-sign-out-alt text-slate-400 group-hover:text-white transition-colors"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-4 md:p-8 space-y-8">
        
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="md:col-span-3 bg-white rounded-[2rem] p-8 shadow-sm border border-slate-100">
                <h3 class="font-black text-slate-800 mb-6 flex items-center gap-2 uppercase tracking-tight">
                    <span class="w-1.5 h-6 bg-blue-500 rounded-full"></span> 各科目精熟度分析
                </h3>
                <div id="subjectGrid" class="space-y-6">
                    </div>
            </div>
            
            <div class="bg-slate-900 rounded-[2rem] p-8 text-white flex flex-col justify-center items-center shadow-2xl relative overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-10 text-6xl"><i class="fas fa-graduation-cap"></i></div>
                <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">本月測驗</p>
                <p class="text-7xl font-black my-4 text-blue-400" id="statCount">0</p>
                <p class="text-[10px] bg-white/10 px-3 py-1 rounded-full font-bold">已完成測驗數</p>
            </div>
        </div>

        <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-8 border-b border-slate-50 flex flex-col md:flex-row justify-between items-center gap-4 bg-slate-50/30">
                <div>
                    <h3 class="font-black text-slate-800 uppercase italic">單元學習明細分析</h3>
                    <p class="text-xs text-slate-400 mt-1">對照課程架構之各項學習重點掌握情況</p>
                </div>
             <select id="subPicker" onchange="renderUnitDetails()" class="w-full md:w-auto bg-white border border-slate-200 rounded-2xl px-6 py-3 text-sm font-black text-slate-700 shadow-sm focus:ring-4 focus:ring-blue-500/10 outline-none transition-all">
    <option value="chinese">國文</option>
    <option value="math">數學</option>
    <option value="english">英文</option>
    <option value="biology">生物</option>
    <option value="physics">理化(物理)</option>
    <option value="chemistry">理化(化學)</option>
    <option value="earth_science">地球科學</option>
    <option value="history">歷史</option>
    <option value="geography">地理</option>
    <option value="civics">公民</option>
</select>
            </div>
            
            <div id="unitDetailList" class="divide-y divide-slate-50">
                </div>
        </div>
    </main>
<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzQlG5LVquExr4qDerEGX_OaeOPYqp9Nk2Xk7WuJRq55XOPzIQx977KjCCteiWuhGfY2Q/exec"; // 💡 你的真實 GAS 網址
    let remoteData = { records: [] };
    
    // 🌟 強化版：多管齊下抓取綁定的小孩帳號
    let targetStudentId = localStorage.getItem('childUsername');
    
    // 如果 childUsername 抓不到，嘗試從登入時整包的 currentUser 裡面抓
    if (!targetStudentId) {
        try {
            const userObj = JSON.parse(localStorage.getItem('currentUser') || '{}');
            // 在你的設定中，家長綁定的學生帳號是存在 grade (年級或綁定帳號) 欄位裡
            if (userObj.role === 'parent' && userObj.grade) {
                targetStudentId = userObj.grade;
            }
        } catch(e) { 
            console.warn("無法解析 currentUser"); 
        }
    }
    
    // 最終防呆：如果都沒抓到，才用備用帳號
    if (!targetStudentId) {
        console.error("⚠️ 找不到綁定的學生帳號，使用預設測試帳號 S12345");
        targetStudentId = "S12345";
    } else {
        console.log("✅ 成功抓取綁定帳號：", targetStudentId);
    }

    async function fetchDashboardData() {
        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "get_parent_dashboard", studentId: targetStudentId })
            });
            remoteData = await response.json();
            
            // 更新基礎資訊
            document.getElementById('studentName').innerText = remoteData.studentName + " 同學";
            document.getElementById('studentIdDisplay').innerText = "學號: " + remoteData.studentId;
            document.getElementById('statCount').innerText = remoteData.records.length;

            renderSubjectProgress();
            renderUnitDetails();
        } catch (error) {
            console.error("Data fetch error:", error);
            alert("無法連線至雲端資料庫，請檢查網路設定。");
        }
    }

    function renderSubjectProgress() {
        const subjects = [
            { id: 'chinese', name: '國文', color: 'bg-red-500' },
            { id: 'math', name: '數學', color: 'bg-blue-500' },
            { id: 'english', name: '英文', color: 'bg-orange-500' },
            { id: 'biology', name: '生物', color: 'bg-green-500' },
            { id: 'physics', name: '理化(物理)', color: 'bg-purple-500' },
            { id: 'chemistry', name: '理化(化學)', color: 'bg-pink-500' },
            { id: 'earth_science', name: '地球科學', color: 'bg-teal-500' },
            { id: 'history', name: '歷史', color: 'bg-yellow-600' },
            { id: 'geography', name: '地理', color: 'bg-emerald-500' },
            { id: 'civics', name: '公民', color: 'bg-indigo-500' }
        ];

       const html = subjects.map(s => {
        // 🌟 強化比對邏輯：
        // 1. 比對 subject 欄位
        // 2. 如果紀錄裡沒有 subject，嘗試比對 unitName 是否出現在該科目的 CurriculumLibrary 中
        const results = remoteData.records.filter(r => {
            if (r.subject === s.id) return true;
            
            // 💡 額外檢查：如果紀錄是「國文」，但單元名稱其實是「生物」相關的
            const lib = window.CurriculumLibrary[s.id] || [];
            const isMatchUnit = lib.some(book => book.units.some(u => u.name === r.unitName));
            return isMatchUnit;
        });

        const avg = results.length ? Math.round(results.reduce((a, b) => a + b.score, 0) / results.length) : 0;
            return `
                <div>
                    <div class="flex justify-between text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">
                        <span>${s.name}平均精熟度</span>
                        <span class="${avg >= 80 ? 'text-green-500' : 'text-slate-600'}">${avg}%</span>
                    </div>
                    <div class="w-full bg-slate-100 h-4 rounded-full p-1 border border-slate-50">
                        <div class="${s.color} h-full rounded-full transition-all duration-1000 shadow-sm shadow-current" style="width: ${avg}%"></div>
                    </div>
                </div>
            `;
        }).join('');
        document.getElementById('subjectGrid').innerHTML = html;
    }

    function renderUnitDetails() {
        const selectedSub = document.getElementById('subPicker').value;
        const listContainer = document.getElementById('unitDetailList');
        
        // 🛡️ 防呆：檢查 CurriculumLibrary 是否存在
        if (typeof window.CurriculumLibrary === "undefined") {
            console.error("找不到單元資料！請檢查 curriculum_integrated.js 檔案是否正確載入。");
            listContainer.innerHTML = `
                <div class="p-8 text-center text-red-500 font-bold bg-red-50 rounded-xl m-4 border border-red-200">
                    <i class="fas fa-exclamation-triangle text-2xl mb-2"></i>
                    <p>無法載入課程單元資料</p>
                    <p class="text-xs text-red-400 mt-1">請檢查 JS 檔案路徑與變數名稱設定</p>
                </div>`;
            return; 
        }
    
        // 🌟 核心：撈取資料
        const curriculumData = (window.CurriculumLibrary.data ? window.CurriculumLibrary.data[selectedSub] : window.CurriculumLibrary[selectedSub]) || [];
        // 攤平所有冊別 (Books) 的單元
        let unitsToDisplay = [];
        curriculumData.forEach(book => {
            book.units.forEach(u => {
                unitsToDisplay.push({ ...u, bookLabel: book.name });
            });
        });

        listContainer.innerHTML = unitsToDisplay.map(unit => {
            // 比對 GAS 回傳的成績
            const match = remoteData.records.find(r => r.unitName === unit.name);
            const score = match ? match.score : null;
            const scoreColor = score === null ? 'text-slate-200' : (score >= 80 ? 'text-green-500' : (score >= 60 ? 'text-amber-500' : 'text-red-500'));

            return `
                <div class="p-8 flex flex-col md:flex-row justify-between items-start md:items-center hover:bg-slate-50 transition-all group">
                    <div class="space-y-2">
                        <p class="text-[10px] font-black text-blue-500 uppercase tracking-tighter">${unit.bookLabel}</p>
                        <h4 class="text-lg font-black text-slate-800 group-hover:text-blue-600 transition-colors">${unit.name}</h4>
                        <div class="flex flex-wrap gap-2">
                            ${unit.topics.map(t => `<span class="px-2 py-1 bg-slate-100 text-slate-400 text-[9px] font-bold rounded-md border border-slate-200 uppercase tracking-tighter italic">${t}</span>`).join('')}
                        </div>
                    </div>
                    <div class="mt-4 md:mt-0 text-right">
                        <div class="text-4xl font-black ${scoreColor} tracking-tighter">
                            ${score !== null ? score + '<span class="text-xs ml-1 font-bold text-slate-400">分</span>' : '----'}
                        </div>
                        <p class="text-[10px] font-bold text-slate-400 uppercase mt-1">
                            ${match ? '完成日期：' + match.date : '尚未測驗'}
                        </p>
                    </div>
                </div>
            `;
        }).join('');
    }

    // 🌟 登出功能
    function logout() {
        if(confirm("確定要登出家長監護中心嗎？")) {
            localStorage.clear(); // 清除本地紀錄的帳號資訊
            window.location.href = "index.html"; // 跳轉回登入頁面
        }
    }

    // 啟動頁面
    window.onload = fetchDashboardData;
</script>
</body>
</html>
