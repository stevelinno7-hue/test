<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>更改密碼 - 雲端學院</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        /* 所有頁面通用的背景主題 */
body { transition: background 0.8s ease, color 0.5s ease; min-height: 100vh; }

body.theme-rookie { background-color: #dcfce7 !important; }   /* 100+ XP 淺綠 */
body.theme-bronze { background-color: #ffedd5 !important; }   /* 300+ XP 淺橘 */
body.theme-diamond { background: linear-gradient(135deg, #e0f2fe, #bae6fd) !important; } /* 5K+ XP 藍 */
body.theme-master { background: linear-gradient(135deg, #fee2e2, #fecaca) !important; }  /* 10K+ XP 紅 */
body.theme-legend { background: #451a03 !important; color: #fef3c7 !important; }          /* 20K+ XP 暗金 */
body.theme-mythic { background: radial-gradient(circle, #1e1b4b, #020617) !important; color: white !important; }
/* 當主題啟動時，讓特定的區塊變透明，透出底層背景色 */
/* 讓側邊欄跟隨主題變色 */
/* 當 body 有 theme- class 時，強制讓側邊欄背景透明或半透明 */
body[class*="theme-"] aside, 
body[class*="theme-"] #sidebar, 
body[class*="theme-"] .sidebar-content {
    background-color: rgba(255, 255, 255, 0.1) !important; /* 變半透明 */
    backdrop-filter: blur(10px); /* 磨砂玻璃質感 */
    border-right: 1px solid rgba(255, 255, 255, 0.1);
}

/* 針對側邊欄內的文字在深色主題時變白 */
body.theme-legend aside *, body.theme-mythic aside * {
    color: white !important;
}
/* --- 1. 當背景變深色時，強制將所有文字轉為白色/淺色 --- */

/* 針對「傳奇領主」與「萬古神話」這兩個深色主題 */
body.theme-legend, 
body.theme-mythic {
    color: #ffffff !important;
}

/* 強制修正側邊欄、導覽列與卡片內的文字 */
body.theme-legend *, 
body.theme-mythic * {
    /* 排除掉已經有背景色的標籤(Badge)，只改普通文字 */
    color: inherit; 
}

/* 確保側邊欄連結與圖示變亮 */
body.theme-legend aside a, 
body.theme-mythic aside a,
body.theme-legend aside i,
body.theme-mythic aside i {
    color: rgba(255, 255, 255, 0.9) !important;
}

/* 側邊欄懸停效果：變亮一點 */
body.theme-legend aside a:hover, 
body.theme-mythic aside a:hover {
    background-color: rgba(255, 255, 255, 0.1) !important;
}

/* --- 2. 讓卡片內容稍微透出背景，但不至於看不清楚 --- */
body.theme-legend .bg-white, 
body.theme-mythic .bg-white {
    background-color: rgba(255, 255, 255, 0.1) !important; /* 半透明白色 */
    backdrop-filter: blur(5px);
    border: 1px solid rgba(255, 255, 255, 0.1);
}

/* 修正原本寫死為 text-slate-800 的文字 */
body.theme-legend .text-slate-800,
body.theme-mythic .text-slate-800,
body.theme-legend .text-gray-600,
body.theme-mythic .text-gray-600 {
    color: #e2e8f0 !important;
}
/* 修正手機端可能出現的白色區塊 */
body[class*="theme-"] main, 
body[class*="theme-"] section,
body[class*="theme-"] .bg-white {
    background-color: transparent !important;
}

/* 讓手機端的底部導覽列（如果有）也透明 */
body[class*="theme-"] footer {
    background-color: rgba(255, 255, 255, 0.2) !important;
}
/* 流星容器 */
#star-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
        /* --- 讓所有白色容器在主題下自動轉型 --- */

/* 1. 鎖定所有可能帶有 bg-white 的容器 */
body[class*="theme-"] .bg-white,
body[class*="theme-"] .bg-slate-50,
body[class*="theme-"] #leaderboardContainer,
body[class*="theme-"] .ai-assistant-card, /* 假設你的AI助教卡片有這個 class */
body[class*="theme-"] aside {
    background-color: rgba(255, 255, 255, 0.1) !important; /* 變成微透明 */
    backdrop-filter: blur(10px); /* 磨砂玻璃效果 */
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.5s ease;
}

/* 2. 當進入「傳奇」或「神話」深色模式時，修正文字顏色 */
body.theme-legend, body.theme-mythic {
    color: #ffffff !important;
}

/* 強制將這些白色區塊內的文字也變白 */
body.theme-legend .bg-white *, 
body.theme-mythic .bg-white *,
body.theme-legend #leaderboardContainer *,
body.theme-mythic #leaderboardContainer *,
body.theme-legend .text-slate-800,
body.theme-mythic .text-slate-800,
body.theme-legend .text-gray-600,
body.theme-mythic .text-gray-600 {
    color: #ffffff !important;
}

/* 3. 修正 AI 助教的解答區 (通常是特別的灰色背景) */
body.theme-legend .bg-gray-100, 
body.theme-mythic .bg-gray-100,
body.theme-legend .bg-slate-100,
body.theme-mythic .bg-slate-100 {
    background-color: rgba(0, 0, 0, 0.3) !important; /* 解答區變深色 */
    color: #cbd5e1 !important;
}

/* 4. 讓側邊欄的按鈕在深色模式下不會消失 */
body.theme-legend aside a:hover, 
body.theme-mythic aside a:hover {
    background-color: rgba(255, 255, 255, 0.2) !important;
}
        /* --- 解決「太白」的問題：全域透明化規則 --- */

/* 只要 body 有 theme- 類別，就強制讓所有 bg-white 消失 */
body[class*="theme-"] .bg-white,
body[class*="theme-"] .bg-slate-50,
body[class*="theme-"] aside, 
body[class*="theme-"] nav, 
body[class*="theme-"] main {
    background-color: rgba(255, 255, 255, 0.2) !important; /* 變成 20% 透明的白 */
    backdrop-filter: blur(12px) !important; /* 磨砂玻璃效果 */
    border: 1px solid rgba(255, 255, 255, 0.3) !important; /* 增加細邊框質感 */
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05) !important; /* 減輕陰影，讓它輕盈一點 */
}

/* 針對個人資料卡片上方的「藍色區塊」進行修正 */
body.theme-bronze .profile-header-bg,
body.theme-bronze .bg-gradient-to-r.from-blue-600 {
    background: linear-gradient(to right, #f97316, #fb923c) !important; /* 藍色變橘色漸層 */
}

/* 修正文字：讓原本在白色背景下的黑字，在橘色背景下變成深褐色 */
body.theme-bronze .text-slate-800, 
body.theme-bronze #playerName, 
body.theme-bronze h3 {
    color: #7c2d12 !important;
}

/* 讓進度條底色不要那麼白 */
body[class*="theme-"] .bg-slate-100 {
    background-color: rgba(0, 0, 0, 0.05) !important;
}
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
<div id="star-container"></div>
    <div class="glass-card w-full max-w-md p-8 rounded-3xl shadow-xl border border-slate-200">
        
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl shadow-sm">
                <i class="fas fa-key"></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800">更改密碼</h2>
            <p class="text-sm font-bold text-slate-500 mt-2" id="userAccountDisplay">載入中...</p>
        </div>

        <form id="changePasswordForm" class="space-y-5">
            
            <div>
                <label class="block text-xs font-black text-slate-500 mb-1 ml-1 tracking-wider">目前密碼</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-slate-400"></i>
                    </div>
                    <input type="password" id="oldPassword" required placeholder="請輸入目前的密碼" 
                           class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>
            </div>

            <div>
                <label class="block text-xs font-black text-slate-500 mb-1 ml-1 tracking-wider">新密碼 <span class="text-[10px] text-slate-400 font-normal">(至少 6 個字元)</span></label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-blue-400"></i>
                    </div>
                    <input type="password" id="newPassword" required placeholder="請輸入新密碼" 
                           class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>
            </div>

            <div>
                <label class="block text-xs font-black text-slate-500 mb-1 ml-1 tracking-wider">確認新密碼</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fas fa-check-circle text-blue-400"></i>
                    </div>
                    <input type="password" id="confirmPassword" required placeholder="請再次輸入新密碼" 
                           class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                </div>
            </div>

            <div id="errorMessage" class="hidden bg-red-50 text-red-600 text-xs font-bold p-3 rounded-xl border border-red-100 flex items-center gap-2">
                <i class="fas fa-exclamation-triangle"></i>
                <span id="errorText">錯誤訊息</span>
            </div>

            <div id="successMessage" class="hidden bg-green-50 text-green-600 text-sm font-bold p-4 rounded-xl border border-green-100 text-center flex-col items-center gap-2">
                <i class="fas fa-check-circle text-2xl mb-1"></i>
                <span>密碼修改成功！請重新登入。</span>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-3.5 rounded-xl shadow-md transition-all flex items-center justify-center gap-2 mt-2">
                <i class="fas fa-save"></i> 儲存新密碼
            </button>
            
            <button type="button" onclick="history.back()" id="backBtn" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-3 rounded-xl transition-all mt-2 text-sm">
                返回上一頁
            </button>
        </form>
    </div>

    <script>
        // --- 核心主題引擎 ---
const ThemeEngine = {
    // 1. 執行變色
    apply: function(xp) {
        console.log("當前頁面主題判定中... XP:", xp);
        const body = document.body;
        body.classList.remove('theme-rookie', 'theme-bronze', 'theme-diamond', 'theme-master', 'theme-legend', 'theme-mythic');

        if (xp >= 50000) { body.classList.add('theme-mythic'); this.createStars(); }
        else if (xp >= 20000) body.classList.add('theme-legend');
        else if (xp >= 10000) body.classList.add('theme-master');
        else if (xp >= 5000) body.classList.add('theme-diamond');
        else if (xp >= 300) body.classList.add('theme-bronze');
        else if (xp >= 100) body.classList.add('theme-rookie');
    },

    // 2. 產生流星 (只有神話等級會觸發)
    createStars: function() {
        const container = document.getElementById('star-container');
        if (!container || container.hasChildNodes()) return;
        for (let i = 0; i < 6; i++) {
            let star = document.createElement('div');
            star.className = 'shooting-star'; // CSS 動畫已在上面定義
            star.style.top = Math.random() * 80 + 'vh';
            star.style.left = (Math.random() * 50 + 50) + 'vw';
            star.style.animationDelay = (Math.random() * 4) + 's';
            container.appendChild(star);
        }
    }
};

// --- 自動執行 ---
document.addEventListener('DOMContentLoaded', () => {
    // 讀取 currentUser，如果沒有就預設 0
    const user = JSON.parse(localStorage.getItem('currentUser') || '{"xp":0}');
    ThemeEngine.apply(user.xp);
});
        // 請替換為您實際的 GAS Web App URL
        const GAS_URL = "https://script.google.com/macros/s/AKfycbzQlG5LVquExr4qDerEGX_OaeOPYqp9Nk2Xk7WuJRq55XOPzIQx977KjCCteiWuhGfY2Q/exec"; 

        // 1. 頁面載入時，確認使用者是否已登入
        document.addEventListener('DOMContentLoaded', () => {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser) {
                alert("請先登入！");
                window.location.href = "index.html"; // 導回登入頁
                return;
            }
            // 顯示目前使用者的帳號或名稱
            document.getElementById('userAccountDisplay').textContent = `帳號：${currentUser.account || currentUser.username}`;
        });

        // 2. 表單送出事件處理
        document.getElementById('changePasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // 防止網頁重新整理
            
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            
            const submitBtn = document.getElementById('submitBtn');
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const successMessage = document.getElementById('successMessage');
            const backBtn = document.getElementById('backBtn');

            // 隱藏之前的訊息
            errorMessage.classList.add('hidden');
            successMessage.classList.add('hidden');

            // --- 前端防呆驗證 ---
            if (newPassword.length < 6) {
                showError("新密碼長度必須至少 6 個字元！");
                return;
            }
            if (newPassword !== confirmPassword) {
                showError("兩次輸入的新密碼不一致！");
                return;
            }
            if (oldPassword === newPassword) {
                showError("新密碼不能與舊密碼相同！");
                return;
            }

            // --- 準備發送 API 請求 ---
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 處理中...';
            submitBtn.classList.add('opacity-70', 'cursor-not-allowed');

            try {
                // 發送 POST 請求給 GAS
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: "change_password",
                        account: currentUser.account || currentUser.username, // 傳送帳號
                        oldPassword: oldPassword,
                        newPassword: newPassword
                    })
                });

                const result = await response.json();

                if (result.status === "success" || result.result === "success") {
                    // 修改成功 UI 變化
                    document.getElementById('oldPassword').disabled = true;
                    document.getElementById('newPassword').disabled = true;
                    document.getElementById('confirmPassword').disabled = true;
                    submitBtn.classList.add('hidden');
                    backBtn.classList.add('hidden');
                    successMessage.classList.remove('hidden', 'flex-col');
                    successMessage.classList.add('flex', 'flex-col');
                    
                    // 清除登入狀態，要求重新登入
                    localStorage.removeItem('currentUser');
                    
                    // 3 秒後自動導向登入頁
                    setTimeout(() => {
                        window.location.href = "index.html"; 
                    }, 3000);
                } else {
                    // 伺服器回報錯誤 (例如：舊密碼輸入錯誤)
                    showError(result.message || "修改失敗，請確認舊密碼是否正確。");
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                showError("網路連線異常，請稍後再試。");
            } finally {
                // 恢復按鈕狀態
                if(!successMessage.classList.contains('flex')) {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-save"></i> 儲存新密碼';
                    submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
                }
            }
        });

        // 顯示錯誤訊息的小工具函數
        function showError(msg) {
            document.getElementById('errorText').textContent = msg;
            document.getElementById('errorMessage').classList.remove('hidden');
        }
    </script>
</body>
</html>
